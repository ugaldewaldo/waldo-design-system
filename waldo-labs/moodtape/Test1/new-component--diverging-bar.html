<!--
  component: Diverging Bar
  source: waldo-labs/moodtape/Test1/index.html (DS rebuild of waldo-labs/moodtape)
  date: 2026-07-03
  use_when:
    - A signed metric on a symmetric scale (e.g. net sentiment −1..+1) where direction from a zero midpoint matters
    - Ranked lists of entities that can be net-positive or net-negative on the same axis
  notes:
    - Sibling of Bar Track / Benchmark Bar: same 6px track in hsl(var(--secondary)), fully rounded, thin (data-viz reads light)
    - Center marker mirrors .bench-bar-marker (2px, foreground 30% mix); fill grows from the midpoint
    - Positive fill = var(--primary), negative fill = var(--warning) (data rule: never --destructive for a metric)
    - Value trailing, tabular-nums, colored by the same rule; label muted, brightens on hover
    - Fill width = |value| / scale-max × 50% of the track
    - No DS equivalent found in docs/component-index.md or index.html grep ("diverging"): Bar Track and Benchmark Bar are zero-based only
-->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>New component — Diverging Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
<link rel="stylesheet" href="../../../waldo-ds.css">
<style>
  html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
  body { height: auto !important; overflow: visible !important; display: block !important;
         max-width: none !important; margin: 0 !important; padding: 40px;
         background: hsl(var(--background)); color: hsl(var(--foreground)); }
  svg { flex: none; min-height: fit-content; }
  .demo-card { background: hsl(var(--card)); border-radius: 16px; padding: 28px; max-width: 520px; }

  .dvg-row { display: grid; grid-template-columns: 170px 1fr 52px; gap: 12px; align-items: center;
             padding: 7px 6px; border-radius: var(--radius-md); cursor: pointer;
             transition: background 0.1s; }
  .dvg-row:hover { background: color-mix(in srgb, hsl(var(--foreground)) 4%, transparent); }
  .dvg-label { font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
  .dvg-row:hover .dvg-label { color: hsl(var(--foreground)); }
  .dvg-track { position: relative; height: 6px; background: hsl(var(--secondary));
               border-radius: var(--radius-full); }
  .dvg-mid { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 2px; border-radius: 1px;
             background: color-mix(in srgb, hsl(var(--foreground)) 30%, transparent);
             transform: translateX(-50%); }
  .dvg-fill { position: absolute; top: 0; bottom: 0; border-radius: var(--radius-full); }
  .dvg-fill.pos { left: 50%; background: hsl(var(--primary)); }
  .dvg-fill.neg { right: 50%; background: hsl(var(--warning)); }
  .dvg-val { font-size: var(--fs-xs); font-weight: 500; text-align: right;
             font-variant-numeric: tabular-nums; }
  .pos { color: hsl(var(--primary)); }
  .neg { color: hsl(var(--warning)); }
  .neu { color: hsl(var(--muted-foreground)); }
</style>
</head>
<body>
<div class="demo-card" id="demo"></div>
<script>
  // value on a −1..+1 scale; fill width = |value| × 50% of the track
  const ROWS = [
    { label:'Technology',            v: 0.44 },
    { label:'Media & Entertainment', v: 0.18 },
    { label:'Beverages & Food',      v: 0.23 },
    { label:'Restaurants & QSR',     v: -0.04 },
    { label:'Apparel & Fashion',     v: 0.10 },
    { label:'Automotive',            v: -0.02 },
  ];
  const cls = v => v>=0.15?'pos':v<=-0.15?'neg':'neu';
  document.getElementById('demo').innerHTML = ROWS.map(r => `
    <div class="dvg-row">
      <div class="dvg-label">${r.label}</div>
      <div class="dvg-track"><div class="dvg-mid"></div><div class="dvg-fill ${r.v>=0?'pos':'neg'}" style="width:${Math.abs(r.v)*50}%"></div></div>
      <div class="dvg-val ${cls(r.v)}">${(r.v>=0?'+':'')+r.v.toFixed(2)}</div>
    </div>`).join('');
</script>
</body>
</html>
