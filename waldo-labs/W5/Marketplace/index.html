<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waldo Labs — Marketplace</title>
<link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
<link rel="stylesheet" href="../../../waldo-ds.css">
<style>
  /* waldo-ds.css sets html,body{height:100%;overflow:hidden} — breaks scroll.
     Scroll override goes on html ONLY: any overflow other than visible on body
     silently kills position:sticky (the sticky topbar scrolls away). */
  html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
  body { height: auto !important; overflow: visible !important; }
  /* waldo-ds.css sets body{display:flex!important} — collapses card widths */
  body { display: block !important; }
  /* waldo-ds.css sets svg{display:block} — collapses ring/icon SVGs inside flex containers */
  svg { flex: none; min-height: fit-content; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    max-width: none !important;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: hsl(var(--background)); color: hsl(var(--foreground));
    font-size: var(--fs-sm); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  .tabular { font-variant-numeric: tabular-nums; }

  .wrap { max-width: 1184px; margin: 0 auto; padding: 0 24px 72px; }

  /* ── App identity hues — every app maps to a chart token ── */
  .hue-promo      { --app-c: var(--chart-1); }
  .hue-health     { --app-c: var(--chart-10); }
  .hue-prospector { --app-c: var(--chart-6); }
  .hue-moodtape   { --app-c: var(--chart-7); }
  .hue-sov        { --app-c: var(--chart-8); }
  .hue-seddit     { --app-c: var(--chart-3); }
  .hue-pov        { --app-c: var(--chart-5); }
  .hue-reception  { --app-c: var(--chart-2); }

  /* ── Breadcrumb (doctrine: highlight, not muted) ── */
  .crumb { display: inline-flex; align-items: center; gap: 6px; margin: 26px 0 0;
    font-size: var(--fs-sm); color: hsl(var(--highlight)); text-decoration: none; cursor: pointer; }
  .crumb:hover { opacity: .85; }

  /* ── Intro hero ── */
  .hero { display: flex; align-items: center; gap: 32px; margin: 34px 0 44px; }
  .hero-text { flex: 1.3; display: flex; flex-direction: column; align-items: flex-start; gap: 14px; }
  .hero-text h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.8px; line-height: 1.2; }
  .hero-text p { font-size: var(--fs-md); color: hsl(var(--muted-foreground)); line-height: 1.6; max-width: 420px; }
  .hero-art { flex: 1; position: relative; height: 170px; display: flex; align-items: center; justify-content: center; }
  .hero-tile { position: absolute; width: 108px; height: 108px; border-radius: 24px;
    background: color-mix(in srgb, hsl(var(--app-c)) 16%, hsl(var(--card)));
    display: flex; align-items: center; justify-content: center; }
  .hero-tile.t1 { transform: rotate(-10deg) translateX(-64px); }
  .hero-tile.t2 { transform: rotate(4deg) translateY(-6px); z-index: 1; }
  .hero-tile.t3 { transform: rotate(13deg) translateX(64px); }
  .app-dot { border-radius: 50%; background: hsl(var(--app-c)); color: hsl(var(--background));
    display: flex; align-items: center; justify-content: center; flex: none; }
  .app-dot-lg { width: 60px; height: 60px; }
  .app-dot-lg svg { width: 30px; height: 30px; }

  /* ── Featured pair — editorial split cards ──
     Store-editorial surface: hue tints derived from the app's chart token
     (approved deviation from the neutral-card rule for marketplace heroes). */
  .feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .feat { display: flex; border-radius: 16px; overflow: hidden; min-height: 216px;
    cursor: pointer; text-align: left; border: none; padding: 0; font-size: inherit; }
  .feat-text { flex: 1.15; padding: 24px; display: flex; flex-direction: column; align-items: flex-start; gap: 0;
    background: color-mix(in srgb, hsl(var(--app-c)) 10%, hsl(var(--card))); }
  .feat:hover .feat-text { background: color-mix(in srgb, hsl(var(--app-c)) 14%, hsl(var(--card))); }
  .feat-eyebrow { display: inline-flex; align-items: center; gap: 6px; font-size: var(--fs-xs);
    color: color-mix(in srgb, hsl(var(--app-c)) 80%, hsl(var(--foreground))); }
  .feat-eyebrow svg { width: 13px; height: 13px; }
  .feat-title { margin-top: 14px; font-size: var(--fs-2xl); font-weight: 500; letter-spacing: -0.4px; line-height: 1.25; color: hsl(var(--foreground)); }
  .feat-desc { margin-top: 8px; font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); line-height: 1.55; }
  .feat-cta { margin-top: auto; padding-top: 16px; display: flex; align-items: center; gap: 12px; }
  .feat-proof { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }
  .feat-art { flex: 1; display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, hsl(var(--app-c)) 24%, hsl(var(--foreground))); }
  .feat-glyph { width: 100px; height: 100px; border-radius: 24px; background: hsl(var(--foreground));
    display: flex; align-items: center; justify-content: center;
    color: color-mix(in srgb, hsl(var(--app-c)) 55%, hsl(var(--background))); }
  .feat-glyph.round { border-radius: 50%; }
  .feat-glyph svg { width: 52px; height: 52px; }

  /* ── Browse section ── */
  .browse-head { display: flex; align-items: center; justify-content: space-between; margin: 48px 0 4px; }
  .browse-label { display: flex; align-items: center; gap: 8px; font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); }
  .browse-label svg { width: 15px; height: 15px; }

  .store-row { display: flex; align-items: center; gap: 18px; width: 100%; padding: 20px 8px;
    border: none; border-bottom: 1px solid hsl(var(--border)); background: transparent;
    text-align: left; font-size: inherit; cursor: pointer; border-radius: 0; transition: background .12s; }
  .store-row:hover { background: hsl(var(--foreground) / 0.04); }
  .store-row:last-child { border-bottom: none; }
  .row-tile { width: 66px; height: 66px; border-radius: 16px; background: hsl(var(--card));
    display: flex; align-items: center; justify-content: center; flex: none; }
  .app-dot-md { width: 42px; height: 42px; }
  .app-dot-md svg { width: 22px; height: 22px; }
  .row-main { flex: 1; min-width: 0; }
  .row-name { display: block; font-size: var(--fs-md); font-weight: 500; color: hsl(var(--foreground)); }
  .row-desc { display: block; margin-top: 3px; font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); line-height: 1.5; }
  .row-meta { margin-top: 6px; display: flex; align-items: center; gap: 6px;
    font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }
  .row-meta svg { width: 11px; height: 11px; }
  .row-action { flex: none; }
  .row-added { display: inline-flex; align-items: center; gap: 5px; font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); }
  .row-added svg { width: 14px; height: 14px; color: hsl(var(--primary)); }

  /* ── Drill panel — canonical (showcase #comp-drill-panel) ── */
  .drill-overlay { position: fixed; inset: 0; z-index: 80; background: color-mix(in srgb, hsl(var(--background)) 62%, transparent); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .drill-overlay.open { opacity: 1; pointer-events: auto; }
  .drill { position: fixed; top: 0; right: 0; bottom: 0; z-index: 85; width: 440px; max-width: 92vw; background: hsl(var(--card)); box-shadow: -12px 0 40px color-mix(in srgb, hsl(var(--background)) 70%, transparent); transform: translateX(102%); transition: transform 0.24s ease; display: flex; flex-direction: column; }
  .drill.open { transform: translateX(0); }
  .drill-head { display: flex; align-items: flex-start; gap: 12px; padding: 22px 24px 16px; border-bottom: 1px solid hsl(var(--border)); }
  .drill-head-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .drill-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .drill-title { font-size: var(--fs-lg); font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
  .drill-close { width: 26px; height: 26px; flex: none; border: none; background: transparent; border-radius: 50%; color: hsl(var(--muted-foreground)); cursor: pointer; font-size: var(--fs-sm); display: flex; align-items: center; justify-content: center; transition: background 0.1s, color 0.1s; }
  .drill-close:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }
  .drill-body { flex: 1; overflow-y: auto; padding: 18px 24px 32px; display: flex; flex-direction: column; gap: 14px; }
  .drill-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin-bottom: -6px; }
  .drill-p { font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); line-height: 1.55; }
  .drill-kv { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px solid hsl(var(--border)); font-size: var(--fs-sm); }
  .drill-kv:last-child { border-bottom: none; }
  .drill-kv-k { color: hsl(var(--muted-foreground)); }
  .drill-kv-v { font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }
  .drill-quote { background: hsl(var(--secondary)); border-radius: var(--radius-lg); padding: 12px 14px; font-size: var(--fs-sm); color: hsl(var(--foreground)); line-height: 1.55; }

  .drill-app { display: flex; align-items: center; gap: 14px; }
  .drill-app .row-meta { margin-top: 4px; }
  .drill-foot { padding: 16px 24px 22px; border-top: 1px solid hsl(var(--border)); }
  .drill-foot .btn { width: 100%; }

  /* ── Toast — fixed bottom-center, confirmations only (doctrine) ── */
  .store-toast { position: fixed; bottom: 26px; left: 50%; transform: translate(-50%, 10px);
    z-index: 90; opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; }
  .store-toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>

      <span class="row-tile"><span class="app-dot app-dot-md"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span></span>

        <span class="row-meta">Waldo Labs ·
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 4.6 ·
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> 940

      <span class="row-main">
        <span class="row-name">Seddit</span>

        <span class="row-meta">Waldo Labs ·
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 5.0 ·
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> 3.1k

      <span class="row-main">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> 2.7k

<div class="drill-overlay" id="drillOverlay"></div>
<div class="drill" id="drillPanel" role="dialog" aria-modal="true" aria-labelledby="drillTitle">
  <div class="drill-head">
    <div class="drill-head-main">
      <span class="drill-eyebrow" id="drillEyebrow">App · Monitoring</span>
      <span class="drill-title" id="drillTitle">Promo Radar</span>
    </div>
    <button class="drill-close" id="drillClose" aria-label="Close">✕</button>
  </div>
  <div class="drill-body">
    <div class="drill-app" id="drillApp"></div>
    <div class="drill-p" id="drillDesc"></div>
    <div class="drill-section-label">Details</div>
    <div id="drillKv"></div>
    <div class="drill-section-label">What teams say</div>
    <div class="drill-quote" id="drillQuote"></div>
  </div>
  <div class="drill-foot">
    <button class="btn btn-default" id="drillAdd" type="button">Add to workspace</button>
  </div>
</div>

<div class="store-toast" id="storeToast">
  <div class="wtoast">
    <div class="wtoast-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="wtoast-body">
      <span class="wtoast-title" id="toastMsg">Added to workspace</span>
    </div>
  </div>
</div>

<script>
  var APPS = {
    promo:      { name: 'Promo Radar',  cat: 'Monitoring',   hue: 'hue-promo',      rating: '4.9', installs: '2.4k', added: false,
      desc: 'Watches every competitor promotion in your category and reads the mechanics behind it: discount depth, duration, channels, and who follows whom. Alerts fire the moment a rival moves.',
      quote: '"We saw a competitor\'s flash sale forty minutes after it went live — and matched it before lunch."' },
    health:     { name: 'Brand Health', cat: 'Monitoring',   hue: 'hue-health',     rating: '4.8', installs: '1.8k', added: false,
      desc: 'Blends reputation, presence, and momentum into one vitality score, tracked daily across social, news, and search. One number the whole team can steer by.',
      quote: '"The Monday health score replaced three separate status decks."' },
    prospector: { name: 'Prospector',   cat: 'Intelligence', hue: 'hue-prospector', rating: '4.9', installs: '2.4k', added: false,
      desc: 'Finds and ranks new-business leads from the brand signals already flowing through your workspace — funding rounds, agency switches, leadership moves.',
      quote: '"Our BD pipeline stopped depending on who reads the trades that morning."' },
    moodtape:   { name: 'Moodtape',     cat: 'Audience',     hue: 'hue-moodtape',   rating: '4.8', installs: '1.9k', added: false,
      desc: 'Maps what your audience listens to and feels, and turns it into cultural direction the creative team can actually use.',
      quote: '"Moodtape briefed our spring campaign better than the trend report we paid for."' },
    sov:        { name: 'SOV Tracker',  cat: 'Monitoring',   hue: 'hue-sov',        rating: '4.7', installs: '1.2k', added: false,
      desc: 'Tracks your share of voice against the category week over week, across earned and owned media, and shows exactly which stories moved it.',
      quote: '"Finally a share-of-voice number the CFO doesn\'t argue with."' },
    reception:  { name: 'Reception',    cat: 'Monitoring',   hue: 'hue-reception',  rating: '4.6', installs: '940',  added: false,
      desc: 'Shows how your launches land — every reaction, review, and pickup collected into one feed for the first 72 hours that decide a launch.',
      quote: '"Launch day used to be twelve tabs. Now it\'s one."' },
    seddit:     { name: 'Seddit',       cat: 'Audience',     hue: 'hue-seddit',     rating: '5.0', installs: '3.1k', added: true,
      desc: 'Reads the communities where your buyers actually talk and surfaces what they really think — threads, complaints, and the praise nobody tags you in.',
      quote: '"Seddit found the product complaint three weeks before support did."' },
    pov:        { name: 'POV AMP',      cat: 'Content',      hue: 'hue-pov',        rating: '4.9', installs: '2.7k', added: true,
      desc: 'Turns your executives\' points of view into content that travels — one interview in, a channel-ready content system out.',
      quote: '"Our CEO\'s POV finally ships weekly instead of quarterly."' }
  };

  var ICONS = {
    promo:      '<path d="M19 5 5 19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
    health:     '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
    prospector: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
    moodtape:   '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
    sov:        '<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
    reception:  '<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
    seddit:     '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
    pov:        '<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>'
  };

  var drillOverlay = document.getElementById('drillOverlay');
  var drillPanel = document.getElementById('drillPanel');
  var currentApp = null;

  function openDrill(id) {
    var app = APPS[id];
    if (!app) return;
    currentApp = id;
    document.getElementById('drillEyebrow').textContent = 'App · ' + app.cat;
    document.getElementById('drillTitle').textContent = app.name;
    document.getElementById('drillApp').innerHTML =
      '<span class="row-tile ' + app.hue + '"><span class="app-dot app-dot-md"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">' + ICONS[id] + '</svg></span></span>' +
      '<span><span class="row-name">' + app.name + '</span>' +
      '<span class="row-meta">Waldo Labs · ' + app.rating + ' ★ · ' + app.installs + ' installs</span></span>';
    document.getElementById('drillDesc').textContent = app.desc;
    document.getElementById('drillKv').innerHTML =
      '<div class="drill-kv"><span class="drill-kv-k">Publisher</span><span class="drill-kv-v">Waldo Labs</span></div>' +
      '<div class="drill-kv"><span class="drill-kv-k">Category</span><span class="drill-kv-v">' + app.cat + '</span></div>' +
      '<div class="drill-kv"><span class="drill-kv-k">Rating</span><span class="drill-kv-v">' + app.rating + ' / 5</span></div>' +
      '<div class="drill-kv"><span class="drill-kv-k">Teams using it</span><span class="drill-kv-v">' + app.installs + '</span></div>' +
      '<div class="drill-kv"><span class="drill-kv-k">Price</span><span class="drill-kv-v">Included in Waldo</span></div>';
    document.getElementById('drillQuote').textContent = app.quote;
    syncDrillCta();
    drillOverlay.classList.add('open');
    drillPanel.classList.add('open');
  }

  function syncDrillCta() {
    var btn = document.getElementById('drillAdd');
    var app = APPS[currentApp];
    if (!app) return;
    btn.textContent = app.added ? 'Added to workspace ✓' : 'Add to workspace';
    btn.classList.toggle('disabled', app.added);
  }

  function closeDrill() {
    drillOverlay.classList.remove('open');
    drillPanel.classList.remove('open');
  }

  drillOverlay.addEventListener('click', closeDrill);
  document.getElementById('drillClose').addEventListener('click', closeDrill);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrill(); });

  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById('storeToast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2600);
  }

  function markAdded(id) {
    var app = APPS[id];
    if (!app || app.added) return;
    app.added = true;
    document.querySelectorAll('[data-add="' + id + '"]').forEach(function (btn) {
      var wrap = document.createElement('span');
      wrap.className = 'row-added';
      wrap.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>Added';
      btn.replaceWith(wrap);
    });
    syncDrillCta();
    showToast(app.name + ' added to workspace');
  }

  document.querySelectorAll('[data-add]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      markAdded(btn.getAttribute('data-add'));
    });
  });

  document.getElementById('drillAdd').addEventListener('click', function () {
    if (currentApp) markAdded(currentApp);
  });

  document.querySelectorAll('.feat, .store-row').forEach(function (el) {
    el.addEventListener('click', function () { openDrill(el.getAttribute('data-app')); });
  });

  var activeCat = 'all';
  var searchQ = '';

  function applyFilter() {
    document.querySelectorAll('.store-row').forEach(function (row) {
      var catOk = activeCat === 'all' || row.getAttribute('data-cat') === activeCat;
      var text = row.textContent.toLowerCase();
      var qOk = !searchQ || text.indexOf(searchQ) !== -1;
      row.hidden = !(catOk && qOk);
    });
  }

  document.querySelectorAll('.wtab-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
      document.querySelectorAll('.wtab-pill').forEach(function (p) {
        p.classList.remove('active');
        p.setAttribute('aria-selected', 'false');
      });
      pill.classList.add('active');
      pill.setAttribute('aria-selected', 'true');
      activeCat = pill.getAttribute('data-cat');
      applyFilter();
    });
  });

  document.getElementById('storeSearch').addEventListener('input', function (e) {
    searchQ = e.target.value.trim().toLowerCase();
    applyFilter();
  });
</script>

</body>
</html>
