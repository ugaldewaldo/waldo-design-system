<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude · Waldo — build with an LLM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../waldo-ds.css" />
  <style>
    html, body { height: auto !important; }
    html {
      background: var(--background);
      color: var(--foreground);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh; margin: 0; padding: 48px 24px;
      display: flex !important; align-items: center; justify-content: center;
      max-width: none !important; overflow: auto !important; flex-direction: unset !important;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .card, .kpi { border: none !important; }

    .cw {
      width: 100%; max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .cw-bar {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
    }
    .cw-dots { display: flex; gap: 7px; }
    .cw-dots span { width: 11px; height: 11px; border-radius: 50%; background: var(--secondary); }
    .cw-title {
      text-align: center; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--muted-foreground);
    }
    .cw-tabs { justify-self: end; }

    .cw-body { padding: 22px 20px 24px; }

    .cw-q {
      background: var(--background); border: 1px solid var(--border);
      border-radius: 12px; padding: 15px 18px;
      font-size: 15px; color: var(--foreground);
    }

    .cw-endpoint {
      border-left: 2px solid var(--primary); padding-left: 12px;
      margin: 18px 0 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--muted-foreground);
    }
    .cw-endpoint .verb { color: var(--primary); font-weight: 500; }

    .cw-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .cw-rc {
      background: var(--background); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 15px;
      display: flex; flex-direction: column; gap: 9px;
    }
    .cw-rc-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-foreground);
    }
    .cw-rc-title { font-size: 14px; font-weight: 500; color: var(--foreground); line-height: 1.35; }
    .cw-rc-meta { font-size: 12px; color: var(--muted-foreground); }
    .cw-rc .badge { align-self: flex-start; }
  </style>
</head>
<body>
  <div class="cw">
    <div class="cw-bar">
      <div class="cw-dots"><span></span><span></span><span></span></div>
      <div class="cw-title">Claude · Waldo</div>
      <div class="cw-tabs">
        <div class="wseg" id="cw-seg">
          <button class="wseg-opt active" onclick="cwTab('brand', this)">Brand</button>
          <button class="wseg-opt inactive" onclick="cwTab('category', this)">Category</button>
          <button class="wseg-opt inactive" onclick="cwTab('audience', this)">Audience</button>
        </div>
      </div>
    </div>

    <div class="cw-body">
      <div class="cw-q" id="cw-q"></div>
      <div class="cw-endpoint"><span class="verb">GET</span> <span id="cw-path"></span></div>
      <div class="cw-cards" id="cw-cards"></div>
    </div>
  </div>

  <script>
    const DATA = {
      brand: {
        q: "What hooks has Liquid Death been using over the past month?",
        path: "/brands/{id}/ads/active",
        cards: [
          { label: "Top hook", title: '"Murder your thirst" — performance variant', meta: "Running 47 days · 12 variants", badge: "badge badge-active", pill: "Scaling" },
          { label: "Rising angle", title: "Healthcare-worker testimonial", meta: "New this week · 4 variants", badge: "badge badge-outline", pill: "New" },
          { label: "Longevity leader", title: "Mountain-spring origin story", meta: "Running 112 days · steady", badge: "badge badge-secondary", pill: "Evergreen" }
        ]
      },
      category: {
        q: "What's trending across energy drinks right now?",
        path: "/category/{id}/trends",
        cards: [
          { label: "Breakout topic", title: "Sugar-free reformulations", meta: "+240% mentions · 7 days", badge: "badge badge-active", pill: "Breakout" },
          { label: "Steady riser", title: "Gym & pre-workout crossover", meta: "Up 18% week-over-week", badge: "badge badge-outline", pill: "Rising" },
          { label: "Cooling off", title: "Holiday-flavor launches", meta: "Down 31% post-season", badge: "badge badge-secondary", pill: "Fading" }
        ]
      },
      audience: {
        q: "Who's talking about Liquid Death and what are they saying?",
        path: "/audiences/{id}/conversations",
        cards: [
          { label: "Top community", title: "r/energydrinks", meta: "1.2k mentions · 84% positive", badge: "badge badge-active", pill: "Hot" },
          { label: "Loudest voice", title: "@hydrationhabit", meta: "312k reach · 9 posts", badge: "badge badge-outline", pill: "Creator" },
          { label: "Sentiment shift", title: "Pricing pushback", meta: "Negative up 12pp", badge: "badge badge-destructive", pill: "Watch" }
        ]
      }
    };

    function cwTab(key, el) {
      document.querySelectorAll('#cw-seg .wseg-opt').forEach(b => {
        b.classList.remove('active'); b.classList.add('inactive');
      });
      el.classList.remove('inactive'); el.classList.add('active');
      render(key);
    }

    function render(key) {
      const d = DATA[key];
      document.getElementById('cw-q').textContent = d.q;
      document.getElementById('cw-path').textContent = d.path;
      document.getElementById('cw-cards').innerHTML = d.cards.map(c => `
        <div class="cw-rc">
          <div class="cw-rc-label">${c.label}</div>
          <div class="cw-rc-title">${c.title}</div>
          <div class="cw-rc-meta">${c.meta}</div>
          <span class="${c.badge}">${c.pill}</span>
        </div>`).join('');
    }

    render('brand');
  </script>
</body>
</html>
