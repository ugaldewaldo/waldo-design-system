<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospector — new business, on a schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
<link rel="stylesheet" href="../../../waldo-ds.css">
<style>
  /* waldo-ds.css sets html,body{height:100%;overflow:hidden} — breaks scroll.
     Scroll override goes on html ONLY: any overflow other than visible on body
     silently kills position:sticky (the sticky topbar scrolls away). */
  html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
  body { height: auto !important; overflow: visible !important; }
  /* waldo-ds.css sets body{display:flex!important} — collapses card widths */
  body { display: block !important; }
  /* waldo-ds.css sets svg{display:block} — collapses ring/icon SVGs inside flex containers */
  svg { flex: none; min-height: fit-content; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    max-width: none !important;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: hsl(var(--background)); color: hsl(var(--foreground));
    font-size: var(--fs-sm); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: hsl(var(--primary)); text-decoration: none; }
  a:hover { opacity: .85; }
  button { font-family: inherit; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* ── App shell — layout only, tokens only ── */
  .app { display: grid; grid-template-columns: 252px 1fr; min-height: 100vh; }

  .sidebar {
    border-right: 1px solid hsl(var(--border));
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .side-brand { display: flex; flex-direction: column; gap: 6px; padding: 20px 20px 14px; color: hsl(var(--foreground)); }
  .side-product { font-size: var(--fs-xs); letter-spacing: .06em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }

  .agency-chip {
    margin: 4px 12px 10px; padding: 10px 12px; border: none; text-align: left; width: calc(100% - 24px);
    border-radius: var(--radius-lg); background: hsl(var(--secondary)); cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background .12s; color: hsl(var(--foreground));
  }
  .agency-chip:hover { background: color-mix(in srgb, hsl(var(--foreground)) 6%, hsl(var(--secondary))); }
  .agency-chip .a-name { font-weight: 500; font-size: var(--fs-sm); line-height: 1.25; }
  .agency-chip .a-sub { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); }

  /* wnav-panel ships at a fixed 288px (floating-panel context) — fit it to the sidebar */
  .side-nav.wnav-panel { width: auto; margin: 0 12px; padding: 8px 0; }
  .side-nav .wnav-item { text-decoration: none; }
  .side-nav .wnav-item, .side-nav .wnav-item:hover { color: color-mix(in srgb, hsl(var(--foreground)) 70%, transparent); }
  .side-nav .wnav-item.active { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
  .side-nav .wnav-item .wnav-icon svg { width: 15px; height: 15px; }
  .watch-dot { margin-left: auto; width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--highlight)); flex: none; }

  .side-foot { margin-top: auto; padding: 14px 16px; border-top: 1px solid hsl(var(--border)); }
  .side-foot .lbl { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
  /* DS Progress pattern (showcase #comp-progress) */
  .credit-track { height: 6px; background: hsl(var(--muted)); border-radius: var(--radius-full); overflow: hidden; margin: 8px 0 6px; }
  .credit-fill { height: 100%; background: hsl(var(--primary)); border-radius: var(--radius-full); }

  /* ── Main / topbar ── */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 60px; position: sticky; top: 0; z-index: 40;
    backdrop-filter: blur(8px);
    background: color-mix(in srgb, hsl(var(--background)) 85%, transparent);
    border-bottom: 1px solid hsl(var(--border));
    display: flex; align-items: center; gap: 16px; padding: 0 28px;
  }
  .topbar-brand { display: none; align-items: center; gap: 10px; color: hsl(var(--foreground)); }
  .searchbox { flex: 1; max-width: 420px; }
  .searchbox .input { height: 36px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .integ-badge { cursor: default; }
  .integ-badge .badge-dot { background: currentColor; }
  .topbar-powered { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); white-space: nowrap; }

  .content { padding: 28px 28px 80px; max-width: 1184px; width: 100%; margin: 0 auto; }

  /* ── Page header (doctrine — border killed) ── */
  .page-head { margin-bottom: 22px; border-bottom: none !important; }
  .page-head h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.8px; line-height: 36px; }
  .page-head .sub { color: hsl(var(--muted-foreground)); margin-top: 5px; font-size: var(--fs-sm); }
  .page-head .row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .page-head .spacer { flex: 1; }

  /* ── Prospect Card — DS gap, built to the wcard family (see new-component--prospect-card.html) ── */
  .pstack { display: flex; flex-direction: column; gap: 14px; }
  .pcard {
    background: hsl(var(--card)); border-radius: 16px; padding: 20px 24px;
    cursor: pointer; transition: background .14s;
  }
  .pcard:hover { background: color-mix(in srgb, hsl(var(--foreground)) 4%, hsl(var(--card))); }
  .pcard.is-done { opacity: .6; }
  .pcard-top { display: flex; align-items: flex-start; gap: 14px; }
  .pcard-id { min-width: 0; }
  .pcard-name { font-size: var(--fs-base); font-weight: 500; letter-spacing: -0.02em; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .pcard-domain { color: hsl(var(--muted-foreground)); font-size: var(--fs-xs); font-weight: 400; }
  .pcard-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .pcard-match { margin-left: auto; text-align: right; flex: none; }
  .match-num { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: hsl(var(--foreground)); }
  .match-num.hi { color: hsl(var(--primary)); }
  .match-num .den { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); font-weight: 400; }
  .match-label { font-size: 10px; color: hsl(var(--muted-foreground)); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }

  .reason-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .reason { background: hsl(var(--secondary)); border-radius: var(--radius-lg); padding: 12px 14px; }
  .reason-lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: hsl(var(--muted-foreground)); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .reason-lbl svg { width: 13px; height: 13px; }
  .reason-lbl.opening { color: hsl(var(--highlight)); }
  .reason-lbl.opening.hot { color: hsl(var(--destructive)); }
  .reason p { font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); line-height: 1.5; }
  .reason p b { color: hsl(var(--foreground)); font-weight: 500; }

  .pcard-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid hsl(var(--border)); }
  .pcard-actions .grow { flex: 1; }
  .btn svg { width: 14px; height: 14px; }

  /* Brand avatar — DS Avatar (square = brands) + sanctioned favicon with graceful fallback */
  .brand-av { position: relative; overflow: hidden; }
  .brand-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 14%; background: hsl(var(--foreground)); display: none; }
  .brand-av.has-logo img { display: block; }
  .wav.av-56 { width: 56px; height: 56px; font-size: var(--fs-lg); border-radius: var(--radius-lg); }
  .wav.av-28 { width: 28px; height: 28px; font-size: var(--fs-xs); }

  /* ── Detail page ── */
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: hsl(var(--highlight)); font-weight: 500; font-size: var(--fs-sm); margin-bottom: 18px; }
  .back-link svg { width: 14px; height: 14px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 332px; gap: 16px; align-items: start; }
  .detail-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .detail-hd { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 22px; }
  .detail-hd h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.8px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .detail-hd .domain { color: hsl(var(--muted-foreground)); font-size: var(--fs-sm); margin-top: 3px; }
  .detail-hd .domain a { color: hsl(var(--muted-foreground)); border-bottom: 1px dashed hsl(var(--border)); }
  .detail-hd .match-num { font-size: var(--fs-lg); }

  .wcard.tight { padding: 22px 24px; gap: 14px; }
  .panel-h { font-size: var(--fs-xs); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: hsl(var(--muted-foreground)); display: flex; align-items: center; gap: 8px; }
  .panel-h svg { width: 15px; height: 15px; }
  .lead { font-size: var(--fs-sm); line-height: 1.6; color: hsl(var(--muted-foreground)); }
  .lead b { color: hsl(var(--foreground)); font-weight: 500; }

  /* Why-now callout — DS Alert family; highlight variant is a local extension (opening = emphasis, hot = alert) */
  .walert.walert-highlight { background: hsl(var(--highlight) / .08); border-color: hsl(var(--highlight) / .25); color: hsl(var(--foreground)); }
  .walert.walert-highlight .walert-icon { color: hsl(var(--highlight)); }
  .walert-src { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); margin-top: 9px; display: flex; align-items: center; gap: 6px; }
  .walert-src svg { width: 12px; height: 12px; }

  .note { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); }
  .sec-label { font-size: var(--fs-xs); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: hsl(var(--muted-foreground)); }

  /* Echo chip — Tag + square Avatar composition */
  .echo-chip { display: inline-flex; align-items: center; gap: 8px; background: hsl(var(--secondary)); border-radius: var(--radius-full); padding: 5px 14px 5px 6px; font-size: var(--fs-sm); font-weight: 500; width: fit-content; }

  /* Contacts — DS List Item (wli) rows */
  .contact-list .wli { height: 48px; padding: 0 4px; }
  .contact-list .wli:hover { background: transparent; }
  .mutual { color: hsl(var(--primary)); }
  .li-link { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: var(--radius-full); color: hsl(var(--muted-foreground)); transition: background .1s, color .1s; }
  .li-link:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); opacity: 1; }
  .li-link svg { width: 14px; height: 14px; }

  /* Side action panel */
  .side-actions .btn { width: 100%; justify-content: center; }
  .side-actions { gap: 9px; display: flex; flex-direction: column; }
  .meta-list { font-size: var(--fs-sm); }
  .meta-list .ml-row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid hsl(var(--border)); }
  .meta-list .ml-row:last-child { border-bottom: none; padding-bottom: 0; }
  .meta-list .k { color: hsl(var(--muted-foreground)); }
  .meta-list .v { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }

  /* ── Pipeline Board — DS gap (see new-component--pipeline-board.html) ── */
  .pboard { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 14px; align-items: start; }
  .pcol { background: hsl(var(--card)); border-radius: 16px; padding: 12px; min-height: 120px; }
  .pcol-hd { display: flex; align-items: center; gap: 8px; font-size: var(--fs-xs); font-weight: 500; color: hsl(var(--muted-foreground)); margin-bottom: 12px; padding: 0 2px; }
  .pcol-dot { width: 7px; height: 7px; border-radius: 50%; background: hsl(var(--muted-foreground) / .5); flex: none; }
  .pcol-dot.won { background: hsl(var(--primary)); }
  .pcol-cnt { margin-left: auto; font-variant-numeric: tabular-nums; }
  .mini-card { background: hsl(var(--secondary)); border-radius: var(--radius-lg); padding: 11px 12px; margin-bottom: 9px; cursor: pointer; transition: background .12s; }
  .mini-card:hover { background: color-mix(in srgb, hsl(var(--foreground)) 5%, hsl(var(--secondary))); }
  .mini-card:last-child { margin-bottom: 0; }
  .mc-top { display: flex; align-items: center; gap: 9px; }
  .mc-name { font-weight: 500; font-size: var(--fs-sm); }
  .mc-cat { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); }
  .mc-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .mini-sel select { height: 28px; padding: 0 26px 0 10px; font-size: var(--fs-xs); }
  .mc-flag { display: inline-flex; align-items: center; }
  .mc-flag svg { width: 12px; height: 12px; }

  /* ── Watchlist ── */
  .wl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .tracked-list .wli { height: 52px; padding: 0 4px; }
  .tracked-list .wli:hover { background: transparent; }

  /* Alert List Row — canonical (showcase #comp-alert-list-row) */
  .alert-list { display: flex; flex-direction: column; }
  .alert-item { display: flex; gap: 14px; align-items: flex-start; padding: 12px 16px 0 8px; margin-bottom: 12px; cursor: pointer; border-radius: 8px; transition: background 0.12s; }
  .alert-item:last-child { margin-bottom: 0; }
  .alert-item:hover { background: hsl(var(--secondary)); }
  .alert-item:hover .alert-inner { border-bottom-color: transparent; }
  .alert-dot-col { width: 8px; flex: none; display: flex; align-items: center; justify-content: center; padding-top: 4px; }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--primary)); flex: none; }
  .alert-inner { flex: 1; min-width: 0; display: flex; gap: 10px; align-items: flex-start; border-bottom: 1px solid hsl(var(--border)); padding-bottom: 12px; }
  .alert-item:last-child .alert-inner { border-bottom: none; }
  .alert-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .alert-condition { font-size: var(--fs-sm); line-height: 20px; letter-spacing: -0.28px; }
  .alert-condition-main { color: hsl(var(--foreground)); font-weight: 600; }
  .alert-condition-detail { color: hsl(var(--muted-foreground)); font-weight: 400; }
  .alert-delivery { font-size: var(--fs-xs); font-weight: 400; line-height: 16px; letter-spacing: -0.24px; color: hsl(var(--muted-foreground)); opacity: 0.6; }

  /* ── HBar — canonical (showcase #chart-page-hbar, inline variant) ── */
  .ds-hbars { display: flex; flex-direction: column; }
  .ds-hbar-row {
    display: flex; flex-direction: row; align-items: center;
    height: 32px; padding: 6px 12px; gap: 12px;
    border-radius: 8px; cursor: pointer;
    transition: background .12s;
  }
  .ds-hbar-row:hover { background: hsl(var(--muted)); }
  .ds-hbar-name {
    width: 180px; flex: none;
    font-size: var(--fs-sm); font-weight: 400; line-height: 20px; letter-spacing: -0.28px;
    color: hsl(var(--muted-foreground));
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ds-hbar-inner { flex: 1; display: flex; align-items: center; gap: 12px; }
  .ds-hbar-track { flex: 1; height: 6px; background: hsl(var(--muted)); border-radius: 12px; overflow: hidden; }
  .ds-hbar-fill  { height: 100%; border-radius: var(--radius-full); background: linear-gradient(to right, color-mix(in srgb, hsl(var(--primary)) 23%, transparent), hsl(var(--green-400))); }
  .ds-hbar-val {
    width: 46px; flex: none; text-align: right;
    font-size: var(--fs-xs); font-weight: 400; line-height: 16px; letter-spacing: -0.24px;
    color: hsl(var(--muted-foreground));
  }

  /* ── Settings ── */
  .form-col { display: flex; flex-direction: column; gap: 16px; max-width: 480px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .fp-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .integ-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid hsl(var(--border)); }
  .integ-row:last-child { border-bottom: none; padding-bottom: 0; }
  .integ-row .it { flex: 1; }
  .integ-row .it h3 { font-size: var(--fs-sm); font-weight: 500; }
  .integ-row .it p { font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); margin-top: 2px; }
  .integ-icon { color: hsl(var(--muted-foreground)); }
  .integ-icon svg { width: 18px; height: 18px; }

  .divider { height: 1px; background: hsl(var(--border)); margin: 22px 0; }
  .api-foot { margin-top: 30px; padding-top: 18px; border-top: 1px solid hsl(var(--border)); font-size: var(--fs-xs); color: hsl(var(--muted-foreground)); }
  .api-foot a { color: color-mix(in srgb, hsl(var(--foreground)) 68%, transparent); border-bottom: 1px dashed hsl(var(--border)); }

  /* ── Toast — DS wtoast, fixed bottom-center (doctrine) ── */
  .toast-vp { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; transition: all .25s; z-index: 90; }
  .toast-vp.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-vp .wtoast-icon { color: hsl(var(--primary)); }

  .mobile-nav { display: none; }

  @media (max-width: 940px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-nav { display: flex; gap: 4px; overflow-x: auto; padding: 8px 14px; border-bottom: 1px solid hsl(var(--border)); position: sticky; top: 60px; z-index: 39; background: hsl(var(--background)); }
    .mobile-nav .wnav-item { white-space: nowrap; text-decoration: none; }
    .mobile-nav .wnav-item.active { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .topbar-brand { display: flex; }
    .topbar-right { display: none; }
    .detail-grid { grid-template-columns: 1fr; }
    .reason-row { grid-template-columns: 1fr; }
    .pboard { grid-template-columns: 1fr; }
    .wl-grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
    .content { padding: 20px 16px 80px; }
    .pcol { min-height: auto; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ════ SIDEBAR ════ -->
  <aside class="sidebar">
    <div class="side-brand">
      <svg width="70" height="18" viewBox="0 0 69.75 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Waldo"><path d="M63.2676 0C67.6298 0 69.75 2.26338 69.75 7.52148V10.6641C69.75 15.7985 67.6298 18 63.2676 18C58.8935 17.9984 56.7862 15.7968 56.7861 10.6641V7.52148C56.7861 2.26354 58.8934 0.000133701 63.2676 0ZM37.0039 14.6191L41.9775 13.9814V17.6562H32.4795V0.335938H37.0039V14.6191ZM5.47168 7.7832C5.68287 9.47803 5.78297 10.7646 5.85742 12.6689H6.10645C6.21888 10.7887 6.35555 9.37851 6.53027 7.7832L7.39062 0.335938H11.4912L12.4258 7.7832C12.6248 9.37852 12.7498 10.7902 12.8379 12.6689H13.1113C13.2116 10.7887 13.3102 9.47652 13.4971 7.7832L14.3193 0.335938H18.707L15.9277 17.6543H10.5449L10.0469 13.4609C9.79769 11.4328 9.62264 9.51443 9.49805 7.43652H9.23633C9.09958 9.51443 8.91281 11.4072 8.67578 13.4609L8.20215 17.6543H2.90332L0 0.335938H4.54883L5.47168 7.7832ZM31.6318 17.6543H26.8457L26.4961 15.5762H22.3086L21.959 17.6543H17.6094L21.6221 0.335938H27.5312L31.6318 17.6543ZM49.2207 0.335938C53.5328 0.335938 55.5898 2.67494 55.5898 7.61035V10.4062C55.5897 15.3172 53.5327 17.6543 49.2207 17.6543H43.2373V0.335938H49.2207ZM63.2676 3.55078C61.984 3.55097 61.3614 4.50431 61.3613 6.48242V11.6904C61.3613 13.5465 61.9839 14.449 63.2676 14.4492C64.5515 14.4492 65.1748 13.5452 65.1748 11.6904V6.48242C65.1748 4.5026 64.5515 3.55078 63.2676 3.55078ZM47.7617 14.1035H48.9717C50.3558 14.1035 51.0156 13.3613 51.0156 11.79V6.19824C51.0155 4.62735 50.3542 3.88577 48.9717 3.88574H47.7617V14.1035ZM24.2764 4.36816C24.1761 5.76588 23.989 7.03991 23.7656 8.53711L22.9043 12.7627L25.834 12.3721L25.0742 8.5498C24.8493 7.04039 24.65 5.76599 24.5254 4.36816H24.2764Z" fill="currentColor"/></svg>
      <div class="side-product">Prospector · New business engine</div>
    </div>

    <button class="agency-chip" onclick="go('/settings')">
      <div class="wav wav-square wav-32" id="agency-av">H</div>
      <div style="min-width:0">
        <div class="a-name" id="agency-name">Highline Studio</div>
        <div class="a-sub" id="agency-sub">highlinestudio.com</div>
      </div>
    </button>

  { brand:'Immi', type:'funding', text:'<b>Immi</b> Series B extension reported in trade press.', when:'5 days ago' },
  { brand:'Parade', type:'review', text:'<b>Parade</b> posted a "Brand Marketing Lead" role — leadership gap forming.', when:'6 days ago' },
];

const WEEKS = ['2026-05-25','2026-05-18','2026-05-11'];
const WEEK_LABEL = { '2026-05-25':'This week', '2026-05-18':'May 18', '2026-05-11':'May 11' };

/* ════════════════════════ STATE ════════════════════════ */
const LS_KEY = 'prospector_ds_test1_state_v1';
let state = load();
function load(){
  let s = {};
  try { s = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){}
  return Object.assign({
    integrations: { linkedin:false, hubspot:false },
    cadence: { perWeek:5, day:'Monday' },
    over: {},            // per-prospect overrides {status, stage, hubspot, playbook}
    activeWeek: '2026-05-25',
    query: ''
  }, s);
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// merge seed prospect with any saved override
function P(id){ const base = PROSPECTS.find(p=>p.id===id); return Object.assign({}, base, state.over[id]||{}); }
function allP(){ return PROSPECTS.map(p=>P(p.id)); }
function setP(id, patch){ state.over[id] = Object.assign({}, state.over[id]||{}, patch); save(); }

/* ════════════════════════ HELPERS ════════════════════════ */
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function go(path){ location.hash = '#'+path; }
function matchCls(n){ return n>=90?'hi':''; }
// real brand favicon via Google's favicon service (doctrine-sanctioned), graceful fallback to the DS avatar initial
function brandAv(domain, letter, sizeCls){
  const img = domain ? `<img src="https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=128" alt="" loading="lazy" referrerpolicy="no-referrer" onload="if(this.naturalWidth>1)this.parentNode.classList.add('has-logo');else this.remove();" onerror="this.remove()">` : '';
  return `<div class="wav wav-square ${sizeCls||'wav-40'} brand-av">${img}<span>${esc(letter)}</span></div>`;
}
function logoMark(p, sizeCls){ return brandAv(p.domain, p.brand[0], sizeCls); }
function initials(name){ return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function toast(msg){ const t=$('#toast'); $('#toast-icon').innerHTML=I.check; $('#toast-msg').textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
function openingBadge(wn){ return `<span class="badge ${wn.hot?'badge-destructive':'badge-highlight'}">${wn.label}</span>`; }

/* ════════════════════════ NAV ════════════════════════ */
function renderNav(){
  const route = currentRoute();
  const isActive = (n) => {
    if(n.path==='/') return route==='/'||route.startsWith('/prospect');
    return route===n.path;
  };
  const items = [
    { path:'/', icon:I.inbox, label:'This Week' },
    { path:'/pipeline', icon:I.pipeline, label:'Pipeline' },
    { path:'/watchlist', icon:I.eye, label:'Watchlist' },
    { path:'/settings', icon:I.settings, label:'Setup & integrations' },
  ];
  const queue = allP().filter(p=>p.week===state.activeWeek && p.status==='new').length;
  const pipe = allP().filter(p=>p.status==='accepted').length;
  const tracked = allP().filter(p=>p.status==='tracked').length;
  const badge = (path)=> path==='/' && queue ? `<span class="wnav-count">${queue}</span>`
    : path==='/pipeline' && pipe ? `<span class="wnav-count">${pipe}</span>`
    : path==='/watchlist' && tracked ? `<span class="watch-dot" title="${tracked} tracked"></span>` : '';
  const html = items.map(n=>`<a class="wnav-item ${isActive(n)?'active':''}" href="#${n.path}"><span class="wnav-icon">${n.icon}</span><span class="wnav-label">${n.label}</span>${badge(n.path)}</a>`).join('');
  $('#nav').innerHTML = html;
  $('#mobile-nav').innerHTML = items.map(n=>`<a class="wnav-item ${isActive(n)?'active':''}" href="#${n.path}"><span class="wnav-icon">${n.icon}</span><span class="wnav-label">${n.label}</span>${badge(n.path)}</a>`).join('');
  // integrations status badges
  $('#integ-status').innerHTML =
    `<span class="badge badge-lg integ-badge ${state.integrations.linkedin?'badge-active':'badge-secondary'}" title="LinkedIn"><span class="badge-dot"></span>${state.integrations.linkedin?'LinkedIn':'Connect LinkedIn'}</span>`+
    `<span class="badge badge-lg integ-badge ${state.integrations.hubspot?'badge-active':'badge-secondary'}" title="HubSpot"><span class="badge-dot"></span>${state.integrations.hubspot?'HubSpot synced':'HubSpot off'}</span>`+
    `<span class="topbar-powered">Powered by Waldo API</span>`;
  $('#agency-name').textContent = AGENCY.name;
  $('#agency-sub').textContent = AGENCY.domain;
  $('#agency-av').textContent = AGENCY.name[0];
}

/* ════════════════════════ VIEWS ════════════════════════ */
function renderThisWeek(){
  const wk = state.activeWeek;
  const list = allP().filter(p=>p.week===wk);
  const queue = list.filter(p=>p.status==='new');
  const actioned = list.filter(p=>p.status!=='new');
  const weekTabs = WEEKS.map(w=>`<button class="wseg-opt ${w===wk?'active':'inactive'}" onclick="state.activeWeek='${w}';save();render()">${WEEK_LABEL[w]}</button>`).join('');

  let body = '';
  if(queue.length===0 && actioned.length===0){
    body = emptyState('No prospects this week yet', 'Your next five will be delivered '+state.cadence.day+' morning. Adjust cadence in Setup.');
  } else if(queue.length===0){
    body = emptyState('You\'re all caught up', 'Every prospect for '+WEEK_LABEL[wk].toLowerCase()+' has been reviewed. Check your <a href="#/pipeline">Pipeline</a> or come back '+state.cadence.day+'.');
  } else {
    body = `<div class="pstack">${queue.map(prospectCard).join('')}</div>`;
  }
  let reviewed = '';
  if(actioned.length){
    reviewed = `<div class="divider"></div><div class="sec-label" style="margin-bottom:12px">Reviewed (${actioned.length})</div><div class="pstack">${actioned.map(prospectCard).join('')}</div>`;
  }

  $('#content').innerHTML = `
    <div class="page-head">
      <div class="row">
        <div>
          <h1>This Week</h1>
          <div class="sub">${queue.length} new look-alike ${queue.length===1?'prospect':'prospects'} matched to ${AGENCY.name}'s past work · week of ${fmtWeek(wk)}${passedLink()}</div>
        </div>
        <div class="spacer"></div>
        <div class="wseg">${weekTabs}</div>
      </div>
    </div>
    ${body}
    ${reviewed}
    ${apiFoot()}
  `;
}

function prospectCard(p){
  const wn = WHYNOW_META[p.why_now.type];
  const done = p.status!=='new';
  const statusPill = p.status==='accepted' ? `<span class="badge badge-active">Accepted</span>`
    : p.status==='rejected' ? `<span class="badge badge-secondary">Passed</span>`
    : p.status==='tracked' ? `<span class="badge badge-default">Tracking</span>` : '';
  return `
  <div class="pcard ${done?'is-done':''}" role="button" tabindex="0" data-go="/prospect/${p.id}">
    <div class="pcard-top">
      ${logoMark(p)}
      <div class="pcard-id">
        <div class="pcard-name">${esc(p.brand)} <span class="pcard-domain">${esc(p.domain)}</span> ${statusPill}</div>
        <div class="pcard-badges">
          <span class="badge badge-secondary">${esc(p.cat)}</span>
          ${openingBadge(wn)}
        </div>
      </div>
      <div class="pcard-match">
        <div class="match-num ${matchCls(p.score)}">${p.score}<span class="den">/100</span></div>
        <div class="match-label">Match</div>
      </div>
    </div>
    <div class="reason-row">

      </div>

        <div class="reason-lbl opening ${wn.hot?'hot':''}">${I.bolt} Why now</div>
        <p>${esc(p.why_now.headline)}</p>
      </div>
    </div>
    ${done ? '' : `
    <div class="pcard-actions" role="presentation" data-stop>
      <button class="btn btn-default btn-sm" onclick="accept('${p.id}')">${I.check} Accept → Pipeline</button>
      <button class="btn btn-outline btn-sm" onclick="track('${p.id}')">${I.eye} Track</button>
      <button class="btn btn-ghost btn-sm" onclick="reject('${p.id}')">${I.x} Pass</button>
      <div class="grow"></div>
      <button class="btn btn-ghost btn-sm" onclick="go('/prospect/${p.id}')">View brief ${I.arrow}</button>
    </div>`}
  </div>`;
}

function renderPipeline(){
  const accepted = allP().filter(p=>p.status==='accepted');
  const cols = STAGES.map(st=>{
    const items = accepted.filter(p=>(p.stage||'new')===st.id);
    const cards = items.map(p=>{
      const opts = STAGES.map(s=>`<option value="${s.id}" ${(p.stage||'new')===s.id?'selected':''}>${s.label}</option>`).join('');
      return `<div class="mini-card" role="button" tabindex="0" data-go="/prospect/${p.id}">
        <div class="mc-top">${logoMark(p,'wav-24')}<div style="min-width:0"><div class="mc-name">${esc(p.brand)}</div><div class="mc-cat">${esc(p.cat)} · ${p.score}</div></div></div>
        <div class="mc-foot" role="presentation" data-stop>
          <span class="select-wrap mini-sel"><select onchange="setStage('${p.id}',this.value)">${opts}</select></span>
          ${p.hubspot?`<span class="badge badge-secondary badge-sm mc-flag" title="Synced to HubSpot">${I.hub}</span>`:''}
          ${p.playbook?`<span class="badge badge-secondary badge-sm mc-flag" title="Pitch playbook ready">${I.doc}</span>`:''}
        </div>
      </div>`;
    }).join('') || `<div class="note" style="padding:6px 2px">—</div>`;
    return `<div class="pcol">
      <div class="pcol-hd"><span class="pcol-dot ${st.id==='won'?'won':''}"></span>${st.label}<span class="pcol-cnt">${items.length}</span></div>
      ${cards}
    </div>`;
  }).join('');

  const body = accepted.length ? `<div class="pboard">${cols}</div>`
    : emptyState('Your pipeline is empty','Accept prospects from <a href="#/">This Week</a> and they\'ll land here. Drag them through your stages and sync to HubSpot.');

  $('#content').innerHTML = `
    <div class="page-head"><h1>Pipeline</h1><div class="sub">${accepted.length} accepted ${accepted.length===1?'prospect':'prospects'} · move them stage to stage as you work the deal</div></div>
    ${body}
    ${apiFoot()}
  `;
}

          <span class="field-hint">Uploaded — drives your look-alike model</span>
          <div class="chips" style="margin-top:6px">${clientChips}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:10px;align-self:flex-start" onclick="toast('Demo · client-list upload')">${I.upload} Upload client list (CSV)</button>
        </div>
      </div>
    </div>

    <div class="wcard tight">
      <div class="panel-h">${I.spark} Your audience & category fingerprint</div>
      <p class="note">Derived from the audiences your past clients addressed. We score every brand in the index against this.</p>
      <div class="sec-label">Audiences</div>
      <div class="fp-tags">${audTags}</div>
      <div class="sec-label" style="margin-top:6px">Categories</div>
      <div class="fp-tags">${catTags}</div>
    </div>

    <div class="wcard tight">
      <div class="panel-h">${I.link} Integrations</div>
      <div>
        ${integ('linkedin','LinkedIn','Connect to reveal mutual connections with prospect contacts and warm-intro paths.', I.linkedin, 'Connected — mutual connections shown on every prospect.')}
        ${integ('hubspot','HubSpot','Push accepted prospects into your CRM as companies + contacts, kept in sync.', I.hub, 'Connected — accepted prospects sync automatically.')}
      </div>
    </div>

    <div class="wcard tight">
      <div class="panel-h">${I.inbox} Delivery cadence</div>
      <div class="form-col" style="max-width:280px">
        <div class="field"><label class="field-label">Prospects per week</label>
          <span class="select-wrap" style="width:100%"><select style="width:100%" onchange="state.cadence.perWeek=+this.value;save();toast('Cadence updated')">
            ${[3,5,8,10].map(n=>`<option value="${n}" ${state.cadence.perWeek===n?'selected':''}>${n} per week</option>`).join('')}
          </select></span></div>
        <div class="field"><label class="field-label">Delivery day</label>
          <span class="select-wrap" style="width:100%"><select style="width:100%" onchange="state.cadence.day=this.value;save();toast('Cadence updated')">
            ${['Monday','Tuesday','Wednesday','Thursday','Friday'].map(d=>`<option ${state.cadence.day===d?'selected':''}>${d}</option>`).join('')}
          </select></span></div>
      </div>
    </div>
    </div>
    ${apiFoot()}
  `;
}

/* ════════════════════════ SHARED BITS ════════════════════════ */
function emptyState(h, p){ return `<div class="wcard"><div class="wempty wempty-section"><div class="wempty-title">${esc(h)}</div><div class="wempty-desc">${p}</div></div></div>`; }
function apiFoot(){ return `<div class="api-foot">Prototype for the <b>bxcAPI</b> · <a href="/prospector/endpoints.html">See every endpoint Prospector needs →</a> · <a href="/bxcapi/index.html">Brand Intelligence API spec</a></div>`; }
function fmtWeek(w){ const [y,m,d]=w.split('-'); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

/* ════════════════════════ ACTIONS ════════════════════════ */
function accept(id){ setP(id,{status:'accepted', stage:'new'}); if(state.integrations.hubspot) setP(id,{hubspot:true}); toast(P(id).brand+' → Pipeline'); render(); }
function reject(id){ setP(id,{status:'rejected'}); toast('Passed on '+P(id).brand); render(); }
function track(id){ setP(id,{status:'tracked'}); toast('Tracking '+P(id).brand); render(); }
function setStage(id,stage){ setP(id,{stage}); toast(P(id).brand+' → '+STAGES.find(s=>s.id===stage).label); render(); }
function restore(id){ setP(id,{status:'new'}); toast(P(id).brand+' moved back to review'); render(); }
function syncHubspot(id){
  if(!state.integrations.hubspot){ toast('Connect HubSpot in Setup first'); go('/settings'); return; }
  setP(id,{hubspot:true}); toast(P(id).brand+' synced to HubSpot'); render();
}
function makePlaybook(id){
  setP(id,{playbook:true}); toast('Pitch playbook generated for '+P(id).brand);
  // open a representative generated playbook (example output)
  window.open('/pitch-playbook/reddish-ag1.html','_blank','noopener');
  render();
}
function toggleInteg(key){
  state.integrations[key] = !state.integrations[key];
  save();
  if(key==='hubspot' && state.integrations.hubspot){ allP().filter(p=>p.status==='accepted').forEach(p=>setP(p.id,{hubspot:true})); }
  toast((key==='linkedin'?'LinkedIn ':'HubSpot ')+(state.integrations[key]?'connected':'disconnected'));
  render();
}

/* ════════════════════════ SEARCH ════════════════════════ */
function runSearch(q){
  state.query = q.trim().toLowerCase();
  // lightweight: filter the visible cards on This Week & Pipeline
  if(currentRoute()==='/' || currentRoute()==='/pipeline'){ applySearchFilter(); }
}
function applySearchFilter(){
  const q = state.query;
  document.querySelectorAll('.pcard, .mini-card').forEach(el=>{
    const t = el.textContent.toLowerCase();
    el.style.display = (!q || t.includes(q)) ? '' : 'none';
  });
}

/* ════════════════════════ ROUTER ════════════════════════ */
function currentRoute(){ return (location.hash.replace(/^#/,'')||'/'); }
function render(){
  renderNav();
  const r = currentRoute();
  if(r.startsWith('/prospect/')) renderDetail(r.split('/')[2]);
  else if(r==='/pipeline') renderPipeline();
  else if(r==='/watchlist') renderWatchlist();
  else if(r==='/passed') renderPassed();
  else if(r==='/settings'||r==='/setup') renderSettings();
  else renderThisWeek();
  window.scrollTo(0,0);
  if(state.query && (r==='/'||r==='/pipeline')){ $('#search').value=state.query; applySearchFilter(); }
}
window.addEventListener('hashchange', ()=>{ state.query=''; $('#search').value=''; render(); });
$('#search').addEventListener('input', e=>runSearch(e.target.value));
// delegated navigation for clickable cards/rows (data-go) — buttons/links/selects and data-stop zones win
$('#content').addEventListener('click', e=>{
  if(e.target.closest('button, a, select, [data-stop]')) return;
  const t = e.target.closest('[data-go]');
  if(t) go(t.dataset.go);
});
$('#content').addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  const t = e.target.closest('[data-go]');
  if(t && t===e.target) go(t.dataset.go);
});
render();
</script>
</body>
</html>
