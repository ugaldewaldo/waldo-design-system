<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospector — new business, on a schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface-2: #FBFBFD;
    --surface-3: #F2F4F7;
    --border: #E6E8EC;
    --border-2: #EEF0F3;
    --ink: #101828;
    --ink-2: #475467;
    --ink-3: #98A2B3;
    --brand: #4F46E5;
    --brand-2: #6366F1;
    --brand-tint: #EEF0FF;
    --brand-ink: #3730A3;
    --green: #16A34A;  --green-tint: #E7F6EC;
    --amber: #B45309;  --amber-tint: #FDF3E7;
    --red: #DC2626;    --red-tint: #FCEBEB;
    --teal: #0E7490;   --teal-tint: #E0F2F7;
    --shadow: 0 1px 2px rgba(16,24,40,.06);
    --shadow-md: 0 4px 12px rgba(16,24,40,.08);
    --shadow-lg: 0 12px 32px rgba(16,24,40,.12);
    --radius: 12px;
    --radius-sm: 9px;
    --sidebar-w: 252px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--brand); text-decoration: none; }
  .tabular { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  ::selection { background: var(--brand-tint); }

  /* ── App shell ── */
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
  }
  .side-brand { display: flex; align-items: center; gap: 10px; padding: 18px 18px 16px; }
  .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--brand);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(79,70,229,.35);
  }
  .side-brand .wordmark { font-weight: 800; font-size: 17px; letter-spacing: -0.02em; }
  .side-brand .tag { font-size: 10px; color: var(--ink-3); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin-top: 1px; }

  .agency-chip {
    margin: 4px 12px 12px; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--surface-2); cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background .15s;
  }
  .agency-chip:hover { background: var(--surface-3); }
  .agency-avatar {
    width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg,#111827,#374151);
    color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .agency-chip .a-name { font-weight: 700; font-size: 13px; line-height: 1.2; }
  .agency-chip .a-sub { font-size: 11px; color: var(--ink-3); }

  .nav { padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); padding: 12px 12px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 8px 12px; border-radius: 8px;
    color: var(--ink-2); font-weight: 600; font-size: 13.5px; transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--surface-3); color: var(--ink); }
  .nav-item.active { background: var(--brand-tint); color: var(--brand-ink); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 1.9; }
  .nav-item .count { margin-left: auto; font-size: 11px; font-weight: 700; background: var(--brand); color: #fff; border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center; }
  .nav-item.active .count { background: var(--brand); }
  .nav-item .dot { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }

  .side-foot { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); }
  .credit-bar { height: 6px; border-radius: 4px; background: var(--surface-3); overflow: hidden; margin: 8px 0 6px; }
  .credit-bar > i { display: block; height: 100%; background: var(--brand); border-radius: 4px; }
  .side-foot .lbl { font-size: 11px; color: var(--ink-3); display: flex; justify-content: space-between; }

  /* ── Main ── */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 60px; background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px;
    padding: 0 28px; position: sticky; top: 0; z-index: 40;
  }
  .topbar-brand { display: none; align-items: center; gap: 9px; color: var(--ink); }
  .topbar-brand .logo { width: 28px; height: 28px; border-radius: 7px; background: var(--brand); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(79,70,229,.32); flex-shrink: 0; }
  .topbar-brand .tb-name { font-weight: 800; font-size: 16px; letter-spacing: -0.02em; }
  .search {
    flex: 1; max-width: 420px; display: flex; align-items: center; gap: 9px;
    background: var(--surface-3); border: 1px solid transparent; border-radius: 9px; padding: 8px 12px;
    transition: border .15s, background .15s;
  }
  .search .search-ico { cursor: text; }
  .search:focus-within { background: var(--surface); border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-tint); }
  .search svg { width: 16px; height: 16px; color: var(--ink-3); flex-shrink: 0; }
  .search input { border: none; outline: none; background: none; flex: 1; font-size: 13.5px; color: var(--ink); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .integ-pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    padding: 6px 11px; border-radius: 999px; border: 1px solid var(--border); color: var(--ink-2); background: var(--surface);
    white-space: nowrap;
  }
  .integ-pill svg { width: 14px; height: 14px; flex-shrink: 0; }
  .integ-pill .d { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-3); }
  .integ-pill.on { color: var(--green); border-color: var(--green-tint); background: var(--green-tint); }
  .integ-pill.on .d { background: var(--green); }

  .content { padding: 28px 28px 80px; max-width: 1160px; width: 100%; margin: 0 auto; }

  /* ── Page header ── */
  .page-head { margin-bottom: 22px; }
  .page-head h1 { font-size: 25px; font-weight: 800; letter-spacing: -0.02em; }
  .page-head .sub { color: var(--ink-2); margin-top: 5px; font-size: 14px; }
  .page-head .row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .page-head .spacer { flex: 1; }

  .week-switch { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 4px; }
  .week-switch button { padding: 6px 12px; border-radius: 6px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
  .week-switch button.active { background: var(--brand-tint); color: var(--brand-ink); }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 9px; font-weight: 600; font-size: 13px; transition: all .14s; border: 1px solid transparent; white-space: nowrap; }
  .btn svg { width: 15px; height: 15px; stroke-width: 2; }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 1px 2px rgba(79,70,229,.3); }
  .btn-primary:hover { background: #4338CA; }
  .btn-ghost { background: var(--surface); border-color: var(--border); color: var(--ink-2); }
  .btn-ghost:hover { background: var(--surface-3); color: var(--ink); }
  .btn-accept { background: var(--green); color: #fff; }
  .btn-accept:hover { filter: brightness(.95); }
  .btn-reject { background: var(--surface); border-color: var(--border); color: var(--ink-2); }
  .btn-reject:hover { color: var(--red); border-color: var(--red-tint); background: var(--red-tint); }
  .btn-sm { padding: 6px 11px; font-size: 12.5px; }

  /* ── Pills / badges ── */
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: .01em; white-space: nowrap; }
  .pill svg { width: 13px; height: 13px; flex-shrink: 0; }
  .pill.now { background: var(--amber-tint); color: var(--amber); }
  .pill.hot { background: var(--red-tint); color: var(--red); }
  .pill.cat { background: var(--surface-3); color: var(--ink-2); }
  .pill.muted { background: var(--surface-3); color: var(--ink-3); }
  .pill.ok { background: var(--green-tint); color: var(--green); }
  .pill.brand { background: var(--brand-tint); color: var(--brand-ink); }

  .score { font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .score .pct { font-size: 11px; color: var(--ink-3); font-weight: 600; }
  .score.s-hi { color: var(--green); } .score.s-mid { color: var(--brand); } .score.s-lo { color: var(--ink-2); }

  /* ── Prospect cards ── */
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); transition: box-shadow .16s, border-color .16s, transform .16s;
  }
  .pcard { padding: 18px 20px; cursor: pointer; }
  .pcard:hover { box-shadow: var(--shadow-md); border-color: #D6D9DF; }
  .pcard.is-done { opacity: .62; }
  .pcard-top { display: flex; align-items: flex-start; gap: 14px; }
  .brand-logo {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; color: #fff; font-weight: 800; font-size: 18px;
    display: flex; align-items: center; justify-content: center; letter-spacing: -.02em;
    position: relative; overflow: hidden;
  }
  .brand-logo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 16%; background: #fff; }
  .brand-logo.has-logo { background: #fff !important; box-shadow: inset 0 0 0 1px var(--border-2); }
  .pcard h3 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .pcard .domain { color: var(--ink-3); font-size: 12.5px; font-weight: 500; }
  .pcard .badges { display: flex; gap: 7px; margin-top: 7px; flex-wrap: wrap; }
  .pcard-score { margin-left: auto; text-align: right; flex-shrink: 0; }
  .pcard-score .score { font-size: 22px; }
  .pcard-score .slabel { font-size: 10px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }

  .reason-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 15px; }
  .reason { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); padding: 11px 13px; }
  .reason .rl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3); display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .reason .rl svg { width: 13px; height: 13px; }
  .reason p { font-size: 13px; color: var(--ink-2); line-height: 1.5; }
  .reason p b { color: var(--ink); font-weight: 600; }
  .reason.now-r .rl { color: var(--amber); }

  .pcard-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-2); }
  .pcard-actions .grow { flex: 1; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 64px 24px; }
  .empty .ico { width: 56px; height: 56px; border-radius: 14px; background: var(--brand-tint); color: var(--brand); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty .ico svg { width: 26px; height: 26px; }
  .empty h2 { font-size: 19px; font-weight: 700; }
  .empty p { color: var(--ink-2); margin: 7px auto 0; max-width: 420px; }

  /* ── Detail page ── */
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-2); font-weight: 600; font-size: 13px; margin-bottom: 18px; }
  .back-link:hover { color: var(--ink); }
  .back-link svg { width: 15px; height: 15px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 332px; gap: 22px; align-items: start; }
  .detail-hd { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 22px; }
  .detail-hd .brand-logo { width: 56px; height: 56px; font-size: 22px; border-radius: 13px; }
  .detail-hd h1 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 12px; }
  .detail-hd .domain { color: var(--ink-2); font-size: 14px; margin-top: 3px; }
  .detail-hd .domain a { color: var(--ink-2); border-bottom: 1px dashed var(--border); }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 18px; }
  .panel h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel h2 svg { width: 16px; height: 16px; }
  .panel p.lead { font-size: 14.5px; line-height: 1.6; color: var(--ink-2); }
  .panel p.lead b { color: var(--ink); font-weight: 600; }

  .why-now-box { border-left: 3px solid var(--amber); background: var(--amber-tint); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 16px; }
  .why-now-box.hot { border-left-color: var(--red); background: var(--red-tint); }
  .why-now-box .hl { font-weight: 700; color: var(--ink); font-size: 14.5px; display: flex; align-items: center; gap: 8px; }
  .why-now-box .hl svg { width: 18px; height: 18px; flex-shrink: 0; }
  .why-now-box p { color: var(--ink-2); font-size: 13.5px; margin-top: 5px; line-height: 1.55; }
  .why-now-box .src { font-size: 12px; color: var(--ink-3); margin-top: 9px; display: flex; align-items: center; gap: 6px; }
  .why-now-box .src svg { width: 13px; height: 13px; }

  .overlap-row { display: flex; align-items: center; gap: 12px; margin: 9px 0; }
  .overlap-row .nm { width: 130px; font-size: 13px; color: var(--ink-2); font-weight: 500; flex-shrink: 0; }
  .overlap-row .track { flex: 1; height: 8px; border-radius: 5px; background: var(--surface-3); overflow: hidden; }
  .overlap-row .track > i { display: block; height: 100%; background: var(--brand); border-radius: 5px; }
  .overlap-row .v { width: 38px; text-align: right; font-size: 12.5px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .echo { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 999px; padding: 5px 12px 5px 6px; font-size: 13px; font-weight: 600; margin-top: 4px; }
  .echo .ed { width: 22px; height: 22px; border-radius: 50%; color: #fff; font-weight: 800; font-size: 10px; display: flex; align-items: center; justify-content: center; }

  /* contacts */
  .contact { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-2); }
  .contact:last-child { border-bottom: none; padding-bottom: 0; }
  .contact .av { width: 38px; height: 38px; border-radius: 50%; background: var(--surface-3); color: var(--ink-2); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .contact .ci { flex: 1; min-width: 0; }
  .contact .cn { font-weight: 600; font-size: 13.5px; }
  .contact .ct { font-size: 12.5px; color: var(--ink-2); }
  .contact .mutual { font-size: 11.5px; color: var(--green); font-weight: 600; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .contact .mutual svg { width: 12px; height: 12px; }
  .contact .li { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: #0A66C2; flex-shrink: 0; }
  .contact .li:hover { background: var(--surface-3); }
  .li-prompt { background: var(--surface-2); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 13px 15px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--ink-2); }
  .li-prompt svg { width: 20px; height: 20px; color: #0A66C2; flex-shrink: 0; }

  /* side action panel */
  .side-actions .act-btn { width: 100%; justify-content: center; margin-bottom: 9px; }
  .meta-list { font-size: 13px; }
  .meta-list .ml-row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border-2); }
  .meta-list .ml-row:last-child { border-bottom: none; }
  .meta-list .k { color: var(--ink-3); }
  .meta-list .v { font-weight: 600; text-align: right; }

  /* ── Pipeline board ── */
  .board { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 14px; align-items: start; }
  .col { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; min-height: 120px; }
  .col-hd { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--ink-2); margin-bottom: 12px; padding: 0 2px; }
  .col-hd .cdot { width: 8px; height: 8px; border-radius: 50%; }
  .col-hd .cnt { margin-left: auto; color: var(--ink-3); font-weight: 700; }
  .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; margin-bottom: 9px; cursor: pointer; box-shadow: var(--shadow); transition: box-shadow .14s, transform .14s; }
  .mini-card:hover { box-shadow: var(--shadow-md); }
  .mini-card .mc-top { display: flex; align-items: center; gap: 9px; }
  .mini-card .brand-logo { width: 28px; height: 28px; font-size: 12px; border-radius: 7px; }
  .mini-card .mc-name { font-weight: 700; font-size: 13px; }
  .mini-card .mc-cat { font-size: 11px; color: var(--ink-3); }
  .mini-card .mc-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; }
  .mini-card .mc-foot .stage-sel { font-size: 11px; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; font-weight: 600; cursor: pointer; }
  .icon-flag { display: inline-flex; width: 22px; height: 22px; border-radius: 6px; align-items: center; justify-content: center; }
  .icon-flag svg { width: 13px; height: 13px; }
  .icon-flag.hs { background: #FFF1E8; color: #FF7A59; }
  .icon-flag.pb { background: var(--brand-tint); color: var(--brand); }

  /* ── Watchlist ── */
  .wl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .feed-item { display: flex; gap: 13px; padding: 14px 0; border-bottom: 1px solid var(--border-2); }
  .feed-item:last-child { border-bottom: none; }
  .feed-ico { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .feed-ico svg { width: 16px; height: 16px; }
  .feed-item .ft { font-size: 13.5px; line-height: 1.45; }
  .feed-item .ft b { font-weight: 700; }
  .feed-item .fm { font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }
  .tracked-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-2); }
  .tracked-row:last-child { border-bottom: none; }

  /* ── Settings & setup ── */
  .form-row { margin-bottom: 18px; }
  .form-row label { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-2); margin-bottom: 6px; }
  .form-row input[type=text], .form-row input[type=url], .form-row select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--surface); outline: none;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-tint); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: 600; }
  .chip .cx { color: var(--ink-3); cursor: pointer; font-weight: 700; }
  .chip .cdot2 { width: 20px; height: 20px; border-radius: 5px; color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .fingerprint-tag { display: inline-flex; align-items:center; gap:6px; background: var(--brand-tint); color: var(--brand-ink); border-radius: 999px; padding: 5px 12px; font-size: 12.5px; font-weight: 600; margin: 4px 6px 0 0; }

  .integ-card { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; background: var(--surface); }

const LS_KEY = 'prospector_state_v1';
let state = load();
function load(){
  let s = {};
  try { s = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){}
  return Object.assign({
    integrations: { linkedin:false, hubspot:false },
    cadence: { perWeek:5, day:'Monday' },
    over: {},            // per-prospect overrides {status, stage, hubspot, playbook}
    activeWeek: '2026-05-25',
    query: ''
  }, s);
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// merge seed prospect with any saved override
function P(id){ const base = PROSPECTS.find(p=>p.id===id); return Object.assign({}, base, state.over[id]||{}); }
function allP(){ return PROSPECTS.map(p=>P(p.id)); }
function setP(id, patch){ state.over[id] = Object.assign({}, state.over[id]||{}, patch); save(); }

/* ════════════════════════ HELPERS ════════════════════════ */
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function go(path){ location.hash = '#'+path; }
function scoreCls(n){ return n>=90?'s-hi':n>=80?'s-mid':'s-lo'; }
// real brand favicon/logo via Google's favicon service, with a graceful fallback to the colored initial
function brandLogoEl(domain, color, letter, cls){
  const img = domain ? `<img src="https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=128" alt="" loading="lazy" referrerpolicy="no-referrer" onload="if(this.naturalWidth>1)this.parentNode.classList.add('has-logo');else this.remove();" onerror="this.remove()">` : '';
  return `<div class="brand-logo ${cls||''}" style="background:${color}">${img}<span>${esc(letter)}</span></div>`;
}
function logoMark(p){ return brandLogoEl(p.domain, p.color, p.brand[0]); }
function initials(name){ return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function toast(msg){ const t=$('#toast'); t.innerHTML = I.check + esc(msg); t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

function renderNav(){
  const route = currentRoute();
  const isActive = (n) => {
    if(n.path==='/') return route==='/'||route.startsWith('/prospect');
    return route===n.path;
  };
  const items = [
    { path:'/', icon:I.inbox, label:'This Week' },
    { path:'/pipeline', icon:I.pipeline, label:'Pipeline' },
    { path:'/watchlist', icon:I.eye, label:'Watchlist' },
    { path:'/settings', icon:I.settings, label:'Setup & integrations' },
  ];
  const queue = allP().filter(p=>p.week===state.activeWeek && p.status==='new').length;
  const pipe = allP().filter(p=>p.status==='accepted').length;
  const tracked = allP().filter(p=>p.status==='tracked').length;
  const badge = (path)=> path==='/' && queue ? `<span class="count">${queue}</span>`
    : path==='/pipeline' && pipe ? `<span class="count" style="background:var(--ink-3)">${pipe}</span>`
    : path==='/watchlist' && tracked ? `<span class="dot" title="${tracked} tracked"></span>` : '';
  const html = items.map(n=>`<a class="nav-item ${isActive(n)?'active':''}" href="#${n.path}">${n.icon}<span>${n.label}</span>${badge(n.path)}</a>`).join('');
  $('#nav').innerHTML = `<div class="nav-label">Workspace</div>` + html;
  $('#mobile-nav').innerHTML = items.map(n=>`<a class="nav-item ${isActive(n)?'active':''}" href="#${n.path}">${n.icon}<span>${n.label}</span>${badge(n.path)}</a>`).join('');
  // integrations status pills
  $('#integ-status').innerHTML =
    `<span class="integ-pill ${state.integrations.linkedin?'on':''}" title="LinkedIn">${I.linkedin}<span>${state.integrations.linkedin?'LinkedIn':'Connect LinkedIn'}</span></span>`+
    `<span class="integ-pill ${state.integrations.hubspot?'on':''}" title="HubSpot"><span class="d"></span><span>${state.integrations.hubspot?'HubSpot synced':'HubSpot off'}</span></span>`;
  $('#agency-name').textContent = AGENCY.name;
  $('#agency-sub').textContent = AGENCY.domain;
  $('#agency-av').textContent = AGENCY.name[0];
}

function renderThisWeek(){
  const wk = state.activeWeek;
  const list = allP().filter(p=>p.week===wk);
  const queue = list.filter(p=>p.status==='new');
  const actioned = list.filter(p=>p.status!=='new');
  const weekTabs = WEEKS.map(w=>`<button class="${w===wk?'active':''}" onclick="state.activeWeek='${w}';save();render()">${WEEK_LABEL[w]}</button>`).join('');

  let body = '';
  if(queue.length===0 && actioned.length===0){
    body = emptyState(I.inbox, 'No prospects this week yet', 'Your next five will be delivered '+state.cadence.day+' morning. Adjust cadence in Setup.');
  } else if(queue.length===0){
    body = emptyState(I.check, 'You\'re all caught up', 'Every prospect for '+WEEK_LABEL[wk].toLowerCase()+' has been reviewed. Check your <a href="#/pipeline">Pipeline</a> or come back '+state.cadence.day+'.');
  } else {
    body = `<div class="stack">${queue.map(prospectCard).join('')}</div>`;
  }
  let reviewed = '';
  if(actioned.length){
    reviewed = `<div class="divider"></div><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:12px">Reviewed (${actioned.length})</div><div class="stack">${actioned.map(prospectCard).join('')}</div>`;
  }

  $('#content').innerHTML = `
    <div class="page-head">
      <div class="row">
        <div>
          <h1>This Week</h1>
          <div class="sub">${queue.length} new look-alike ${queue.length===1?'prospect':'prospects'} matched to ${AGENCY.name}'s past work · week of ${fmtWeek(wk)}${passedLink()}</div>
        </div>
        <div class="spacer"></div>
        <div class="week-switch">${weekTabs}</div>
      </div>
    </div>
    ${body}
    ${reviewed}
    ${apiFoot()}
  `;
}

    const cards = items.map(p=>{
      const opts = STAGES.map(s=>`<option value="${s.id}" ${(p.stage||'new')===s.id?'selected':''}>${s.label}</option>`).join('');
      return `<div class="mini-card" onclick="go('/prospect/${p.id}')">

      <div class="it"><h3>${name}</h3><p>${state.integrations[key]?blurbOn:desc}</p></div>
      <div class="switch ${state.integrations[key]?'on':''}" onclick="toggleInteg('${key}')"></div>
    </div>`;

  $('#content').innerHTML = `
    <div class="page-head"><h1>Setup & integrations</h1><div class="sub">Prospector learns from your past work, then delivers look-alikes on a schedule</div></div>

    <div class="panel">
      <h2>${I.building} Your agency</h2>
      <div class="form-row"><label>Agency name</label><input type="text" value="${esc(AGENCY.name)}"></div>
      <div class="form-row"><label>Website</label><input type="url" value="https://${esc(AGENCY.domain)}"></div>
      <div class="form-row"><label>Past & current clients <span class="note">(uploaded — drives your look-alike model)</span></label>
        <div class="chips">${clientChips}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="toast('Demo · client-list upload')">${I.upload} Upload client list (CSV)</button>
      </div>
    </div>

    <div class="panel">
      <h2>${I.spark} Your audience & category fingerprint</h2>
      <p class="note" style="margin-bottom:10px">Derived from the audiences your past clients addressed. We score every brand in the index against this.</p>
      <div style="margin-bottom:6px"><span class="note" style="font-weight:700">Audiences</span></div>
      <div>${audTags}</div>
      <div style="margin:16px 0 6px"><span class="note" style="font-weight:700">Categories</span></div>
      <div>${catTags}</div>
    </div>

    <div class="panel">
      <h2>${I.link} Integrations</h2>
      ${integ('linkedin','LinkedIn','Connect to reveal mutual connections with prospect contacts and warm-intro paths.', I.linkedin, '#E8F1FB', '#0A66C2', 'Connected — mutual connections shown on every prospect.')}
      ${integ('hubspot','HubSpot','Push accepted prospects into your CRM as companies + contacts, kept in sync.', I.hub, '#FFF1E8', '#FF7A59', 'Connected — accepted prospects sync automatically.')}
    </div>

    <div class="panel">
      <h2>${I.inbox} Delivery cadence</h2>
      <div class="form-row" style="max-width:280px"><label>Prospects per week</label>
        <select onchange="state.cadence.perWeek=+this.value;save();toast('Cadence updated')">
          ${[3,5,8,10].map(n=>`<option value="${n}" ${state.cadence.perWeek===n?'selected':''}>${n} per week</option>`).join('')}
        </select></div>
      <div class="form-row" style="max-width:280px"><label>Delivery day</label>
        <select onchange="state.cadence.day=this.value;save();toast('Cadence updated')">
          ${['Monday','Tuesday','Wednesday','Thursday','Friday'].map(d=>`<option ${state.cadence.day===d?'selected':''}>${d}</option>`).join('')}
        </select></div>
    </div>
    ${apiFoot()}
  `;
}

/* ════════════════════════ SHARED BITS ════════════════════════ */
function emptyState(icon, h, p){ return `<div class="card"><div class="empty"><div class="ico">${icon}</div><h2>${esc(h)}</h2><p>${p}</p></div></div>`; }
function apiFoot(){ return `<div class="api-foot">Prototype for the <b>bxcAPI</b> · <a href="/prospector/endpoints.html">See every endpoint Prospector needs →</a> · <a href="/bxcapi/index.html">Brand Intelligence API spec</a></div>`; }
function fmtWeek(w){ const [y,m,d]=w.split('-'); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

/* ════════════════════════ ACTIONS ════════════════════════ */
function accept(id){ setP(id,{status:'accepted', stage:'new'}); if(state.integrations.hubspot) setP(id,{hubspot:true}); toast(P(id).brand+' → Pipeline'); render(); }
function reject(id){ setP(id,{status:'rejected'}); toast('Passed on '+P(id).brand); render(); }
function track(id){ setP(id,{status:'tracked'}); toast('Tracking '+P(id).brand); render(); }
function setStage(id,stage){ setP(id,{stage}); toast(P(id).brand+' → '+STAGES.find(s=>s.id===stage).label); render(); }
function restore(id){ setP(id,{status:'new'}); toast(P(id).brand+' moved back to review'); render(); }
function syncHubspot(id){
  if(!state.integrations.hubspot){ toast('Connect HubSpot in Setup first'); go('/settings'); return; }
  setP(id,{hubspot:true}); toast(P(id).brand+' synced to HubSpot'); render();
}
function makePlaybook(id){
  setP(id,{playbook:true}); toast('Pitch playbook generated for '+P(id).brand);
  // open a representative generated playbook (example output)
  window.open('/pitch-playbook/reddish-ag1.html','_blank','noopener');
  render();
}
function toggleInteg(key){
  state.integrations[key] = !state.integrations[key];
  save();
  if(key==='hubspot' && state.integrations.hubspot){ allP().filter(p=>p.status==='accepted').forEach(p=>setP(p.id,{hubspot:true})); }
  toast((key==='linkedin'?'LinkedIn ':'HubSpot ')+(state.integrations[key]?'connected':'disconnected'));
  render();
}

/* ════════════════════════ SEARCH ════════════════════════ */
function toggleSearchMobile(){
  if(window.innerWidth > 940) return;          // desktop: icon is decorative
  const sb = $('#searchbox');
  sb.classList.toggle('expanded');
  if(sb.classList.contains('expanded')) setTimeout(()=>$('#search').focus(), 0);
}
function runSearch(q){
  state.query = q.trim().toLowerCase();
  // lightweight: filter the visible cards on This Week & Pipeline
  if(currentRoute()==='/' || currentRoute()==='/pipeline'){ applySearchFilter(); }
}
function applySearchFilter(){
  const q = state.query;
  document.querySelectorAll('.pcard, .mini-card').forEach(el=>{
    const t = el.textContent.toLowerCase();
    el.style.display = (!q || t.includes(q)) ? '' : 'none';
  });
}

/* ════════════════════════ ROUTER ════════════════════════ */
function currentRoute(){ return (location.hash.replace(/^#/,'')||'/'); }
function render(){
  renderNav();
  const r = currentRoute();
  if(r.startsWith('/prospect/')) renderDetail(r.split('/')[2]);
  else if(r==='/pipeline') renderPipeline();
  else if(r==='/watchlist') renderWatchlist();
  else if(r==='/passed') renderPassed();
  else if(r==='/settings'||r==='/setup') renderSettings();
  else renderThisWeek();
  window.scrollTo(0,0);
  if(state.query && (r==='/'||r==='/pipeline')){ $('#search').value=state.query; applySearchFilter(); }
}
window.addEventListener('hashchange', ()=>{ state.query=''; $('#search').value=''; render(); });
$('#search').addEventListener('input', e=>runSearch(e.target.value));
$('#search').addEventListener('blur', ()=>{ if(!$('#search').value) $('#searchbox').classList.remove('expanded'); });
render();
</script>
</body>
</html>
