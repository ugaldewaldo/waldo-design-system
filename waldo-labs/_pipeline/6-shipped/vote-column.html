<!DOCTYPE html>
<!--
component: Vote Column
source: waldo-labs/sedditw/glossier.html (seddit reconstruction)
date: 2026-07-06
use_when: upvote/downvote affordance on a post or feed item (vertical column variant) or inline vote row on a comment (mini variant)
notes: Upvote active/hover = --primary tint; downvote = neutral foreground (an action, not a negative metric — never --warning/--destructive). Score is tabular-nums 600.
-->
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Column — Pipeline Review</title>
<link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
<link rel="stylesheet" href="../../../waldo-ds.css">
<style>
  html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
  body { height: auto !important; overflow: visible !important; display: block !important; max-width: none !important; margin: 0 !important; padding: 48px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; }
  svg { flex: none; min-height: fit-content; }

  .rev-head { max-width: 640px; margin: 0 auto 36px; }
  .rev-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: hsl(var(--primary)); }
  .rev-title { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; margin-top: 6px; }
  .rev-meta { font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); margin-top: 8px; line-height: 1.6; }
  .demo-row { display: flex; gap: 40px; align-items: flex-start; max-width: 640px; margin: 0 auto; }

  /* Vote Column — vertical (post) */
  .sed-votes { width: 44px; background: hsl(var(--muted)); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 3px; border-radius: var(--radius-xl); }
  .sed-arrow { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius); display: grid; place-items: center; color: hsl(var(--muted-foreground)); transition: background 0.12s, color 0.12s; }
  .sed-arrow:hover { background: hsl(var(--primary) / 0.12); color: hsl(var(--primary)); }
  .sed-arrow.dn:hover { background: hsl(var(--foreground) / 0.08); color: hsl(var(--foreground)); }
  .sed-arrow.on-up { color: hsl(var(--primary)); }
  .sed-arrow.on-dn { color: hsl(var(--foreground)); }
  .sed-score { font-size: var(--fs-xs); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* Vote Row — inline mini (comment) */
  .sed-vrow { display: flex; align-items: center; gap: 4px; }
  .sed-miniarrow { width: 18px; height: 18px; border: none; background: transparent; cursor: pointer; color: hsl(var(--muted-foreground)); display: grid; place-items: center; border-radius: var(--radius); transition: background 0.12s, color 0.12s; }
  .sed-miniarrow:hover { color: hsl(var(--primary)); background: hsl(var(--primary) / 0.12); }
  .sed-miniarrow.dn:hover { color: hsl(var(--foreground)); background: hsl(var(--foreground) / 0.08); }
</style>
</head>
<body>

<div class="rev-head">
  <div class="rev-eyebrow">Pipeline · To review</div>
  <div class="rev-title">Vote Column</div>
  <div class="rev-meta">Upvote/downvote affordance — vertical column (post) + inline mini row (comment). Upvote uses --primary tint; downvote is neutral foreground (an action, not a negative metric — never --warning/--destructive). Source: seddit reconstruction.</div>
</div>

<div class="demo-row">
  <div class="sed-votes">
    <button class="sed-arrow" aria-label="Upvote"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m6 14 6-7 6 7"/></svg></button>
    <span class="sed-score">1.2k</span>
    <button class="sed-arrow dn" aria-label="Downvote"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m6 10 6 7 6-7"/></svg></button>
  </div>
  <div class="sed-vrow">
    <button class="sed-miniarrow" aria-label="Upvote"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m6 14 6-7 6 7"/></svg></button>
    <span class="sed-score">734</span>
    <button class="sed-miniarrow dn" aria-label="Downvote"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m6 10 6 7 6-7"/></svg></button>
  </div>
</div>

</body>
</html>
