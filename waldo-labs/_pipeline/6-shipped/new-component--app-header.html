<!--
component: App Header
source: Figma BRAND-API 281-423 (header) · 281-445 (search row) · 281-31 (full page); doctrine "App Header" section
date: 2026-07-06
use_when:
  - The chrome of every Brand API prototype page — with or without a sidebar (sidebar = workspace nav, additional)
  - One line, exactly two groups - A identity (Waldo SVG + product name, inline, one baseline; logo optional) + B text navigation (right)
notes: Prohibited inside the header - search inputs, status/integration pills, badges, buttons,
  "Powered by" lines, stacked subtitles/descriptors under the logo. Search lives on a SECOND line,
  right-aligned; that line may double as a toolbar (filters/range switchers on its left).
  Exception - if the header has no navigation (B empty), search may take the header's right slot.
  Chrome is sticky + blurred, NO border-bottom (borderless shell). Utility state goes to the
  sidebar panel / Settings, never the header. Requested with this spec - a detect.js
  "header-clutter" rule (input/badge/btn inside the header element) for VALIDATOR.
-->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>Pipeline spec · App Header</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
<link rel="stylesheet" href="../../../waldo-ds.css">
<style>
  html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
  body { height: auto !important; overflow: visible !important; display: block !important; max-width: none !important; margin: 0 !important; font-family: 'Inter', sans-serif; background: hsl(var(--background)); color: hsl(var(--foreground)); font-size: var(--fs-sm); line-height: 1.5; }
  svg { flex: none; min-height: fit-content; }
  * { box-sizing: border-box; }
  .spec-label { max-width: 1184px; margin: 40px auto 8px; padding: 0 24px; font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .06em; color: hsl(var(--muted-foreground)); }

  /* ── App Header — one line, A (identity) + B (nav), nothing else ── */
  .app-header {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(8px);
    background: color-mix(in srgb, hsl(var(--background)) 85%, transparent);
  }
  .app-header-inner {
    max-width: 1184px; margin: 0 auto; padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between; gap: 32px;
  }
  /* A — identity: logo (optional) + product name, inline, ONE baseline, never stacked */
  .app-ident { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .app-ident .product { font-size: var(--fs-lg); font-weight: 500; letter-spacing: -0.02em; color: hsl(var(--foreground)); white-space: nowrap; }
  /* B — navigation: text links only */
  .app-nav { display: flex; align-items: center; gap: 24px; }
  .app-nav a { font-size: var(--fs-sm); color: hsl(var(--muted-foreground)); text-decoration: none; }
  .app-nav a:hover { color: hsl(var(--foreground)); }
  .app-nav a.active { color: hsl(var(--foreground)); font-weight: 500; }

  /* ── Second line — search row / toolbar (search right, optional controls left) ── */
  .app-toolbar {
    max-width: 1184px; margin: 0 auto; padding: 10px 24px 0;
    display: flex; align-items: center; justify-content: flex-end; gap: 16px;
  }
  .app-toolbar .toolbar-left { margin-right: auto; display: flex; align-items: center; gap: 12px; }
  .app-search { width: 360px; max-width: 100%; }
  .app-search .input { height: 36px; }
</style>
</head>
<body>

<div class="spec-label">1 · Header — A identity + B navigation (canonical, 281-423)</div>
<header class="app-header">
  <div class="app-header-inner">
    <div class="app-ident">

      <span class="product">Prospector</span>
    </div>
    <nav class="app-nav">
      <a class="active" href="#">Dashboard</a>
      <a href="#">Alerts</a>
      <a href="#">API coverage</a>
      <a href="#">bxcAPI</a>
    </nav>
  </div>
</header>

<div class="spec-label">2 · Second line — search row, may double as toolbar (281-445)</div>
<div class="app-toolbar">
  <div class="toolbar-left">
    <div class="wseg">
      <button class="wseg-opt active">This week</button>
      <button class="wseg-opt inactive">May 18</button>
      <button class="wseg-opt inactive">May 11</button>
    </div>
  </div>
  <div class="app-search input-with-icon">
    <div class="input-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <input class="input" type="text" placeholder="Search prospects, brands, categories…">
  </div>
</div>

<div class="spec-label" style="margin-top:56px">3 · Exception — no navigation (B empty) → search may take the header's right slot</div>
<header class="app-header">
  <div class="app-header-inner">
    <div class="app-ident">
      <span class="product">Promo Radar</span>
    </div>
    <div class="app-search input-with-icon">
      <div class="input-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input class="input" type="text" placeholder="Search brands…">
    </div>
  </div>
</header>

<div style="height:80px"></div>
</body>
</html>
