<!--
component: NavPanel sticky head (.wnav-head)
source: doctrines/index.html (Doctrines app sidebar) + index.html #wb-sidebar sticky search
date: 2026-07-07
use_when: A scrolling NavPanel whose head controls (workspace chip, search input) must stay
  visible while the item list scrolls — app-shell sidebars with long lists (components,
  spaces, feeds).
notes: Not a new atom — a composition rule of the nav kit. The head wraps the workspace
  chip and/or wnav-search in one sticky container: position sticky, top 0, background
  var(--popover) so items scroll under it, never through it. Pairs with the sidebar
  scrollbar rule (scrollbar-width none). Candidate canonical class: .wnav-head in
  waldo-ds.css; today it lives locally in the Doctrines app and as an id-scoped rule
  for #wb-sidebar. Documented in usage-doctrine.yaml → Sidebar → notes (STICKY HEAD).
-->
<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <title>NavPanel sticky head</title>
  <link rel="stylesheet" href="../../../waldo-ui/waldo-shadcn-theme.css">
  <link rel="stylesheet" href="../../../waldo-ds.css">
  <style>
    html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
    body { height: auto !important; overflow: visible !important; display: block !important;
           background: hsl(var(--background)); color: hsl(var(--foreground));
           font-family: Inter, system-ui, sans-serif; margin: 0; padding: 40px; }
    .demo-shell { height: 480px; }
    .demo-shell .wnav-panel { border-radius: var(--radius-3xl); padding: 0 0 8px; height: 100%;
                              overflow-y: auto; scrollbar-width: none; }
    .demo-shell .wnav-panel::-webkit-scrollbar { width: 0; }
    /* the pattern: sticky head over a scrolling list */
    .wnav-head { position: sticky; top: 0; z-index: 5; background: hsl(var(--popover));
                 padding-top: 20px; }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="wnav-panel">
      <div class="wnav-head">
        <div class="wnav-items-wrap">
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg></span>
            <span class="wnav-label">Waldo Marketing</span>
            <span class="wnav-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="7 15 12 20 17 15"/><polyline points="7 9 12 4 17 9"/></svg></span>
          </div>
        </div>
        <div class="wnav-search">
          <div class="input-with-icon">
            <div class="input-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
            <input class="input input--ghost" placeholder="Search components…">
          </div>
        </div>
      </div>
      <div class="sb-group-label">Components</div>
      <div class="sb-items-wrap">
        <button class="sb-item active">Accordion</button>
        <button class="sb-item">Alert</button>
        <button class="sb-item">Alert Dialog</button>
        <button class="sb-item">Avatar</button>
        <button class="sb-item">Badge</button>
        <button class="sb-item">Breadcrumb</button>
        <button class="sb-item">Button</button>
        <button class="sb-item">Calendar</button>
        <button class="sb-item">Card</button>
        <button class="sb-item">Carousel</button>
        <button class="sb-item">Checkbox</button>
        <button class="sb-item">Collapsible</button>
        <button class="sb-item">Combobox</button>
        <button class="sb-item">Command</button>
        <button class="sb-item">Context Menu</button>
        <button class="sb-item">Data Table</button>
        <button class="sb-item">Date Picker</button>
        <button class="sb-item">Dialog</button>
        <button class="sb-item">Drawer</button>
        <button class="sb-item">Dropdown Menu</button>
      </div>
    </div>
  </div>
</body>
</html>
