<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doctrine Severity Panel</title>
  <link rel="stylesheet" href="/waldo-ui/waldo-shadcn-theme.css">
  <link rel="stylesheet" href="/waldo-ds.css">
  <style>
    html { height: auto !important; overflow: visible !important; overflow-y: auto !important; }
    body { height: auto !important; overflow: visible !important; display: block !important;
           background: hsl(var(--background)); color: hsl(var(--foreground));
           font-family: Inter, system-ui, sans-serif; margin: 0; }
    svg { flex: none; }

    /* topbar — identity left, actions right (one line) */
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center;
              justify-content: space-between; gap: 16px; padding: 14px 28px;
              background: hsl(var(--background) / 0.72); backdrop-filter: blur(12px); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand .title { font-size: 15px; font-weight: 500; letter-spacing: -0.02em; }
    .brand .title span { color: hsl(var(--muted-foreground)); font-weight: 400; }
    .actions { display: flex; align-items: center; gap: 10px; }
    .count { font-size: 13px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }
    .dirty-dot { width: 7px; height: 7px; border-radius: 9999px; background: hsl(var(--warning));
                 display: none; }
    .is-dirty .dirty-dot { display: inline-block; }

    .btn:disabled { opacity: .45; cursor: default; }

    /* toolbar */
    .toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 12px;
               padding: 8px 28px 20px; }
    .search-wrap { width: 260px; }

    /* board */
    .board { display: flex; gap: 16px; padding: 0 28px 48px; align-items: stretch; }
    .col { flex: 1; min-width: 0; background: hsl(var(--card)); border-radius: var(--radius);
           padding: 16px; display: flex; flex-direction: column; }
    .col-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .sev-dot { width: 9px; height: 9px; border-radius: 9999px; flex: none; }
    .col[data-sev="hard"]   .sev-dot { background: hsl(var(--destructive)); }
    .col[data-sev="should"] .sev-dot { background: hsl(var(--warning)); }
    .col[data-sev="pref"]   .sev-dot { background: hsl(var(--muted-foreground)); }
    .col-title { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
    .col-n { margin-left: auto; font-variant-numeric: tabular-nums; }
    .col-note { font-size: 12px; line-height: 1.45; color: hsl(var(--muted-foreground)); margin: 0 0 7px; }
    .col-axis { font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase; margin: 0 0 12px;
                color: hsl(var(--muted-foreground) / 0.65); }
    .col-body { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 60px; }
    .col-body.drop-hint { outline: 1.5px dashed hsl(var(--primary) / 0.5); outline-offset: 4px; border-radius: var(--radius); }

    .card { background: hsl(var(--muted)); border-radius: calc(var(--radius) - 2px);
            padding: 11px 13px; font-size: 13px; line-height: 1.5; cursor: grab;
            display: flex; gap: 10px; align-items: flex-start; }
    .card:hover { background: color-mix(in srgb, hsl(var(--foreground)) 5%, hsl(var(--muted))); }
    .card.dragging { opacity: .4; cursor: grabbing; }
    .card .grip { color: hsl(var(--muted-foreground)); font-size: 12px; line-height: 1.5; flex: none;
                  user-select: none; letter-spacing: -1px; }
    .card .txt { flex: 1; min-width: 0; }
    .card code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11.5px;
                 background: hsl(var(--secondary)); padding: 1px 5px; border-radius: 4px; }
    .card.hidden { display: none; }
    .card .edit, .card .del { flex: none; background: none; border: none; cursor: pointer;
                 color: hsl(var(--muted-foreground)); font-size: 14px; line-height: 1.4; padding: 0 2px;
                 opacity: 0; transition: opacity .12s, color .12s; }
    .card:hover .edit, .card:hover .del { opacity: .55; }
    .card .edit:hover { color: hsl(var(--primary)); opacity: 1; }
    .card .del:hover { color: hsl(var(--destructive)); opacity: 1; }

    .col-add { margin-top: 10px; align-self: flex-start; }
    .add-input { font: inherit; font-size: 13px; line-height: 1.5; width: 100%; box-sizing: border-box;
                 resize: vertical; background: hsl(var(--secondary)); color: hsl(var(--foreground));
                 border: 1px solid hsl(var(--primary) / 0.6); border-radius: calc(var(--radius) - 2px);
                 padding: 10px 12px; }
    .add-input:focus { outline: none; border-color: hsl(var(--primary)); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
             background: hsl(var(--popover)); color: hsl(var(--foreground)); padding: 10px 18px;
             border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow-lg, 0 8px 30px rgba(0,0,0,.4));
             opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* tabs + calibration gallery */
    [hidden] { display: none !important; }
    .tabsbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 28px 0; }
    .cal-intro { color: hsl(var(--muted-foreground)); font-size: 13px; line-height: 1.55;
                 max-width: 920px; padding: 14px 28px 4px; margin: 0; }
    .cal-wrap { display: flex; flex-direction: column; gap: 12px; padding: 10px 28px 48px; }
    .cal-row { background: hsl(var(--card)); border-radius: var(--radius); padding: 16px; }
    .cal-dim { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 12px; }
    .cal-pair { display: flex; gap: 12px; }
    @media (max-width: 720px) { .cal-pair { flex-direction: column; } }
    .cal-cell { flex: 1; background: hsl(var(--muted)); border-radius: calc(var(--radius) - 2px);
                padding: 12px 14px; font-size: 13px; line-height: 1.55; }
    .cal-cell .lab { display: flex; align-items: center; gap: 6px; font-size: 11px;
                     text-transform: uppercase; letter-spacing: .05em; font-weight: 500; margin-bottom: 7px; }
    .cal-gold .lab { color: hsl(var(--primary)); }
    .cal-slop .lab { color: hsl(var(--destructive)); }
    .cal-cell code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11.5px;
                     background: hsl(var(--secondary)); padding: 1px 5px; border-radius: 4px; }
    .cal-bar { display: flex; align-items: center; gap: 10px; padding: 4px 28px 0; }
    .cal-bar .dirty-dot { display: none; width: 7px; height: 7px; border-radius: 9999px; background: hsl(var(--warning)); }
    .cal-bar.is-dirty .dirty-dot { display: inline-block; }
    .cal-row { position: relative; }
    .cal-dim, .cal-cell .body { cursor: text; border-radius: 4px; }
    .cal-dim:hover, .cal-cell .body:hover { background: hsl(var(--foreground) / 0.05); }
    .cal-del { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer;
               color: hsl(var(--muted-foreground)); font-size: 15px; line-height: 1; opacity: 0; transition: opacity .12s, color .12s; }
    .cal-row:hover .cal-del { opacity: .55; }
    .cal-del:hover { color: hsl(var(--destructive)); opacity: 1; }
    .cal-edit { font: inherit; font-size: 13px; line-height: 1.5; width: 100%; box-sizing: border-box; resize: vertical;
                background: hsl(var(--secondary)); color: hsl(var(--foreground)); border: 1px solid hsl(var(--primary) / 0.6);
                border-radius: calc(var(--radius) - 2px); padding: 8px 10px; }
    .cal-edit:focus { outline: none; border-color: hsl(var(--primary)); }
  </style>
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="brand">
      <svg width="70" height="18" viewBox="0 0 69.75 18" fill="none" style="color:hsl(var(--foreground))" xmlns="http://www.w3.org/2000/svg"><path d="M63.2676 0C67.6298 0 69.75 2.26338 69.75 7.52148V10.6641C69.75 15.7985 67.6298 18 63.2676 18C58.8935 17.9984 56.7862 15.7968 56.7861 10.6641V7.52148C56.7861 2.26354 58.8934 0.000133701 63.2676 0ZM37.0039 14.6191L41.9775 13.9814V17.6562H32.4795V0.335938H37.0039V14.6191ZM5.47168 7.7832C5.68287 9.47803 5.78297 10.7646 5.85742 12.6689H6.10645C6.21888 10.7887 6.35555 9.37851 6.53027 7.7832L7.39062 0.335938H11.4912L12.4258 7.7832C12.6248 9.37852 12.7498 10.7902 12.8379 12.6689H13.1113C13.2116 10.7887 13.3102 9.47652 13.4971 7.7832L14.3193 0.335938H18.707L15.9277 17.6543H10.5449L10.0469 13.4609C9.79769 11.4328 9.62264 9.51443 9.49805 7.43652H9.23633C9.09958 9.51443 8.91281 11.4072 8.67578 13.4609L8.20215 17.6543H2.90332L0 0.335938H4.54883L5.47168 7.7832ZM31.6318 17.6543H26.8457L26.4961 15.5762H22.3086L21.959 17.6543H17.6094L21.6221 0.335938H27.5312L31.6318 17.6543ZM49.2207 0.335938C53.5328 0.335938 55.5898 2.67494 55.5898 7.61035V10.4062C55.5897 15.3172 53.5327 17.6543 49.2207 17.6543H43.2373V0.335938H49.2207ZM63.2676 3.55078C61.984 3.55097 61.3614 4.50431 61.3613 6.48242V11.6904C61.3613 13.5465 61.9839 14.449 63.2676 14.4492C64.5515 14.4492 65.1748 13.5452 65.1748 11.6904V6.48242C65.1748 4.5026 64.5515 3.55078 63.2676 3.55078ZM47.7617 14.1035H48.9717C50.3558 14.1035 51.0156 13.3613 51.0156 11.79V6.19824C51.0155 4.62735 50.3542 3.88577 48.9717 3.88574H47.7617V14.1035ZM24.2764 4.36816C24.1761 5.76588 23.989 7.03991 23.7656 8.53711L22.9043 12.7627L25.834 12.3721L25.0742 8.5498C24.8493 7.04039 24.65 5.76599 24.5254 4.36816H24.2764Z" fill="currentColor"/></svg>
      <div class="title">Doctrine Severity Panel <span>· Brand API dashboard doctrine</span></div>
    </div>
    <div class="actions">
      <span class="dirty-dot" title="Unsaved changes"></span>
      <span class="count" id="count">—</span>
      <button class="btn btn-outline btn-sm" id="reload">Reload</button>
      <button class="btn btn-default btn-sm" id="save" disabled>Save to document</button>
    </div>
  </header>

  <div class="tabsbar">
    <div class="wtabs-text" id="tabs">
      <button class="wtab-text active" data-view="severity">Severity</button>
      <button class="wtab-text" data-view="calibration">Calibration</button>
    </div>
    <button class="btn btn-outline btn-sm" id="cal-add" hidden>+ Add dimension</button>
  </div>

  <div id="view-severity">
    <div class="toolbar">
      <div class="search-wrap"><input class="input input--ghost" id="search" type="search" placeholder="Filter rules…" autocomplete="off"></div>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div id="view-calibration" hidden>
    <p class="cal-intro" id="cal-intro"></p>
    <div class="cal-wrap" id="cal-wrap"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SEVS = ['hard', 'should', 'pref'];
    let TIERS = {};
    let state = { hard: [], should: [], pref: [] };   // arrays of rule objects, order = hierarchy
    let byId = {};                                     // id → rule object (incl. newly added)
    let idSeq = 1;
    let dirty = false;

    const $ = s => document.querySelector(s);
    const board = $('#board'), countEl = $('#count'), saveBtn = $('#save');

    function esc(s) {
      return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]))
              .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    let activeView = 'severity';
    function refreshTopbar() {
      const d = activeView === 'severity' ? dirty : calDirty;
      document.body.classList.toggle('is-dirty', d);
      saveBtn.disabled = !d;
    }
    function setDirty(v) { dirty = v; refreshTopbar(); }

    function render() {
      board.innerHTML = '';
      let total = 0;
      for (const sev of SEVS) {
        total += state[sev].length;
        const col = document.createElement('div');
        col.className = 'col'; col.dataset.sev = sev;
        col.innerHTML =
          `<div class="col-head"><span class="sev-dot"></span>` +
          `<span class="col-title">${esc(TIERS[sev].heading)}</span>` +
          `<span class="badge badge-secondary badge-sm col-n">${state[sev].length}</span></div>` +
          `<p class="col-note">${esc(TIERS[sev].note)}</p>` +
          `<div class="col-axis">↑ most often violated · ↓ rarer</div>` +
          `<div class="col-body"></div>`;
        const body = col.querySelector('.col-body');
        for (const r of state[sev]) body.appendChild(cardEl(r));
        wireColumn(col, body);
        const add = document.createElement('button');
        add.className = 'col-add btn btn-outline btn-sm'; add.textContent = '+ Add rule';
        add.addEventListener('click', () => startAdd(col, sev));
        col.appendChild(add);
        board.appendChild(col);
      }
      countEl.textContent = total + ' rules';
      applyFilter();
    }

    function cardEl(r) {
      const el = document.createElement('div');
      el.className = 'card'; el.draggable = true; el.dataset.id = r.id;
      el.innerHTML = `<span class="grip">⠿</span>` +
                     `<span class="txt" title="Double-click to edit">${esc(r.text)}</span>` +
                     `<button class="edit" title="Edit rule" aria-label="Edit rule">✎</button>` +
                     `<button class="del" title="Delete rule" aria-label="Delete rule">×</button>`;
      el.addEventListener('dragstart', () => { el.classList.add('dragging'); });
      el.addEventListener('dragend', () => { el.classList.remove('dragging'); rebuildFromDOM(); });
      el.querySelector('.edit').addEventListener('click', e => { e.stopPropagation(); startEdit(r, el); });
      el.querySelector('.del').addEventListener('click', e => {
        e.stopPropagation();
        if (!confirm('Delete this rule?\n\n' + r.text)) return;
        SEVS.forEach(s => state[s] = state[s].filter(x => x !== r));
        delete byId[r.id];
        render(); setDirty(true);
      });
      el.addEventListener('dblclick', e => {
        if (e.target.closest('.del')) return;
        startEdit(r, el);
      });
      return el;
    }

    function startEdit(r, el) {
      if (el.querySelector('.add-input')) return;
      el.draggable = false;
      el.innerHTML = '';
      const ta = document.createElement('textarea');
      ta.className = 'add-input'; ta.value = r.text;
      ta.rows = Math.max(2, Math.ceil(r.text.length / 46));
      el.appendChild(ta);
      ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
      let done = false;
      const commit = () => {
        if (done) return; done = true;
        const text = ta.value.trim();
        if (text && text !== r.text) { r.text = text; setDirty(true); }
        render();
      };
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { done = true; render(); }
      });
      ta.addEventListener('blur', commit);
    }

    function startAdd(col, sev) {
      if (col.querySelector('.add-input')) return;
      const ta = document.createElement('textarea');
      ta.className = 'add-input'; ta.rows = 2;
      ta.placeholder = 'New rule… (Enter to add · Esc to cancel · `code` renders inline)';
      col.querySelector('.col-body').appendChild(ta);
      ta.focus();
      let done = false;
      const commit = () => {
        if (done) return; done = true;
        const text = ta.value.trim(); ta.remove();
        if (!text) return;
        const r = { id: 'n' + (idSeq++), text, severity: sev };
        byId[r.id] = r; state[sev].push(r);
        render(); setDirty(true);
      };
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { done = true; ta.remove(); }
      });
      ta.addEventListener('blur', commit);
    }

    function afterEl(body, y) {
      const els = [...body.querySelectorAll('.card:not(.dragging)')];
      return els.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        return offset < 0 && offset > closest.offset ? { offset, el: child } : closest;
      }, { offset: -Infinity }).el;
    }

    function wireColumn(col, body) {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        body.classList.add('drop-hint');
        const dragging = document.querySelector('.dragging');
        if (!dragging) return;
        const ref = afterEl(body, e.clientY);
        if (ref == null) body.appendChild(dragging); else body.insertBefore(dragging, ref);
      });
      col.addEventListener('dragleave', () => body.classList.remove('drop-hint'));
      col.addEventListener('drop', e => { e.preventDefault(); body.classList.remove('drop-hint'); });
    }

    function rebuildFromDOM() {
      const next = { hard: [], should: [], pref: [] };
      document.querySelectorAll('.col').forEach(col => {
        const sev = col.dataset.sev;
        col.querySelectorAll('.card').forEach(c => {
          const r = byId[c.dataset.id]; r.severity = sev; next[sev].push(r);
        });
      });
      state = next;
      for (const sev of SEVS) $(`.col[data-sev="${sev}"] .col-n`).textContent = state[sev].length;
      setDirty(true);
    }

    function applyFilter() {
      const q = $('#search').value.trim().toLowerCase();
      document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('hidden', q && !c.textContent.toLowerCase().includes(q)));
    }

    function toast(msg) {
      const t = $('#toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2600);
    }

    async function load() {
      const res = await fetch('/api/rules');
      const data = await res.json();
      TIERS = data.tiers;
      state = { hard: [], should: [], pref: [] };
      byId = {};
      data.rules.forEach(r => { byId[r.id] = r; state[r.severity || 'hard'].push(r); });
      idSeq = data.rules.reduce((m, r) => Math.max(m, Number(r.id) || 0), 0) + 1;
      render(); setDirty(false);
    }

    async function save() {
      const rules = [];
      for (const sev of SEVS) for (const r of state[sev]) rules.push({ text: r.text, severity: sev });
      const res = await fetch('/api/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rules })
      });
      const data = await res.json();
      if (data.ok) {
        setDirty(false);
        toast(`Saved · ${state.hard.length} hard · ${state.should.length} should · ${state.pref.length} pref`);
      } else toast('Save failed: ' + (data.error || 'unknown'));
    }

    // --- tabs + calibration gallery (editable) ---
    let calLoaded = false;
    let calIntro = '';
    let calRows = [];                 // [{dimension, gold, slop}] — raw text
    let calDirty = false;

    function setCalDirty(v) { calDirty = v; refreshTopbar(); }

    function editField(el, obj, key) {
      if (el.querySelector('.cal-edit')) return;
      const ta = document.createElement('textarea');
      ta.className = 'cal-edit'; ta.value = obj[key];
      ta.rows = Math.max(2, Math.ceil((obj[key].length || 1) / 42));
      el.innerHTML = ''; el.appendChild(ta);
      ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
      let done = false;
      const commit = () => {
        if (done) return; done = true;
        const t = ta.value.trim();
        if (t !== obj[key]) { obj[key] = t; setCalDirty(true); }
        renderCalibration();
      };
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { done = true; renderCalibration(); }
      });
      ta.addEventListener('blur', commit);
    }

    function renderCalibration() {
      const wrap = $('#cal-wrap'); wrap.innerHTML = '';
      calRows.forEach(row => {
        const el = document.createElement('div');
        el.className = 'cal-row';
        el.innerHTML =
          `<div class="cal-dim" data-k="dimension">${esc(row.dimension)}</div>` +
          `<div class="cal-pair">` +
            `<div class="cal-cell cal-gold"><div class="lab">✓ Gold</div><div class="body" data-k="gold">${esc(row.gold)}</div></div>` +
            `<div class="cal-cell cal-slop"><div class="lab">✗ Slop</div><div class="body" data-k="slop">${esc(row.slop)}</div></div>` +
          `</div>` +
          `<button class="cal-del" title="Delete dimension">×</button>`;
        el.querySelector('[data-k="dimension"]').addEventListener('click', e => editField(e.currentTarget, row, 'dimension'));
        el.querySelectorAll('.cal-cell .body').forEach(b => b.addEventListener('click', e => editField(e.currentTarget, row, e.currentTarget.dataset.k)));
        el.querySelector('.cal-del').addEventListener('click', () => {
          if (!confirm('Delete dimension "' + row.dimension + '"?')) return;
          calRows = calRows.filter(r => r !== row); renderCalibration(); setCalDirty(true);
        });
        wrap.appendChild(el);
      });
    }

    async function loadCalibration() {
      const d = await (await fetch('/api/calibration')).json();
      calIntro = d.intro || '';
      calRows = (d.rows || []).map(r => ({ ...r }));
      $('#cal-intro').textContent = calIntro;
      renderCalibration(); setCalDirty(false);
      calLoaded = true;
    }

    async function saveCalibration() {
      const res = await fetch('/api/save-calibration', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ intro: calIntro, rows: calRows })
      });
      const d = await res.json();
      if (d.ok) { setCalDirty(false); toast(`Saved · ${calRows.length} dimensions`); }
      else toast('Save failed: ' + (d.error || 'unknown'));
    }
    document.querySelectorAll('#tabs .wtab-text').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('#tabs .wtab-text').forEach(x => x.classList.toggle('active', x === b));
      const v = b.dataset.view;
      activeView = v;
      $('#view-severity').hidden = v !== 'severity';
      $('#view-calibration').hidden = v !== 'calibration';
      $('#cal-add').hidden = v !== 'calibration';
      if (v === 'calibration' && !calLoaded) loadCalibration();
      refreshTopbar();
    }));
    $('#cal-add').addEventListener('click', () => {
      calRows.unshift({ dimension: 'New dimension', gold: '', slop: '' });
      renderCalibration(); setCalDirty(true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      const first = document.querySelector('#cal-wrap .cal-row:first-child [data-k="dimension"]');
      if (first) first.click();
    });

    $('#search').addEventListener('input', applyFilter);
    $('#reload').addEventListener('click', () => {
      if ((dirty || calDirty) && !confirm('Discard unsaved changes and reload from disk?')) return;
      load(); if (calLoaded) loadCalibration();
    });
    saveBtn.addEventListener('click', () => activeView === 'severity' ? save() : saveCalibration());
    window.addEventListener('beforeunload', e => { if (dirty || calDirty) { e.preventDefault(); e.returnValue = ''; } });

    load();
  </script>
</body>
</html>
