<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proposal · Sidebar</title>
<link rel="stylesheet" href="waldo-ds.css" />
<style>
  body { margin:0; background:var(--background); color:var(--foreground); font-family:'Inter',sans-serif; min-height:100vh; }
  .proposal-wrap { display:flex; gap:48px; padding:48px; align-items:flex-start; flex-wrap:wrap; }
  .proposal-label { font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:.06em; color:var(--muted-foreground); margin-bottom:16px; }
</style>
</head>
<body>
  <div class="proposal-wrap">
    <div>
      <div class="proposal-label">Proposal — app shell (pill / Linear)</div>
      <div class="wnav-panel">
        <!-- Workspace switcher -->
        <div class="wnav-items-wrap">
          <div class="wnav-item">
            <span class="avatar av-sm av-brand">N</span>
            <span class="wnav-label">Nike</span>
            <span class="wnav-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 9 6 6 6-6"/></svg></span>
          </div>
        </div>
        <!-- Search -->
        <div class="wnav-search">
          <div class="input-with-icon">
            <div class="input-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
            <input class="input input--ghost" placeholder="Search" />
          </div>
        </div>
        <!-- Group: Workspace -->
        <span class="wnav-section">Workspace</span>
        <div class="wnav-items-wrap">
          <div class="wnav-item active">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></span>
            <span class="wnav-label">Dashboard</span>
          </div>
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg></span>
            <span class="wnav-label">Brands</span>
            <span class="wnav-count">24</span>
          </div>
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg></span>
            <span class="wnav-label">Alerts</span>
            <span class="wnav-badge">3</span>
          </div>
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></span>
            <span class="wnav-label">Reports</span>
          </div>
        </div>
        <!-- Group: Intelligence -->
        <span class="wnav-section">Intelligence</span>
        <div class="wnav-items-wrap">
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></span>
            <span class="wnav-label">Share of Voice</span>
          </div>
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            <span class="wnav-label">Audiences</span>
          </div>
          <div class="wnav-item">
            <span class="wnav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>
            <span class="wnav-label">Competitive Sets</span>
          </div>
        </div>
        <div class="wnav-sep"></div>
        <!-- Footer: user -->
        <div class="wnav-items-wrap">
          <div class="wnav-item">
            <span class="avatar av-sm">MG</span>
            <span class="wnav-label">Miguel Ugalde</span>
            <span class="wnav-action visible"><button class="wli-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
