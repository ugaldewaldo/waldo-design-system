# ── Brand palette — MARKETING ONLY, never in product UI ─────────────
brand_marketing_only:
  warning: Using any of these in product UI is a violation. Marketing surfaces only.
  colors:
    - { hex: "#63dbdb", name: brand-green-500,  tailwind: bg-brand-green-500 }
    - { hex: "#1b8c8c", name: brand-green-700,  tailwind: bg-brand-green-700 }
    - { hex: "#fac034", name: brand-yellow-500, tailwind: bg-brand-yellow-500 }
    - { hex: "#d40a60", name: brand-pink-500,   tailwind: bg-brand-pink-500 }
    - { hex: "#bdd8d8", name: brand-chrome-500, tailwind: bg-brand-chrome-500 }
    - { hex: "#813aef", name: brand-purple-500, tailwind: bg-brand-purple-500 }

# ────────────────────────────────────────────────────────────────────
# RADIUS — closed collection, never add steps
# ────────────────────────────────────────────────────────────────────
radius:
  rule: NEVER rounded-[Xpx] arbitrary values — always the token class.
  steps:
    - { px: 4,    token: radius.sm,    tailwind: rounded-sm,    use: "square avatars" }
    - { px: 6,    token: radius.md,    tailwind: rounded-md,    use: "cards, menu items, tables (base --radius)" }
    - { px: 8,    token: radius.lg,    tailwind: rounded-lg,    use: "—" }
    - { px: 12,   token: radius.xl,    tailwind: rounded-xl,    use: "—" }
    - { px: 16,   token: radius.2xl,   tailwind: rounded-2xl,   use: "copy-link container" }
    - { px: 20,   token: radius.2_5xl, tailwind: rounded-2-5xl, use: "dropdowns, selects, command palettes" }
    - { px: 24,   token: radius.3xl,   tailwind: rounded-3xl,   use: "file input (per STATUS.md), nav panels" }
    - { px: 32,   token: radius.4xl,   tailwind: rounded-4xl,   use: "—" }
    - { px: 9999, token: radius.full,  tailwind: rounded-full,  use: "buttons, inputs, badges, tags, checkboxes (circular!), switches, pills" }

# ────────────────────────────────────────────────────────────────────
# SPACING — Tailwind scale IS the token (1=4px, 2=8px, 3=12px, 4=16px…)
# ────────────────────────────────────────────────────────────────────
spacing:
  rule: Use Tailwind utilities directly (px-4, gap-3). NEVER px-[16px] or inline style padding.
  scale: { 1: 4, 1_5: 6, 2: 8, 2_5: 10, 3: 12, 4: 16, 5: 20, 6: 24, 8: 32, 10: 40, 12: 48, 14: 56, 16: 64, 20: 80, 24: 96 }

# ────────────────────────────────────────────────────────────────────
# SHADOWS — dark-first, never hardcode shadow values
# ────────────────────────────────────────────────────────────────────
shadows:
  - { var: --shadow-popover, tailwind: shadow-popover, use: "dropdowns, selects, menus, command palettes" }
  - { var: --shadow-surface, tailwind: shadow-surface, use: "cards, panels, tooltips" }
  - { var: --shadow-dialog,  tailwind: shadow-dialog,  use: "modals, dialogs" }
  - { var: null,             tailwind: shadow-sm,      use: "small elevated elements (switch thumb)" }

# ────────────────────────────────────────────────────────────────────
# TYPOGRAPHY
# ────────────────────────────────────────────────────────────────────
typography:
  font: Inter — the ONLY UI font. No italic anywhere.
  mono_allowed_only_for: [code snippets, keyboard shortcuts, hex swatches, token names in docs]
  weights: { normal: Regular, medium: Medium, semibold: "Semi Bold", bold: Bold }
  tracks:
    ui:      { sizes: "text-xs … text-4xl (12–36px)", tracking: "-0.02em", use: "all product surfaces" }
    display: { sizes: "text-display-xs … text-display-2xl (24–96px)", tracking: "-0.04em", use: "marketing heroes ONLY — never in product" }
  common_recipes:
    ui_standard: "text-sm font-medium tracking-[-0.02em]"   # buttons, labels
    ui_body:     "text-sm font-normal tracking-[-0.02em]"   # body, inputs
    ui_meta:     "text-xs tracking-[-0.01em]"               # badges, meta
  rule: Buttons are font-medium, NEVER font-semibold.
  # Allowed UI font-size px values. POPULATE this once the type scale is tokenized
  # (Component Library infra refactor). While empty, tools/detect.js does NOT check
  # font-sizes (dormant — no false positives). Once filled, any off-scale font-size:Npx
  # is flagged/blocked. Note 13px is NOT a step (scale is 12/14/16…), it migrates to 14.
  font_sizes_px: []   # e.g. [12, 14, 16, 18, 20, 24, 30, 36]

# ────────────────────────────────────────────────────────────────────
# VANILLA HTML CLASSES — for static prototypes (waldo-labs) and index.html demos
# ────────────────────────────────────────────────────────────────────
vanilla_classes:
  note: |
    Static HTML consumers (Brand API prototypes) cannot use the React library.
    They use the canonical CSS classes defined in index.html instead. These classes
    are atomic components — FROZEN, never modify them to fit a demo.
  families:
    buttons: [btn, btn-default, btn-secondary, btn-ghost, btn-outline, btn-white, btn-destructive, btn-destructive-solid, btn-solid, btn-link, btn-sm, btn-lg, btn-icon]
    badges: [badge, badge-default, badge-active, badge-secondary, badge-destructive, badge-warning, badge-highlight, badge-outline, badge-ghost, badge-sm, badge-lg]
    forms: [input, input-icon, field, field-label, field-hint, field-error, tag]
    list_nav: [wli (list item), wnav (nav panel/items), wft (filter trigger), wtabs-pill (tabs), wseg (segmented control)]
    overlays: [wdd (dropdown), wdialog (dialog sm/md/lg), walert (alert variants), wtoast]
    misc: [wswitch, wcopy-link, wadv (advanced section), wfile (file input), wempty (empty states), wsep]
  rule: Before writing custom HTML/CSS, check if a canonical class exists. Never recreate atoms.

# ────────────────────────────────────────────────────────────────────
# FORBIDDEN — known offenders and their corrections
# ────────────────────────────────────────────────────────────────────
forbidden:
  colors:
    - { wrong: "#ff6467", why: "shadcn default red — not Waldo", use_instead: "--destructive (#de3a28 coral)" }
    - { wrong: "any pure red", why: "no red anywhere in product", use_instead: "coral --destructive" }
    - { wrong: "brand-* colors in product UI", why: "marketing only", use_instead: "semantic product tokens" }
  legacy_vars:
    note: These variables DO NOT EXIST in the DS. Zero tolerance.
    items:
      - { wrong: "--txt-high",  use_instead: "--foreground" }
      - { wrong: "--txt-med",   use_instead: "text-foreground/70" }
      - { wrong: "--txt-reg",   use_instead: "text-foreground/70 or --foreground (pick by role)" }
      - { wrong: "--txt-low",   use_instead: "--muted-foreground" }
      - { wrong: "--fill-low",  use_instead: "--muted (zinc-800)" }
      - { wrong: "--fill-reg / --fill-menu / --fill-high", use_instead: "surface token by role (--card, --popover, --accent)" }
      - { wrong: "--bg",        use_instead: "--background" }
      - { wrong: "--bg-card / --bg-high / --elevated", use_instead: "--card" }
      - { wrong: "--sunken",    use_instead: "--muted" }
      - { wrong: "--line-low",  use_instead: "--border (12% alpha)" }
      - { wrong: "--line-reg / --line-high", use_instead: "border-foreground/20 or /30" }
      - { wrong: "--green",     use_instead: "--primary" }
  # Each entry has `text` (human-readable, rendered in docs). Entries that are
  # mechanically detectable also carry `match` (a JS regex), `rule` (id) and
  # `severity` — detect.js reads these and enforces them automatically, so
  # documenting an enforceable pattern here = enforcing it. No `match` = the
  # pattern is conceptual / context-dependent and stays documentation-only.
  patterns:
    - text: "White text on green-500 fill — 2.84:1 fails AA. Default button = green-700 + white"
    - text: "Dark text on green-700 fill — 2.93:1 fails AA. Text color is married to the fill"
    - text: "#1b8c8c (brand-green-700) as product button fill — brand palette is marketing-only AND white on it fails AA (4.06:1)"
    - text: "Inline style= attributes for colors/backgrounds/spacing — define a class with tokens instead"
    - text: "Literal SVG element with stroke/fill=\"var(--x)\" — presentation attributes don't resolve CSS vars; use style=\"stroke:var(--x)\" or currentColor. (Recharts/JSX components like <Area stroke=\"var(--color-x)\"> are React props, NOT this — they resolve via ChartStyle, so the rule anchors on lowercase SVG element names only.)"
      rule: svg-var-attr
      severity: error
      match: '<(?:path|circle|rect|line|polygon|polyline|ellipse|g|svg|stop|use|text|tspan)\b[^>]*(?:stroke|fill)="var\('
      suggestion: 'use style="stroke:var(--x)" or currentColor'
    - text: "box-shadow focus ring on inputs — single border only (border-waldo-green-800)"
    - text: "font-semibold on buttons — font-medium always"
      rule: font-semibold
      severity: warning
      match: '\bfont-semibold\b'
      suggestion: 'use font-medium'
    - text: "italic — anywhere"
    - text: "monospace for UI text/numbers/values — Inter only"
      rule: font-mono-class
      severity: warning
      match: '(?<!-)\bfont-mono\b'
      suggestion: 'Inter only — mono is for code/kbd/hex'
    - text: "Clickable <div>/<span> (onclick) — use <button class=\"btn-link\"> for semantics + a11y"
      rule: clickable-non-button
      severity: warning
      match: '<(?:div|span)[^>]*\bonclick='
      suggestion: 'use <button class="btn-link"> (or add role + tabindex if truly not a button)'
    - text: "rounded-[Xpx] arbitrary radii — token classes only"
    - text: "--destructive color inside .wdd dropdown items — destructive only in dialogs/alerts/buttons"
    - text: "display-* typography in product UI — marketing heroes only"
    - text: "text-green-500 / bg-zinc-800 raw Tailwind palette classes — use semantic (text-primary, bg-muted)"
    - text: "referencing primitives directly from components — always via semantic tokens"

