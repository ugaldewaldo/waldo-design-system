# Waldo Token Catalog
# Machine-readable lookup table: hex → primitive → semantic → CSS var → Tailwind class.
# Read by AI agents to map any color/value to the correct token without guessing.
#
# SOURCE OF TRUTH: figma/waldo.tokens.json — this file is DERIVED from it.
# When tokens change, update this catalog in the same session. Never let it drift.
#
# Companion to docs/usage-doctrine.yaml (which covers component choice; this covers values).

meta:
  sources:
    tokens_json: figma/waldo.tokens.json          # absolute source of truth
    react_css: waldo-ui/src/globals.css           # CSS vars for React/shadcn consumers
    tailwind: waldo-ui/tailwind.config.ts         # utility classes
    vanilla_css: "index.html :root block"         # CSS vars for vanilla HTML (docs site, prototypes)
  how_to_use: |
    Given any hex value (from Figma, a screenshot, or legacy code), look it up in `colors:`.
    - React components → use the `tailwind` class.
    - Vanilla HTML (prototypes, index.html demos) → use the `vanilla_var` CSS variable.
    If a hex is not in this catalog, it is NOT a Waldo color: check `forbidden:` for known
    offenders with their corrections, otherwise ask Miguel before using it.
  alpha_convention: |
    React vars store raw RGB channels ("210 211 211") so Tailwind can apply opacity
    via the slash modifier: text-foreground/70, bg-primary/12.
    Vanilla vars in index.html store final values: --border is ALREADY the 12% alpha.

# ────────────────────────────────────────────────────────────────────
# COLORS
# ────────────────────────────────────────────────────────────────────

colors:

  # ── Zinc surfaces ──────────────────────────────────────────────────
  - hex: "#171819"
    primitive: zinc-950
    semantic: surface-default
    react_var: --background
    vanilla_var: --background
    tailwind: bg-background
    use: App background

  - hex: "#202123"
    primitive: zinc-900
    semantic: surface-elevated
    react_var: --card
    vanilla_var: --card
    tailwind: bg-card
    use: Cards, panels

  - hex: "#242528"
    primitive: zinc-850
    semantic: surface-elevated-alt
    react_var: --zinc-850
    vanilla_var: null   # no dedicated vanilla var — used via component classes
    tailwind: bg-zinc-850
    use: Sidebar background, file input background

  - hex: "#27282b"
    primitive: zinc-800
    semantic: surface-sunken
    react_var: --muted
    vanilla_var: --muted
    tailwind: bg-muted
    use: Inputs, code blocks, sunken areas, sticky table headers, active nav items

  - hex: "#2d2f33"
    primitive: zinc-750
    semantic: secondary / surface-popover
    react_var: --secondary, --popover, --surface-popover
    vanilla_var: --secondary, --popover
    tailwind: bg-secondary, bg-popover
    use: Secondary button bg, tag bg, dropdowns/menus/selects (20px radius)

  - hex: "#323539"
    primitive: zinc-700
    semantic: "(no semantic role)"
    react_var: --zinc-700
    vanilla_var: null
    tailwind: bg-zinc-700
    use: Scrollbar thumb. Prefer a semantic token for anything user-facing.

  - hex: "#41454b"
    primitive: zinc-600
    semantic: accent
    react_var: --accent
    vanilla_var: --accent
    tailwind: bg-accent
    use: Menu item hover/selected state

  # ── Zinc text ──────────────────────────────────────────────────────
  - hex: "#d2d3d3"
    primitive: zinc-200
    semantic: text-primary
    react_var: --foreground
    vanilla_var: --foreground
    tailwind: text-foreground
    use: Primary text. Also the base channel for all border alphas.

  - hex: "rgba(210,211,211,0.70)"
    primitive: alpha.zinc-200.70
    semantic: text-secondary
    react_var: --foreground + /70
    vanilla_var: "color-mix or rgba(210,211,211,0.70) via component class"
    tailwind: text-foreground/70
    use: Secondary text

  - hex: "#8f9091"
    primitive: zinc-400
    semantic: text-tertiary
    react_var: --muted-foreground
    vanilla_var: --muted-foreground
    tailwind: text-muted-foreground
    use: Tertiary text, meta info, captions

  - hex: "rgba(210,211,211,0.50)"
    primitive: alpha.zinc-200.50
    semantic: text-disabled
    react_var: --foreground + /50
    vanilla_var: "rgba via component class"
    tailwind: text-foreground/50
    use: Disabled text, placeholders, optional field labels

  - hex: "#b4b5b6"
    primitive: zinc-300
    semantic: null
    react_var: --zinc-300
    vanilla_var: null
    tailwind: text-zinc-300
    use: Primitive only — no semantic role. Prefer a semantic token.

  - hex: "#636465"
    primitive: zinc-500
    semantic: null
    react_var: --zinc-500
    vanilla_var: null
    tailwind: text-zinc-500
    use: Primitive only. Light-mode muted-foreground.

  # ── Product green ──────────────────────────────────────────────────
  - hex: "#32a9a9"
    primitive: green-500
    semantic: accent-brand / text-brand / border-focus
    react_var: --primary, --ring
    vanilla_var: --primary
    tailwind: bg-primary, text-primary, border-primary, ring-ring
    use: |
      Field labels, focus rings, copy-link URLs, selected states, accents.
      As a FILL it takes dark text #171819 (6.25:1) — NEVER white (2.84:1 fails AA).
      Not the default button fill — that is green-700.

  - hex: "#2c797a"
    primitive: green-600
    semantic: "(no semantic role — hover step)"
    react_var: --green-600
    vanilla_var: null
    tailwind: bg-waldo-green-600
    use: Hover state of primary fills

  - hex: "#2a6c6d"
    primitive: green-700
    semantic: "(button default fill)"
    react_var: --green-700
    vanilla_var: null
    tailwind: bg-waldo-green-700
    use: |
      DEFAULT BUTTON FILL — always with white text (6.06:1 AA), never dark text (2.93:1 fails).
      Also switch ON state and darker green fills.

  - hex: "#265152"
    primitive: green-800
    semantic: "(no semantic role — input interaction border)"
    react_var: --green-800
    vanilla_var: null
    tailwind: border-waldo-green-800
    use: Input hover/focus border — single border, never a box-shadow ring

  - hex: "#4dbcbc"
    primitive: green-400
    semantic: accent-info
    react_var: --green-400
    vanilla_var: null
    tailwind: text-zinc? — no dedicated class; used via alert info styles
    use: Info states (Alert info variant)

  - hex: "rgba(50,169,169,0.15)"
    primitive: alpha.green-500.15
    semantic: interactive-selected
    react_var: --primary + /15
    vanilla_var: "rgba via component class"
    tailwind: bg-primary/15
    use: Selected row/item tint

  - hex: "rgba(50,169,169,0.25)"
    primitive: alpha.green-500.25
    semantic: ring-focus
    react_var: --ring + /25
    vanilla_var: "rgba via component class"
    tailwind: ring-ring/25
    use: Focus ring alpha

  # ── Status colors ──────────────────────────────────────────────────
  - hex: "#de3a28"
    primitive: coral-500
    semantic: accent-destructive
    react_var: --destructive
    vanilla_var: --destructive
    tailwind: bg-destructive, text-destructive, border-destructive
    use: |
      Destructive actions, error states. "Not red. Not pink. Not #ff6467. Coral."
      Soft danger = coral at /10 fill + border. Hard danger (confirm dialogs only) = solid fill.
      NEVER inside .wdd dropdown items.

  - hex: "#c94e22"
    primitive: orange-600
    semantic: accent-warning
    react_var: --warning, --accent-warning
    vanilla_var: --warning
    tailwind: bg-warning, text-warning
    use: Warning states

  - hex: "#e76638"
    primitive: orange-500
    semantic: "(no semantic role)"
    react_var: --orange-500
    vanilla_var: null
    tailwind: null
    use: Primitive only — warning is orange-600. Prefer the semantic token.

  - hex: "#f7d371"
    primitive: yellow-300
    semantic: accent-highlight
    react_var: --accent-highlight
    vanilla_var: --highlight
    tailwind: bg-highlight, text-highlight
    use: Decorative highlight, "Pro" badges. No urgency meaning.

  # ── Borders (alpha over zinc-200) ──────────────────────────────────
  - hex: "rgba(210,211,211,0.12)"
    primitive: alpha.zinc-200.12
    semantic: border-subtle
    react_var: --border + /[0.12]
    vanilla_var: --border
    tailwind: border-foreground/[0.12]
    use: Default input border, separators, card borders, dropdown separators

  - hex: "rgba(210,211,211,0.20)"
    primitive: alpha.zinc-200.20
    semantic: border-default
    react_var: --border + /20
    vanilla_var: --border-md
    tailwind: border-foreground/20
    use: Default border strength

  - hex: "rgba(210,211,211,0.30)"
    primitive: alpha.zinc-200.30
    semantic: border-strong
    react_var: --border + /30
    vanilla_var: --border-strong
    tailwind: border-foreground/30
    use: Strong border

  # ── Interactive states ─────────────────────────────────────────────
  - hex: "rgba(210,211,211,0.05)"
    primitive: alpha.zinc-200.5
    semantic: interactive-hover
    tailwind: bg-foreground/5
    use: Row/item hover tint

  - hex: "rgba(210,211,211,0.10)"
    primitive: alpha.zinc-200.10
    semantic: interactive-pressed
    tailwind: bg-foreground/10
    use: Pressed state tint

  - hex: "rgba(23,24,25,0.80)"
    primitive: alpha.zinc-950.80
    semantic: scrim-modal
    tailwind: bg-background/80
    use: Modal overlay scrim

  - hex: "rgba(23,24,25,0.40)"
    primitive: alpha.zinc-950.40
    semantic: surface-frosted
    tailwind: bg-background/40
    use: Frosted glass surfaces (0.50 on hover)

  # ── Primitive scale steps (DERIVED 50→950; ANCHOR steps are listed above) ──
