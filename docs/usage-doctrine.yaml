# Waldo Component Usage Doctrine
# Machine-readable "when to use X" for every component in waldo-ui.
# Read by the design-system skill. Update when components change — never let this drift.
# PRO-2528

components:

  - component: Button
    use_when:
      - Primary action in a view (one per screen max for default variant)
      - Form submission, dialog confirmation, CTA
    dont_use_when:
      - Navigation between pages — use a link instead
      - Destructive first-touch actions — use destructive variant only for confirmation
    prefer_over:
      - Link: when the action causes a side effect (not navigation)
    notes: |
      ONE PRIMARY PER SURFACE: Only one default (primary fill) Button per view, drawer,
      dialog, or card. Two primary buttons create visual tie — demote the secondary action
      to ghost, outline, or a segmented control if it is a selection (not an action).

      DEFAULT FILL: green-700 #2a6c6d + white text (6.06:1 AA).
      Never white on green-500 (2.84:1 fails) and never dark text on green-700 (2.93:1 fails)
      — text color is married to the fill.

      white variant for dialog footers (44px, 192px wide).
      ghost variant for secondary actions paired with a primary.
      destructive-solid only in confirmation dialogs, never as first-touch.

      Variants aligned with shadcn naming conventions:
        outline           → bordered, no fill (shadcn standard)
        ghost             → no border, no fill (shadcn standard)
        destructive       → soft danger (coral/10% fill+border)
        destructive-solid → hard danger (coral fill, confirmation dialogs only)
        solid             → zinc-800 fill (dropdowns, contextual)
        white             → inverse (over images/color backgrounds)

  - component: Input / Field
    use_when:
      - Single-line text entry
      - Search, email, URL, name fields
    dont_use_when:
      - Multi-line content — use Textarea
      - Selection from a list — use Select or Combobox
    prefer_over:
      - Combobox: when the value is free text, not a selection from known options
      - TagInput: when only a single value is entered, not a multi-value list
    notes: |
      Always pill shape (rounded-full). Label uses text-primary.
      Hover/focus border: border-waldo-green-800. No ring.


  - component: Select / Dropdown
    use_when:
      - Choosing one option from a known list (5+ options)
      - Filter controls
    dont_use_when:
      - 2-3 options — use SegmentedControl or RadioGroup instead
      - Free-text search needed — use Combobox
    prefer_over:
      - RadioGroup: when there are 5+ options and inline space is limited
      - FilterTrigger: when the trigger needs a pill background inside a form, not a bare inline filter
    notes: |
      Select trigger: h-8, rounded (4px), bg-secondary, border foreground/12, px-2.5 py-1.5 text-sm;
      hover/focus border-waldo-green-800, no ring; disabled opacity-40.
      Select content: rounded-2-5xl, bg-popover, shadow-popover, py-1.5, width matches trigger;
      items text-[13px] popover-foreground/70, check indicator text-primary.
      DropdownMenu has its own entry. Figma node 62122:58381.
      COMPOSITION RULE: .wdd IS the complete popover (bg, shadow, radius). Never nest .wdd inside
      .dropdown-menu — they share the same visual role and their styles will clash (double bg, double shadow).
      The trigger opens .wdd directly via position:absolute. .dropdown-root/.dropdown-menu is an
      alternative shell pattern for non-.wdd content only.


  - component: Checkbox
    use_when:
      - Multi-select from a list
      - Boolean toggle that needs a label
      - Settings that apply independently
    dont_use_when:
      - Mutually exclusive options — use RadioGroup
      - Immediate action toggle — use Switch
    prefer_over:
      - Switch: when the choice is saved with a form submit rather than applied instantly
      - RadioGroup: when selections are independent, not mutually exclusive
    notes: Circular shape (not square). green variant for brand, mono for neutral.


  - component: Switch
    use_when:
      - Immediate on/off toggle (takes effect instantly without Save)
      - Feature flags, notification settings, per-item enable/disable
    dont_use_when:
      - Options that need a Save action — use Checkbox + Button instead
      - Multi-select — use Checkbox
    prefer_over:
      - Checkbox: when the toggle takes effect immediately without a Save action
    notes: |
      32x18px pill; ON track bg-primary, OFF track bg-muted (zinc-800).
      Thumb: white 14px circle (h-3.5), translates 13px when checked; 150ms transitions.
      Disabled opacity-40. Built on Radix Switch. Figma node 11406:98105.


  - component: Badge
    use_when:
      - Status labels (Active, Paused, Error, Draft)
      - Counts and metadata tags
      - Category labels on cards
    dont_use_when:
      - Interactive actions — use Button
      - Long text — badges are single-word or short phrase only
    prefer_over:
      - Tag: when the item is not removable by the user
    notes: |
      shadcn variants: default | secondary | destructive | outline
      Waldo extensions (no shadcn equivalent):
        active      — teal tint, entity is live/running (same visual as default)
        success     — teal tint, operation completed
        warning     — orange tint, needs attention
        highlight   — yellow tint, decorative/Pro tag
      Checkbox and RadioGroup use colorScheme="brand|mono" (not variant) to avoid
      future conflicts with shadcn variant additions.

  - component: Avatar
    use_when:
      - Representing a person (round shape)
      - Representing a brand/company/logo (square shape)
      - Member lists, author attribution, team displays
    dont_use_when:
      - Status indicators or labels — use Badge
      - Decorative icons that don't represent a person or brand — use Icon
    prefer_over:
      - Icon: when representing a specific person or brand rather than a generic concept
    notes: round = people, square = brands. Sizes 16/24/32/40px.


  - component: Tag / TagInput
    use_when:
      - User-entered removable labels (emails, keywords, filters)
      - Multi-value inputs where items can be added and removed
    dont_use_when:
      - Static labels — use Badge
      - Single selection — use Select
    prefer_over:
      - Badge: when the user can remove the value (onRemove interaction)
      - Input: when the field collects multiple discrete values instead of one string
    notes: |
      Tag: pill rounded-full, bg-popover (zinc-750); sizes sm=28, default=36, lg=44px;
      textColor high (foreground) or muted (foreground/70); onRemove adds X button (opacity-50 to 100 on hover).
      TagInput: min-h-10 rounded-full container (rounded-2xl when tags present), border foreground/12,
      focus-within border-waldo-green-800; Enter/comma/blur adds, Backspace removes last, dedupes, optional maxTags.
      Figma node 67645:81618 (CHIP/800).


  - component: FileInput
    use_when:
      - File upload with drag-and-drop zone inside dialogs or forms
      - Showing uploaded file list with remove action
    dont_use_when:
      - Simple single-file button upload — use a Button instead
      - Showing per-file async status outside a drop zone — use StatusSpinner in a ListItem row
    prefer_over:
      - Button: when drag-and-drop and a visible uploaded-file list are needed
    notes: |
      Two sizes: default (68px drop zone, py-6) and slim (36px drop zone, py-2).
      Slim is functionally identical to default — same file list, same drag-and-drop,
      same error states. Only the drop zone height differs.
      Use slim inside dialogs where vertical space is limited.
      Both sizes show the uploaded file list below the drop zone.
      Hover state: bg-secondary. Drag-over: bg-secondary + teal border.
      Error state per file uses text-warning inline.
      Zone text is text-primary (teal). Optional label uses foreground/50.


  - component: SegmentedControl
    use_when:
      - 2–4 mutually exclusive view modes or toggles (Everyone/Only selected, Day/Week/Month)
      - Inside dialog body to switch between modes or filter scope
      - Primary page-level navigation with many items (variant="surface")
    dont_use_when:
      - More than 4 options with variant="default" — use Tabs, Select, or variant="surface"
      - Options with descriptions — use RadioGroup
      - Navigation between distinct sections — use Tabs (wtabs-pill)
      - Dialog footer or header — always in the body
    prefer_over:
      - Tabs: when the options toggle within the same view, not navigate to a new section
    variants:
      surface:
        use_when: Primary navigation control for a page — many items (5+), top-level tab bar
        appearance: bg-[#202123] container, zinc-200 active pill with drop-shadow, shrink-0 items (content-fit width)
        example: Brand API page tabs (Resonance / Reputation / Presence / Tracker / Coach / News / Trending)
      default:
        use_when: Secondary inline toggle — few options (2–4), embedded inside a form, dialog, or card
        appearance: bg-background/50 container, foreground/12 active pill, flex-1 items (equal width)
        example: '"Visible / Hidden", "Day / Week / Month", "Specific emails / Organization access"'
    notes: |
      variant="surface" = primary/main control. variant="default" = secondary toggle. Never use default for top-level nav.
      Full width (fullWidth prop) when inside a dialog body spanning the content area — only with variant="default".
      CSS class: wseg / wseg-opt for default · wseg-surface / wseg-surface-opt for surface (NOT wtabs-pill — that is Tabs).
      Tabs (wtabs-pill) = navigation between sections. SegmentedControl = mode/view toggle within a section. Never mix.

  - component: Tooltip
    use_when:
      - Explaining icon-only buttons
      - Showing keyboard shortcuts
      - Non-essential supplementary info
    dont_use_when:
      - Required information — put it in the UI, not a tooltip
      - Long text — use Popover
    prefer_over:
      - Popover: when the content is a short non-essential hint, not rich or interactive content
    notes: |
      Content: bg-zinc-900, rounded-md, px-2.5 py-1.5, shadow-surface, matching zinc-900 arrow.
      Text 12px font-medium tracking-[-0.01em] text-foreground; animate-fade-in, sideOffset 4.
      Requires TooltipProvider wrapper (Radix).


  - component: Table
    use_when:
      - Structured data with multiple columns and rows
      - Sortable, filterable data sets
    dont_use_when:
      - Simple lists — use ListItem/ListView
      - 1-2 columns — use a list layout
    prefer_over:
      - ListItem / ListView: when the data has 3+ comparable columns or needs sorting
    notes: |
      stickyHeader prop — keeps thead fixed on scroll, bg-muted (zinc-800) header background.
      Linear pattern: slightly lighter than card surface, no shadow. Use maxHeight prop to
      constrain the scroll container (default 400px).
      Waldo extension: shadcn Table has no stickyHeader.


  - component: Tabs
    use_when:
      - Navigation between distinct sections of a page
      - Switching between related views (text variant for page nav, pill for inline filters, pill-primary for main page navigation)
    dont_use_when:
      - 2-3 toggle options — use SegmentedControl
      - Deeply nested navigation — use sidebar
    prefer_over:
      - SegmentedControl: when switching navigates between distinct sections rather than toggling modes on the same data
      - Select: when there are few enough sections to show all options inline
    notes: |
      Three variants: text = transparent, px-3 py-2, active = text-foreground + font-medium + 1px primary
      underline (square edges — rounded-none, border-b; align flush with the container divider) (page-level nav);
      pill = px-3 py-1 rounded-full, active = bg-secondary + font-medium + shadow-surface (inline filters, view toggles);
      pill-primary = Waldo extension, no shadcn equivalent. Main page navigation only — at most ONE per page.
      List: track bg-foreground/3% rounded-full p-1. Trigger: px-4 py-1.5, inactive text-foreground/70 (text/secondary,
      brighter than the other variants' muted-foreground), active = solid bg-foreground + text-background + font-medium
      + shadow-surface. Vanilla: .wtabs-pill.primary > .wtab-pill.
      Inactive on text/pill variants: text-muted-foreground, hover to foreground. Built on Radix Tabs; disabled opacity-40.
      Figma node 83931-3758.


  - component: Alert
    use_when:
      - Inline feedback within a page (form errors, plan limits, info)
      - Persistent contextual messages that live in the content
    dont_use_when:
      - Ephemeral feedback after an action — use Toast
      - Blocking actions — use AlertDialog
    prefer_over:
      - Toast: when the message is permanent and related to the current view
    notes: |
      Variants (shadcn-aligned + Waldo extensions):
        destructive → coral tint, error state (shadcn standard name)
        info        → teal tint, neutral informational (Waldo extension)
        success     → teal tint, completed/confirmed (Waldo extension)
        warning     → orange tint, caution non-blocking (Waldo extension)

  - component: Toast
    use_when:
      - Ephemeral feedback after user actions (saved, uploaded, error)
      - System alerts that appear in the corner and auto-dismiss
    dont_use_when:
      - Persistent warnings — use Alert
      - Blocking confirmations — use AlertDialog
    prefer_over:
      - Alert: when feedback is ephemeral and self-dismissing rather than tied to the current view
      - Dialog: when the message needs no acknowledgment or user action
    notes: |
      notification pattern for user actions.
      banner pattern for system-level alerts (limits, connectivity).
      Powered by Sonner — intentionally simpler than shadcn Toast.
      Exports: toast (function) + Toaster (component). No useToast hook.
      Use: toast("message") / toast.success() / toast.error() / toast.warning()


  - component: Separator
    use_when:
      - Grouping related items in menus, dropdowns, settings panels
      - Visual division between sections
    dont_use_when:
      - Adding space — use padding/margin instead
      - Separating major page sections with their own headers — use layout, not a line
    prefer_over:
      - Spacing utilities: when groups need an explicit visual divider, not just whitespace
    notes: |
      1px line, bg-foreground/[0.12] (border-subtle).
      orientation horizontal (h-px w-full, default) or vertical (h-full w-px); decorative by default.
      Built on Radix Separator.


  - component: ListItem / ListView
    use_when:
      - Rows in a list (people, brands, entities) with avatar + label + actions
      - Any interactive row that isn't a table
    dont_use_when:
      - Tabular data with multiple columns — use Table
      - Navigation items — use NavItem
    prefer_over:
      - Table: when rows are entity-centric (avatar + label + hover actions) with 1-2 columns
      - NavItem: when the row displays entity data rather than navigating
    notes: 40px height. Actions appear on hover. Avatar round=people, square=brands.


  - component: EmptyState
    use_when:
      - Page, section, or inline area with no data yet
      - After filtering returns zero results
    dont_use_when:
      - Loading states while data fetches — use Skeleton
      - Error feedback after a failed action — use Alert or Toast
    prefer_over:
      - Skeleton: when the zero-data state is final (no data exists), not a loading placeholder
    notes: |
      page (80px padding) for full-view empty.
      section (48px) inside tables/panels.
      inline (24px) inside dropdowns/search.


  - component: RadioGroup
    use_when:
      - Mutually exclusive options where user must pick exactly one
      - Settings choices (e.g. "Share only / Comment / Full access")
    dont_use_when:
      - Independent toggles — use Switch or Checkbox
      - 2 options that are view toggles — use SegmentedControl
    prefer_over:
      - Select: when there are 2-4 options that benefit from descriptions and all-visible layout
      - SegmentedControl: when options need a description line (RadioGroupField supports it)
    notes: |
      Item: circular 16px (h-4 w-4); unchecked border-foreground/30, transparent bg;
      checked = colored border + 8px center dot, bg stays transparent.
      colorScheme: brand = primary green (default), mono = foreground/70; disabled opacity-40.
      Root flex-col gap-2; RadioGroupField composes item + label + optional description.


  - component: Slider
    use_when:
      - Continuous value selection (volume, opacity, price range)
      - Range selection with two thumbs
    dont_use_when:
      - Precise numeric input — use Input with type=number
      - Choosing among a small set of discrete options — use SegmentedControl or RadioGroup
    prefer_over:
      - Input: when approximate visual adjustment matters more than exact numeric values
    notes: |
      Track: h-1 (4px) rounded-full bg-muted; filled range bg-primary.
      Thumb: h-2.5 (10px) rounded-full bg-primary, shadow-surface, focus ring-ring/30, grab cursors.
      Single value or range (two thumbs via two-value array); disabled opacity-40.


  - component: Dialog / Modal
    use_when:
      - Actions that need focus and shouldn't navigate away
      - Forms, confirmations, sharing, configuration
    dont_use_when:
      - Large panels with navigation — use Sheet/Drawer
      - Purely informational content — use Toast or Alert
    prefer_over:
      - Sheet: when the action is compact and needs the user's full attention, centered
      - WizardDialog: when the flow is a single step with no progression
    notes: |
      WALDO EXTENSIONS (not in shadcn — intentional additions):
        DialogBody     — wraps the scrollable content area between header and footer. Adds consistent padding and gap.
        size prop      — "sm" | "md" | "lg" | "xl" controls max-width. shadcn DialogContent has no size.

      SIZES:
        sm (560px) — confirmations, warnings, simple single-field forms, success states.
        md (720px) — share/invite, upload file, add signal, ask to collaborate, form + list.
        lg (960px) — report builder, select team, multi-field complex forms.

      STRUCTURE:
        Header: title (text-xl font-medium) + optional icon avatar (40px) + close button.
        Body: 32px padding, no top padding when following header. gap-16px between elements.
        Footer: space-between layout. Primary CTA = btn-white 44px × 192px (right).
          Secondary footer actions use btn-ghost (with border) or btn-bare (no border).
          AdvancedSection always goes at the bottom of the body, before the footer.

      COMPONENTS USED INSIDE DIALOGS:
        - SegmentedControl (wseg) for view mode toggles — NOT wtabs-pill (that's Tabs)
        - ListItem ghost variant (no borders, pill hover) for entity lists
        - Switch for toggles in list rows
        - CopyLink for shareable URLs
        - FileInput slim for upload zones (space-efficient)
        - AdvancedSection for collapsible optional fields
        - Input / Field for text entry
        - RadioGroup for exclusive choice with description

      ROLES & LABELS:
        User roles (Owner, Editor, etc.) use wli-meta text — NOT badges.

      RECIPES AVAILABLE (15):
        1. Confirmation/Warning — sm, ghost + destructive buttons
        2. Success/Completion — sm, no header, centered body, single CTA
        3. Form — sm, field components + cancel/primary
        4. Share/Invite — md, email input + member list + CopyLink
        5. Select your team — md, SegmentedControl + Input + ListItem + Switch
        6. Add a signal — md, checklist + toggles
        7. Upload file — md, FileInput slim
        8. Shareable link — sm, CopyLink + Switch toggle
        9. Ask to collaborate — sm, email Input + single CTA
        10. Audience — md, info + CopyLink
        11. Competitors — md, list + checkbox
        12. Add persona — md, multi-field form
        13. Invite collaborators & guests — md, Tabs + Input + RadioGroup + CopyLink
        14. Brand Audit — md, form fields + FileInput slim + AdvancedSection + split footer
        15. Report builder — lg, SegmentedControl + date Fields


  - component: WizardDialog
    use_when:
      - Multi-step onboarding flows
      - Setup flows that need contextual images/previews on the right
    dont_use_when:
      - Single-step forms — use Dialog
      - Settings — use Dialog with tabs
    prefer_over:
      - Dialog: when the flow has multiple sequential steps with back/next navigation and a contextual image panel
    notes: |
      Split layout: left step content, right 280px dark image panel (bg-zinc-900);
      content max-w-[800px], rounded-4xl, bg-card, shadow-dialog.
      Header: uppercase step label (text-xs, tracking 0.04em) + close; title text-xl font-medium; px-8 throughout.
      Footer: Back link left, primary Next button right (h-11 px-8 rounded-full).
      Progress dots: active 16x6 primary pill, completed 6px primary/50, upcoming 6px foreground/20.
      Figma node 83966-356773.


  - component: StatusSpinner
    use_when:
      - File upload row status
      - Any async operation that resolves to success/error/warning
    dont_use_when:
      - Page-level loading — use Skeleton
      - Button loading state — use DotsLoader or built-in Button loading prop
    prefer_over:
      - Skeleton: when showing per-item async status that resolves to success/error/warning, not page-level loading
      - Loader: when the operation has a terminal state to morph into, not an indefinite wait
    notes: Canvas 16px. Morphs to success/error/warning with animation.


  - component: FilterTrigger
    use_when:
      - Inline filter selector inside a filter panel or search header (bare label + chevron, opens a dropdown)
      - Anywhere a filter has a label + optional current value displayed inline
      - Insights panel filter rows (Saved searches, Recent, Any source, etc.)
    dont_use_when:
      - Navigation — use NavItem instead
      - Pill-shaped filter chips — use Tag or Button ghost
      - Full-width row items — use NavItem
      - Items that expand sub-navigation — use wnav-parent with left chevron
    prefer_over:
      - NavItem: when the item opens a dropdown to change a filter value, not navigate
      - Button: when the control is bare/inline with no background
      - Select: when the trigger must be bare/inline with no pill background
    notes: |
      No background, no pill. Pure inline: label [value?] chevron (trailing, right).
      Active state (value set): label muted + value foreground + font-medium.
      Vanilla classes: wft-active = foreground color, wft-default = 70% foreground.
      Sits inside NavPanel at px-8 (32px) from panel edge; wrap multiple triggers
      in wnav-filters (gap 16px, padding 0 32px 12px).
      Click opens a wdd dropdown positioned below the trigger.
      Figma node 84014-277810 (PANEL / INSIGHTS).

  - component: NavItem
    use_when:
      - Navigation between views, sections, or settings pages
      - Sidebar panels (Signals, Settings, Report Builder, Insights)
      - Settings panel items (label + trailing icon)
      - Signal/feed sidebar items (count badge + label)
      - Report builder items (label + status indicator)
      - Any navigable list item that is NOT a row of data
    dont_use_when:
      - Data rows — use ListItem
      - Tabular data — use Table
      - Opening a dropdown or filtering data — use FilterTrigger
    prefer_over:
      - ListItem: when the item navigates rather than displays entity data
    notes: |
      Height 36px, padding 0 16px, border-radius 9999px (pill), active = bg-muted + font-medium.
      Nav items use a leading icon; settings items use a trailing icon (canvas 16, icon 14px).
      Items with nested children use wnav-parent + left chevron.
      Section headers use NavSection / wnav-section (ALL CAPS, 11px, padding-top 24px).
      Use NavPanel (wnav-items-wrap, padding 0 16px) as the scrollable container.

  - component: CopyLink
    use_when:
      - Displaying a shareable URL the user should copy (invite link, share link, public URL)
      - Inside dialog bodies where a link needs to be copied with one click
    dont_use_when:
      - Editable URL fields — use Input instead
      - Multiple links in a list — use ListItem instead
    prefer_over:
      - Input: when the URL is read-only and the primary action is one-click copy
    notes: |
      URL text is always text-primary (teal) — not muted, not foreground.
      Always full width of its container (no fit-content).
      bg-secondary container, rounded-2xl.
      Click copies to clipboard and swaps copy icon → check icon for 2s.
      Figma node 83966:356556.

  - component: CodeBlock
    use_when:
      - Displaying preformatted code, CLI commands, or prompt text the user may need to copy
      - Showing multi-action copy options (e.g. "Copy prompt" + "Copy Curl") over the same content block
    dont_use_when:
      - Inline code snippets inside prose — use a bare <code> element instead
      - Single-line copyable values (URLs, tokens) — use CopyLink instead
    prefer_over:
      - CopyLink: when content is multi-line code or commands, not a plain URL
    notes: |
      bg-card (zinc-900) container, border border/8%, rounded-xl.
      Header row is optional — rendered only when actions[] is provided.
      Action buttons use a ghost-sm style: foreground/6% fill, foreground/60% text, pill shape.
      Copied state swaps icon to check and colors text primary for 2s.
      Body is font-mono, text-sm, text-foreground/70, whitespace-pre-wrap.
      Waldo extension — no shadcn equivalent.


  - component: AdvancedSection
    use_when:
      - Hiding optional/advanced fields in a dialog that most users don't need
      - Reducing cognitive load by collapsing secondary form fields
    dont_use_when:
      - Required fields — fields inside AdvancedSection are ALWAYS optional
      - Content that most users will need — show it directly
    prefer_over:
      - Accordion: when the collapsible is specifically for "advanced" settings in a form context
    notes: |
      Always positioned at the bottom of the form body, immediately before the dialog footer.
      Fields inside are always optional — never required.
      Toggle should animate open/close (smooth height transition).
      Toggle row is 48px. Icon = IconCircleChevronDown (collapsed) / IconCircleChevronUp (expanded), color text-primary (green).
      Label default is "Advanced" — can be overridden via label prop.
      Figma node 84009:174707.

  - component: IconFilter
    use_when:
      - Filter action buttons (paired with btn-secondary or btn-ghost)
      - Any UI that triggers a filter panel or filter state
    dont_use_when:
      - Sorting — use a sort icon instead
      - Search — use the Search icon
    notes: |
      Canvas 16px. Always 14px rendered (h-3.5 w-3.5). Uses currentColor.
      3 horizontal lines of decreasing width.
      Figma node 84009:176113.

  - component: AlertDialog
    use_when:
      - Confirming deletion of a space, feed, or saved report where data loss is irreversible
      - Confirming a destructive bulk action on signals (e.g. dismiss all, purge feed items)
      - Interrupting the user before an action that consumes credits or triggers an external send
    dont_use_when:
      - Non-blocking editing or configuration of a feed or report — use Dialog
      - Lightweight inline confirmation that can be undone — use a toast with undo action instead
      - Contextual info or settings anchored to a trigger — use Popover
    prefer_over:
      - Dialog: when the action is destructive/irreversible and must block dismissal via outside click or Escape
      - Popover: when the decision must interrupt the flow rather than sit beside the trigger
    notes: |
      shadcn default — not yet reviewed against Figma. Content: rounded-lg, bg-background, p-6, shadow-lg, gap-4,
      max-w-[calc(100%-2rem)]; size="default" caps at sm:max-w-lg, size="sm" at max-w-xs (footer becomes 2-col grid).
      Overlay bg-black/50. Includes AlertDialogMedia slot (size-16 rounded-md bg-muted icon well).
      Action/Cancel render as DS Button (Action variant="default", Cancel variant="outline").

  - component: ContextMenu
    use_when:
      - Right-click actions on a signal card in a feed (pin, mute brand, copy link, add to report)
      - Right-click on a space or feed in the sidebar tree (rename, duplicate, archive)
      - Power-user shortcuts on report blocks or insight rows without adding visible chrome
    dont_use_when:
      - Actions that need a discoverable visible trigger — use DropdownMenu on a kebab/ellipsis button
      - Persistent app-level menus — use Menubar
      - Picking a value for a form field — use Select or Combobox
    prefer_over:
      - DropdownMenu: when the surface is large (cards, rows, canvas) and right-click is the natural gesture; no extra trigger button needed
    notes: |
      shadcn default — not yet reviewed against Figma. Content: rounded-md, border, bg-popover, p-1, shadow-md,
      min-w-[8rem]. Items rounded-sm px-2 py-1.5 text-sm, focus:bg-accent; variant="destructive" gets
      text-destructive + focus:bg-destructive/10. Supports CheckboxItem, RadioItem, Sub menus, Label, Shortcut.

  - component: DropdownMenu
    use_when:
      - Kebab/ellipsis action menu on signal cards, feed items, and report rows (edit, share, delete)
      - Workspace/account switcher and user avatar menu in the top bar
      - Sort or grouping options behind a labeled button on a feed or insights list
    dont_use_when:
      - Selecting a value that fills a form field — use Select or Combobox
      - Right-click contextual actions on a large surface — use ContextMenu
      - Searchable navigation across many destinations — use Command (palette)
    prefer_over:
      - ContextMenu: when the trigger must be visible and discoverable (button-anchored)
      - Popover: when the content is a list of actions, not free-form content — items, separators, and shortcuts come built in
    notes: |
      Waldo-customized from Figma DS (node 62122:58381). Container: bg-popover (zinc-750), rounded-2-5xl
      (20px radius), py-3, shadow-popover, min-w-[160px]. Items: px-4 py-2 text-sm tracking-[-0.02em],
      text-popover-foreground/70 with hover/focus text-foreground + bg-foreground/5; disabled opacity-40.
      Separator h-px bg-foreground/[0.12]. Label is 11px uppercase tracking-wider muted.
      Open animation: animate-fade-in + animate-slide-in-top. NEVER --destructive inside items.
      COMPOSITION RULE: same as Select/Dropdown — .wdd IS the popover. Do not wrap .wdd inside
      .dropdown-menu. Trigger → .wdd directly (position:absolute, top:calc(100%+6px)).

  - component: HoverCard
    use_when:
      - Previewing a brand profile (logo, follower counts, recent signals) when hovering a brand mention
      - Peeking at a creator or author card from a byline in a signals feed
      - Showing a report or space summary on hover over a link, without navigating
    dont_use_when:
      - Short text label or hint — use Tooltip
      - Content the user must click or interact with (buttons, inputs) — use Popover
      - Touch-first or mobile flows where hover does not exist — use Popover or Sheet
    prefer_over:
      - Tooltip: when the preview is rich content (avatar, stats, multiple lines), not a one-line label
      - Popover: when the surface is read-only and should open/close on hover with no click commitment
    notes: |
      shadcn default — not yet reviewed against Figma. Content: w-64, rounded-md, border, bg-popover,
      p-4, text-popover-foreground, shadow-md, sideOffset=4. Hover-triggered only (Radix HoverCard) —
      no touch support.

  - component: Popover
    use_when:
      - Date-range picker for filtering signals or report periods, anchored to a filter button
      - Inline settings panel for a feed widget (refresh cadence, sources) without leaving the page
      - Small anchored forms like "add tag to insight" or share-link options
    dont_use_when:
      - A pure action list — use DropdownMenu
      - Read-only hover preview of a brand or person — use HoverCard
      - Multi-field editing tasks or long content — use Dialog or Sheet
    prefer_over:
      - Dialog: when the task is small and benefits from staying anchored to its trigger and visible page context
      - HoverCard: when the user must interact with the content (click, type), not just glance
    notes: |
      shadcn default — not yet reviewed against Figma. Content: w-72, rounded-md, border, bg-popover,
      p-4, text-popover-foreground, shadow-md, sideOffset=4. Provides PopoverHeader / PopoverTitle /
      PopoverDescription subcomponents plus PopoverAnchor for detached positioning.

  - component: Sheet
    use_when:
      - Signal detail panel sliding in from the right while keeping the feed visible behind the overlay
      - Editing a space's configuration (sources, brands tracked) in a side panel
      - Report block inspector or insight annotation panel on desktop
    dont_use_when:
      - Mobile bottom-edge interactions with swipe-to-dismiss — use Drawer
      - Short confirmations or small forms — use Dialog or AlertDialog
      - Content that should persist alongside the page without modal overlay — use a Sidebar/Resizable layout instead
    prefer_over:
      - Dialog: when content is long/scrollable and benefits from full viewport height with the page context behind it
      - Drawer: on desktop, where edge-slide without drag gestures is expected
    notes: |
      shadcn default — not yet reviewed against Figma. Modal overlay bg-black/50; panel bg-background
      shadow-lg, side="right" default (also left/top/bottom); right/left are w-3/4 sm:max-w-sm.
      Open animation 500ms, close 300ms. Built-in close button toggleable via showCloseButton.

  - component: Drawer
    use_when:
      - Mobile bottom-sheet for signal quick actions or filter controls with swipe-to-dismiss
      - Touch-friendly detail view of a feed item on small viewports
      - Progressive disclosure of report options on mobile where a centered Dialog feels cramped
    dont_use_when:
      - Desktop side panels — use Sheet
      - Blocking destructive confirmation — use AlertDialog
      - Anchored micro-interactions next to a control — use Popover
    prefer_over:
      - Sheet: on touch devices, for the vaul drag handle and gesture-driven dismiss
      - Dialog: on mobile, when content benefits from a bottom-anchored, partially-open surface
    notes: |
      shadcn default — not yet reviewed against Figma. Built on vaul. Panel bg-background; bottom
      direction gets rounded-t-lg, border-t, max-h-[80vh], and a drag handle (h-2 w-[100px]
      rounded-full bg-muted). Supports top/bottom/left/right. Overlay bg-black/50.

  - component: Command
    use_when:
      - Global command palette (Cmd+K) to jump between spaces, feeds, and reports
      - Searchable action list inside a Popover (e.g. assign signal to feed from many options)
      - Filterable multi-group pickers — brands, sources, report templates — with keyboard navigation
    dont_use_when:
      - Short static option list bound to a form value — use Select
      - Plain action menus with no search need — use DropdownMenu
      - Single-field autocomplete bound to an input — use Combobox
    prefer_over:
      - Select: when the option set is long enough to need fuzzy filtering and grouping
      - DropdownMenu: when keyboard-driven search across many items is the primary interaction
    notes: |
      Waldo-customized cmdk wrapper. Root: rounded-lg, bg-popover, text-popover-foreground. Input row:
      h-10 text-sm with Search icon, border-b border-border/20. List max-h-[300px] p-1. Items:
      rounded-[3px] px-2 py-1.5 text-sm, aria-selected:bg-accent, disabled opacity-40. Group headings:
      11px font-medium uppercase tracking-wider muted. No built-in CommandDialog — compose with Dialog
      or Popover yourself.

  - component: Combobox
    use_when:
      - Typeahead brand picker when adding brands to track in a space
      - Selecting a feed or report destination from a long list while typing to filter
      - Tag/topic input on insights where options are fetched or numerous
    dont_use_when:
      - Few options (under ~7) with no search need — use Select
      - Full-screen navigational search — use Command in a palette
      - Free-form text with no constrained options — use Input
    prefer_over:
      - Select: when the list is long and filter-as-you-type beats scrolling
      - Command: when the value binds to a single form field with an input-style trigger
    notes: |
      shadcn default — not yet reviewed against Figma. Built on @base-ui/react Combobox (not Radix).
      Input: h-9 rounded-md border-input bg-transparent px-3 text-sm, focus ring-[3px] ring-ring/50.
      Popup: rounded-md bg-popover shadow-md, max-h-96, width matches anchor. Items: rounded-sm
      py-1.5 pr-8 pl-2, data-highlighted:bg-accent, CheckIcon indicator right.
      COMPOSITION RULE: use .wdd (+ .wdd-has-search) as the popup — it IS the complete Waldo popover.
      Trigger is a plain button/pill (label + chevron only, no avatar). Never put .wdd inside
      .dropdown-menu — styles clash. Never add an avatar to the trigger; avatars belong inside .wdd-items.

  - component: Menubar
    use_when:
      - Persistent app-level menu row in a desktop-style editor surface (e.g. report builder: File, Insert, View)
      - Grouped command sets with keyboard shortcuts always visible at the top of a workspace canvas
    dont_use_when:
      - Single button-triggered action list — use DropdownMenu
      - Primary app navigation between sections — use Sidebar or Tabs
      - Right-click actions on content — use ContextMenu
    prefer_over:
      - DropdownMenu: when multiple related menus must sit side-by-side with arrow-key roving between them
      - NavigationMenu: when items are commands/actions (with shortcuts, checkboxes) rather than links
    notes: |
      shadcn default — not yet reviewed against Figma. Root bar: h-9, rounded-md, border, bg-background,
      p-1, shadow-xs, gap-1. Triggers: rounded-sm px-2 py-1 text-sm font-medium, open state bg-accent.
      Content: min-w-[12rem], rounded-md, border, bg-popover, p-1, shadow-md. Items match ContextMenu
      styling; supports CheckboxItem, RadioItem, Sub menus, Shortcut.

  - component: Card
    use_when:
      - Grouping a self-contained insight or report summary on a dashboard, with title, description, and an action in the header
      - Presenting a signal feed's stat block (mention counts, sentiment deltas) as a bounded surface
      - Wrapping a space overview tile (brand logo, latest activity, quick actions) in a grid of spaces
    dont_use_when:
      - Rendering a long uniform list of signals or mentions — use ListItem inside a plain container
      - Showing dense comparative data across feeds — use Table
      - Housing secondary or power-user settings — use AdvancedSection
    prefer_over:
      - Table: when each record is a rich standalone object (insight, report) rather than a row of comparable fields
      - ListItem: when content needs internal structure (header/content/footer) and visual containment, not just a scannable row
    notes: |
      shadcn default — not yet reviewed against Figma. Root: rounded-xl, border, bg-card,
      text-card-foreground, shadow-sm, flex-col gap-6 py-6. Header/Content/Footer use px-6;
      header is a container-query grid that adds a [1fr_auto] column when CardAction is present.
      CardTitle: leading-none font-semibold; CardDescription: text-sm text-muted-foreground.

  - component: Sidebar
    use_when:
      - The app shell's primary navigation with grouped menus and an active-route indicator
      - Persistent workspace switcher plus per-space navigation that survives route changes and collapses to icons
      - Mobile navigation that should automatically become an off-canvas Sheet drawer
    dont_use_when:
      - Switching between views inside a single page — use Tabs or SegmentedControl
      - A temporary contextual panel (signal detail, filters) — use Sheet or Drawer
      - A simple flat list of links inside content — use NavItem directly without the full shell
    prefer_over:
      - NavigationMenu: for app-level persistent navigation; NavigationMenu is for horizontal header menus with dropdown panels
      - Sheet: when navigation is permanent chrome, not a transient overlay (Sidebar falls back to Sheet on mobile automatically)
    notes: |
      Widths: SIDEBAR_WIDTH 16rem, mobile 18rem, icon-collapsed 3rem. Cmd/Ctrl+B toggles; state
      persisted in "sidebar_state" cookie. Variants: sidebar | floating | inset; collapsible:
      offcanvas | icon | none. Uses bg-sidebar / text-sidebar-foreground / bg-sidebar-accent tokens.
      MenuButton sizes: default h-8 text-sm, sm h-7 text-xs, lg h-12. Mobile renders inside Sheet
      automatically via useIsMobile.

  - component: Breadcrumb
    use_when:
      - Showing location depth inside a space hierarchy (Space > Feed > Signal detail)
      - Report drill-downs where users navigate back up the path
      - Long paths that need truncation — BreadcrumbEllipsis collapses middle ancestors
    dont_use_when:
      - Top-level section switching — use Sidebar or Tabs; breadcrumbs reflect position, they don't offer peers
      - A single back action — use a Button with a chevron instead of a one-segment breadcrumb
    prefer_over:
      - Tabs: for hierarchical "where am I" context; Tabs are for lateral sibling views at the same level
      - NavigationMenu: for read-mostly path display; NavigationMenu implies interactive dropdown exploration
    notes: |
      List: text-sm, tracking-[-0.02em] (Waldo tightened), text-muted-foreground, gap-1.5 (sm:gap-2.5).
      Current page: font-normal text-foreground with aria-current="page". Links hover:text-foreground.
      Separator defaults to ChevronRight strokeWidth 1.5, size-3.5. Ellipsis is a size-9 hit area.

  - component: NavigationMenu
    use_when:
      - A horizontal top-bar menu where items expand into rich dropdown panels with descriptions per link
      - Grouped link panels on marketing or settings surfaces
    dont_use_when:
      - Primary app navigation in the shell — use Sidebar
      - Simple per-item dropdown actions — use DropdownMenu
      - Switching content panes in place — use Tabs
    prefer_over:
      - DropdownMenu: when triggers are navigational links with hover-open viewport panels, not action lists
      - Tabs: when items navigate to other routes rather than swapping local content
    notes: |
      shadcn default — not yet reviewed against Figma. Trigger: h-9 rounded-md bg-background px-4 py-2
      text-sm font-medium; open state bg-accent/50 with chevron rotating 180deg. Viewport panel:
      rounded-md border bg-popover shadow. Links: rounded-sm p-2 text-sm, hover:bg-accent.

  - component: Pagination
    use_when:
      - Paging through bounded, countable result sets (archived reports, signal search results with known totals)
      - Tables of mentions where users need to jump to a specific page
    dont_use_when:
      - Continuous reverse-chronological feeds — use infinite scroll inside ScrollArea
      - Tiny sets that fit one screen — render the full list, no paging chrome
    prefer_over:
      - ScrollArea: when users need positional jumps and a sense of total volume; ScrollArea wins for continuous browsing
    notes: |
      shadcn default — not yet reviewed against Figma. Built on buttonVariants: active page =
      variant "outline", inactive = "ghost", default size "icon"; isActive sets aria-current="page".
      Previous/Next hide their text labels below sm breakpoint. Nav is mx-auto centered, items gap-1.

  - component: ScrollArea
    use_when:
      - A fixed-height signal feed column that scrolls independently of the page
      - Long filter or space lists inside popovers, dialogs, or sidebar panels that must not grow the container
      - Horizontal strips of report cards or media thumbnails (ScrollBar orientation="horizontal")
    dont_use_when:
      - Whole-page scrolling — let the document scroll natively
      - Paged, countable results where position matters — use Pagination
    prefer_over:
      - Pagination: for continuous streams (signals, mentions) where users skim rather than jump to page N
    notes: |
      shadcn default — not yet reviewed against Figma. Radix wrapper; viewport inherits parent radius
      and has focus-visible ring-[3px] ring-ring/50. Scrollbar 2.5 thick, thumb rounded-full bg-border.
      Requires an explicit height/width constraint on the root to activate.

  - component: Resizable
    use_when:
      - Split workspace views (signal feed list left, signal detail or insight editor right, user-adjustable)
      - Report builder layouts where users balance an outline panel against a preview pane
    dont_use_when:
      - Fixed app chrome navigation — use Sidebar (it has its own collapse behavior, not freeform resize)
      - Static two-column layouts users never need to adjust — use plain flex/grid
    prefer_over:
      - Sidebar: when both panes are content (feed + detail) and the ratio is a user preference, not navigation chrome
    notes: |
      shadcn default — not yet reviewed against Figma. Wraps react-resizable-panels. Handle is a 1px
      bg-border line with an invisible grab zone; focus-visible ring-1 ring-ring. Optional withHandle
      grip: h-4 w-3 rounded-xs border bg-border, auto-rotated in horizontal orientation.

  - component: AspectRatio
    use_when:
      - Locking media in signal cards to a consistent ratio (post thumbnails, ad creatives at 16/9 or 1/1)
      - Embedded video or chart previews in reports that must keep proportions across responsive grids
    dont_use_when:
      - Content whose height should follow its text — use Card with natural flow
      - Square avatars — use Avatar, which handles sizing and fallback
    prefer_over:
      - Skeleton: as the layout-reservation layer — put a Skeleton inside an AspectRatio while media loads
    notes: |
      shadcn default — not yet reviewed against Figma. Pure passthrough of Radix AspectRatio Root;
      no styling, no props beyond ratio.

  - component: Collapsible
    use_when:
      - Show/hide of a single optional region (expanding a truncated transcript, "see all 12 sources")
      - Collapsible sub-groups inside the Sidebar (pairs with SidebarMenuSub)
      - One-off "more details" toggles where multiple regions may be open simultaneously
    dont_use_when:
      - A stack of related expandable sections with shared styling — use Accordion
      - Advanced or destructive settings that warrant a styled, labeled reveal — use AdvancedSection
    prefer_over:
      - Accordion: for a single independent toggle with fully custom trigger/content; Accordion wins for uniform stacked sets
    notes: |
      shadcn default — not yet reviewed against Figma. Thin unstyled passthrough of Radix Collapsible —
      no classes, no animation; bring your own trigger styling.

  - component: Accordion
    use_when:
      - FAQ-style breakdowns in a report (methodology, data sources, limitations as stacked sections)
      - Grouping insight categories where users scan headers and expand one at a time (type="single" collapsible)
      - Settings pages with multiple bordered sections sharing identical trigger styling
    dont_use_when:
      - A single expandable region or custom trigger layout — use Collapsible
      - Sections users compare side by side or switch between constantly — use Tabs
      - Hiding rarely-used configuration behind one labeled toggle — use AdvancedSection
    prefer_over:
      - Collapsible: when you need consistent bordered stacking, built-in chevron rotation, and single/multiple open control
      - Tabs: for vertically scanned, content-heavy sections where seeing all headers at once matters
    notes: |
      Item: border-b with last:border-b-0. Trigger: py-4 text-sm font-medium, hover:underline,
      focus ring-[3px] ring-ring/50; ChevronDown size-4 muted rotates 180deg over 200ms.
      Content: text-sm, pt-0 pb-4, animate-accordion-up/down. shadcn default — not yet reviewed
      against Figma.

  - component: Calendar
    use_when:
      - Picking a custom date range for a signals or mentions feed (range selection inside a Popover)
      - Scheduling a report delivery date or a space digest start date
      - Filtering insights by a specific day or week in a brand timeline view
    dont_use_when:
      - Choosing among preset periods like "Last 7 days / 30 days" — use SegmentedControl or Select
      - Picking a single year or month from a long list — use Select
      - Displaying read-only date metadata on a signal card — plain text, no picker needed
    prefer_over:
      - Select: when the user needs arbitrary day-level or range precision, not a short preset list
      - Input: whenever validity and range constraints matter more than free-text entry
    notes: |
      shadcn default (react-day-picker wrapper) — not yet reviewed against Figma. Cell size driven by
      --cell-size; nav and day buttons use Button variant="ghost". Selected/range ends use bg-primary
      text-primary-foreground; range middle and today use bg-accent. NOTE: selected-day white-on-teal
      combo pending the green-700 contrast review applied to Button.

  - component: DatePicker
    use_when:
      - Selecting a single date for scheduling (report delivery, digest start date, export date)
      - Selecting a date range for filtering signals, mentions, or brand timeline data
    dont_use_when:
      - Choosing preset periods like "Last 7 days / 30 days" — use SegmentedControl or Select
      - Showing a read-only date on a card — plain text is enough
      - Picking a year or month only — use Select
    prefer_over:
      - Calendar: when a compact trigger button is needed — DatePicker wraps Calendar in a Popover so it stays out of the way until clicked
      - Input: when day-level precision and calendar affordance matter more than free-text entry
    notes: |
      Composed from Button + Popover + Calendar (react-day-picker). Single-date variant: DatePicker.
      Range variant: DateRangePicker (shows two months). Both in date-picker.tsx.
      Waldo extension — no shadcn equivalent (shadcn ships DatePicker as a recipe, not a component).

  - component: DataTable
    use_when:
      - Displaying a list of brands, mentions, or campaigns where the user needs to sort, filter, or paginate
      - Any tabular data set with more than ~15 rows where filtering by a column is useful
      - Tables that need column-visibility toggling (e.g. dashboard config views)
    dont_use_when:
      - Simple read-only tables with ≤10 fixed rows — use Table directly
      - Single-column lists — use ListView / ListItem
      - Leaderboard-style ranked rows — use LeaderboardRow
    prefer_over:
      - Table: when sorting, filtering, or pagination are needed — DataTable adds those on top of Table's markup
    notes: |
      Built on @tanstack/react-table v8. Exposes ColumnDef from tanstack so consumer column definitions
      are type-safe. sortableHeader() helper wraps a column header in a sort-toggle button.
      Toolbar is optional: set filterColumn and/or showColumnToggle as needed. Page size defaults to 10.

  - component: Carousel
    use_when:
      - Swiping through ad creatives or post media attached to a single signal
      - Browsing a horizontal strip of featured insight cards on a space home
      - Stepping through report cover previews in a gallery
    dont_use_when:
      - Listing many signals that all need to be scannable at once — use a grid or Table
      - Step-by-step onboarding or setup flows — use WizardDialog
      - Two or three items that fit the viewport — lay them out side by side
    prefer_over:
      - Tabs: for media/visual content where swiping is natural and labels would be meaningless
      - ScrollArea: when you need snap-to-item paging and prev/next controls rather than free scroll
    notes: |
      shadcn default (embla-carousel wrapper) — not yet reviewed against Figma. Arrow-key navigation
      built in. Previous/Next are Button variant="outline" size="icon", size-8 rounded-full,
      positioned -left-12/-right-12 — reserve outside gutter space. Items default basis-full.

  - component: Chart
    use_when:
      - Plotting signal volume over time for a brand or competitor feed
      - Visualizing sentiment or share-of-voice breakdowns inside a report
      - Rendering trend lines for audience or category insights in a dashboard card
    dont_use_when:
      - Showing a single completion percentage — use Progress
      - Displaying one headline number with a delta — use a stat card with Badge
      - Tabular data the user needs to sort or copy — use Table
    prefer_over:
      - Progress: when there are multiple series, time axes, or comparisons — not a single bounded value
      - Table: when shape and trend matter more than exact row-level values
    notes: |
      shadcn default Recharts wrapper — not yet reviewed against Figma. Requires ChartConfig with
      per-series label/icon and color or theme — emitted as --color-<key> CSS vars. Container is
      aspect-video, text-xs; axis ticks fill-muted-foreground, grid stroke-border/50. Tooltip:
      min-w-[8rem] rounded-lg bg-background text-xs shadow-xl, values in font-mono tabular-nums
      (numeric tooltip values are the documented mono exception).

  - component: FilterChip
    use_when:
      - Filter bars above signal or mention feeds — an on/off facet like "Favourites" (icon + active + onClick)
      - Dropdown-style filters in the same row (PopoverTrigger asChild with showChevron)
      - Quick toggling of feed scopes (paid ads / owned media / news) where chips sit side by side
    dont_use_when:
      - Read-only metadata on a card — use Tag or Badge, FilterChip is interactive
      - Mutually exclusive view switching — use SegmentedControl
      - Long option lists needing search — use Combobox or Select
    prefer_over:
      - Toggle: in filter bars — pill shape, border, and active treatment match the DS Button language
      - Tag: whenever the element filters content rather than labels it
      - Select: for one-or-two-click filters where a full select trigger is too heavy for the row
    notes: |
      Waldo custom (PRO-2636, fully reviewed). h-9 rounded-full pill, pl-3, pr-4 (pr-2 with chevron),
      text-sm font-medium tracking-[-0.02em]. Resting: border-foreground/[0.12], text-foreground/70,
      icons text-foreground/40 (size-4). Active: bg-foreground/10, border-transparent, text-foreground.
      Hover bg-foreground/[0.04], pressed bg-foreground/10. Chevron !size-3.5 muted. Plain <button>
      with forwardRef so it composes under PopoverTrigger asChild.

  - component: InputOTP
    use_when:
      - Email or 2FA verification codes during sign-in
      - Confirming a destructive action with a short emailed code
      - Entering a short invite or pairing code when joining a team space
    dont_use_when:
      - Free-form text like a brand name or search query — use Input
      - Passwords or anything longer than ~8 characters — use Input type="password"
      - API keys pasted as one blob — use Input; per-character slots fight long pastes
    prefer_over:
      - Input: for fixed-length codes — per-slot display, fake caret, and auto-advance beat a single field
    notes: |
      shadcn default (input-otp wrapper) — not yet reviewed against Figma. Slots h-9 w-9 text-sm,
      grouped with shared borders. Active slot: border-ring + ring-[3px] ring-ring/50; invalid:
      border-destructive. Fake caret: h-4 w-px bg-foreground animate-caret-blink.

  - component: Kbd
    use_when:
      - Showing the shortcut next to a command in the command palette
      - Hinting shortcuts inside Tooltip content on toolbar actions
      - Documenting keyboard navigation in empty states or onboarding hints
    dont_use_when:
      - Status or category labels on signals — use Badge or Tag
      - Interactive key remapping UI — Kbd is pointer-events-none, purely presentational
    prefer_over:
      - Badge: for anything representing a literal keypress — reads as a key, not a status
    notes: |
      Waldo-tuned: h-5 min-w-5 rounded-sm bg-muted px-1, font-sans text-xs font-medium
      tracking-[-0.02em] text-muted-foreground, select-none, pointer-events-none. Inside tooltip
      content it auto-restyles (bg-background/20). KbdGroup wraps multiple keys with gap-1.
      Keyboard shortcuts are a documented mono-allowed context, but Kbd intentionally uses font-sans.

  - component: Label
    use_when:
      - Naming form fields in space settings, feed configuration, or report setup dialogs
      - Pairing with Checkbox/Switch/RadioGroup rows (e.g. notification toggles per signal type)
      - Labeling Select or Input controls in filter and creation forms
    dont_use_when:
      - Section headings inside a page or card — use heading typography, not a form label
      - Inline descriptive helper text under a field — use muted paragraph text
    prefer_over:
      - Badge: for form-control naming — Label is semantically tied to inputs (htmlFor, peer states)
    notes: |
      Radix Label wrapper with Waldo type tuning: text-sm leading-none font-medium
      tracking-[-0.02em], flex items-center gap-2, select-none. Dims to opacity-50 via
      peer-disabled. Note: Field labels (field-label) use text-primary teal — this Label is neutral.

  - component: Loader
    use_when:
      - DotsLoader for async waits — feed refreshing, signals being fetched, report list loading
      - ShimmerText for AI generation in progress ("Analyzing signals…", agent thinking states)
      - TextCursor appended to streaming AI text as it types out an insight
    dont_use_when:
      - Content with a known layout still loading — use Skeleton so the page shape stays stable
      - A long-running job with measurable completion — use Progress
      - Step/status indication on a pipeline item — use StatusSpinner
    prefer_over:
      - StatusSpinner: for inline, lightweight waiting and streaming-text states rather than per-item status
      - Skeleton: when there is no placeholder layout to mimic (e.g. text being generated)
    notes: |
      Waldo custom, three types: DotsLoader (sm h-1 w-1 gap-1, default h-1.5 w-1.5 gap-1.5; staggered
      pulse, 160ms delay steps), ShimmerText (moving gradient via bg-clip-text, 2s shimmer), TextCursor
      (w-0.5, blink 1s). Variants zinc and green (bg-primary). Exports: DotsLoader, ShimmerText, TextCursor.

  - component: Progress
    use_when:
      - Showing a bulk import or backfill of signals with a known percentage
      - Report generation steps where completion is measurable
      - Quota usage bars (e.g. monthly credits consumed) in workspace settings
    dont_use_when:
      - Indeterminate waits with no known duration — use Loader (DotsLoader) or StatusSpinner
      - Placeholder while a card's content loads — use Skeleton
    prefer_over:
      - Loader: whenever you can compute a real 0-100 value — determinate beats indeterminate for trust
      - Chart: for a single bounded value; Chart is for series and comparisons
    notes: |
      shadcn default (Radix Progress) — not yet reviewed against Figma. Track: h-1.5 rounded-full
      bg-primary/20. Indicator: bg-primary with transition-all via translateX. value prop only;
      no size or color variants.

  - component: Skeleton
    use_when:
      - Placeholder rows while a signals feed or mentions list fetches
      - Ghosting a report card grid or space sidebar during initial load
      - Reserving the shape of an insight summary block before data arrives
    dont_use_when:
      - The final layout is unknown (e.g. AI composing freeform output) — use Loader
      - Showing job completion percentage — use Progress
    prefer_over:
      - Loader: when content has a predictable layout — preserving shape prevents layout shift
      - StatusSpinner: for whole-region loading; StatusSpinner is for per-item status
    notes: |
      Waldo-tuned single div: animate-pulse rounded-md bg-foreground/[0.07] (alpha token on
      foreground, not bg-muted — works across themes). Size entirely via className; no variants.

  - component: Toggle
    use_when:
      - Icon-only formatting or view affordances in an editor toolbar (e.g. bold in a report editor)
      - A standalone on/off tool state in a toolbar, like snapping or compact density
    dont_use_when:
      - Filter bars above feeds — use FilterChip, the reviewed Waldo pill for that row
      - Settings on/off rows — use Switch with a Label
      - Mutually exclusive choices — use ToggleGroup type="single" or SegmentedControl
    prefer_over:
      - Switch: inside toolbars where a pressed-button metaphor fits; Switch belongs in settings forms
    notes: |
      shadcn default (Radix Toggle) — not yet reviewed against Figma. Variants: default (transparent),
      outline (border-input). Sizes: sm h-8, default h-9, lg h-10; rounded-md text-sm font-medium.
      Pressed: bg-accent text-accent-foreground; hover bg-muted.

  - component: ToggleGroup
    use_when:
      - Multi-select formatting clusters in an editor toolbar (bold/italic/underline together)
      - Toolbar single-choice icon sets, e.g. chart type (line/bar/area) on an insight visualization
    dont_use_when:
      - Primary view switching — use SegmentedControl or Tabs for page-level navigation
      - Independent filters over a feed — use FilterChip per facet
      - More than ~5 options — use Select
    prefer_over:
      - SegmentedControl: for dense icon-button clusters and type="multiple" selection inside toolbars
      - Toggle: when related toggles should share size/variant and read as one fused control
    notes: |
      shadcn default (Radix ToggleGroup, inherits toggleVariants) — not yet reviewed against Figma.
      Context propagates variant/size/spacing to items; at spacing=0 items fuse (rounded-none with
      first:rounded-l-md last:rounded-r-md and collapsed borders).

  - component: KPI Stat Card
    use_when:
      - Headline metric on a dashboard (big number + label + trend delta)
      - Summarizing a single KPI with period-over-period change
    dont_use_when:
      - Showing more than one metric — use a grid of cards, one KPI each
      - Listing ranked items — use Leaderboard Row
    prefer_over:
      - Card: when the content is a single metric with a trend indicator
    notes: |
      Brand API prototype dashboard component — not yet reviewed against Figma.
      Surface/text colors from semantic tokens; trend up/down via --primary (good) / --warning (bad).
      NEVER use --destructive for trends — it is reserved for irreversible destructive actions only.

  - component: Leaderboard Row
    use_when:
      - Any ranked list — rank + entity + a right-hand value, one item per row
      - Comparing entities ordered by a metric (magnitude OR trend/momentum)
      - Trending items per source (hashtags, topics, subreddits) — use the trend variant + .lb-head
      - Multi-source comparison — one .lb column per source, composed side by side
    dont_use_when:
      - Non-ranked tabular data — use Table
      - A single headline metric — use KPI Stat Card
      - A simple percentage breakdown with a fill bar — use Bar Track
    prefer_over:
      - ListItem: when rows are ranked and carry a comparative value
    notes: |
      Brand API prototype dashboard component — not yet reviewed against Figma.
      ONE component, two right-cell variants that share the same row skin (so lists stay visually consistent):
        - depth  → right cell is a depth pill, alpha-encoded (see Depth Pill). Static magnitude.
        - trend  → right cell is a directional delta (.lb-delta up|dn); volume in the meta line (.lb-vol);
                   optional source header (.lb-head + .lb-head-title/.lb-head-sub) to label the source and compose columns.
      Trend delta is a TREND, not a status: up = var(--primary), down = var(--warning) — never --destructive.
      Structure: .lb > [.lb-head] + .lb-row(.lb-rank + .lb-main(.lb-name-row + .lb-meta)).
      Divider at /70, gap 3px, explicit text-foreground. Rank/volume/delta all tabular-nums.
      There is NO separate "Trend Column" component — it is this component's trend variant.

  - component: Depth Pill
    use_when:
      - Compact inline indicator of a depth/intensity score
      - Annotating an item with a small quantified badge
    dont_use_when:
      - Binary status — use Badge or Live Badge
      - Filtering — use FilterChip
    prefer_over:
      - Badge: when the value encodes a depth/intensity level, not a status label
    notes: |
      Brand API prototype component — not yet reviewed against Figma.
      depthAlpha accepts a maxDepth param.

  - component: Ad Copy Card
    use_when:
      - Displaying ad creative copy (headline, body, CTA) in a card
      - Competitive ad teardown / creative review surfaces
    dont_use_when:
      - Generic content — use Card
      - A single metric — use KPI Stat Card
    prefer_over:
      - Card: when the content is structured ad creative copy
    notes: |
      Brand API prototype component — not yet reviewed against Figma.

  - component: Bar Track
    use_when:
      - Ranked list of brands/entities by a single metric (SoV, reach, engagement)
      - Simple percentage breakdown without a reference point
    dont_use_when:
      - Metric needs a median/benchmark marker — use Benchmark Bar instead
      - Only one value with no comparison context — use KPI Stat Card
    prefer_over:
      - Benchmark Bar: when there is no reference/median line, just a ranked fill
    notes: |
      Structure: .bar-track-label (left, fs-xs muted-foreground) + .bar-track-val (right, fs-xs foreground 500) + .bar-track-rail.
      Rail: height 6px, radius 999px, background color-mix(var(--foreground) 8%).
      Fill width set via inline style (width: N%). Default fill = gradient (--primary 23% → green-400), same recipe as HBar so both bar components read identically side by side.
      Variants (all gradient ramps): .muted → muted-foreground 20% → 55%, .warn → --warning 23% → solid, .bad → --destructive 23% → solid.
      List wrapper: .bar-track-list (var(--card) bg, radius-xl, padding 14px 16px).
      Use .bar-track-list-title for the list heading (fs-xs, weight 600).
      Bar widths should be relative to the max value in the list (max = 100%).

  - component: Benchmark Bar
    use_when:
      - Showing brand performance vs a reference point (category median, benchmark, competitor average)
      - Comparing multiple metrics in a stacked layout (sentiment, SoV, engagement, etc.)
    dont_use_when:
      - Simple percentage with no reference marker — use Quote Card frequency bar instead
      - Binary pass/fail metric — use Badge or Alert
    prefer_over:
      - Raw progress bars: when the metric needs a reference marker (median line)
      - KPI Stat Card: when multiple metrics need to be compared against a benchmark simultaneously
    notes: |
      Two classes: .bench-bar (single row) and .bench-stack (card shell wrapper for stacked layout).
      .bench-bar variants: .good → var(--primary), .bad → var(--destructive), .warn → var(--warning), .neutral → muted fill.
      Structure: .bench-bar-label (left, fs-sm 500) + .bench-bar-right (.bench-bar-val + .bench-bar-ref) + .bench-bar-track.
      Track: height 6px, radius 999px, background color-mix(var(--foreground) 8%).
      Fill: .bench-bar-fill with inline width% style.
      Marker: .bench-bar-marker absolute at inline left% style — shows reference point (median/benchmark).
      .bench-stack: background var(--card), radius var(--radius-xl), padding 14px 16px, gap 14px.

  - component: Media Tile
    use_when:
      - Displaying a social post thumbnail in a grid (image or video)
      - Ad creative previews in a compact grid layout
      - Brand owned/earned media feed grids
    dont_use_when:
      - Full article or blog post with long metadata — use Article Card
      - Single featured image — use a plain image with aspect-ratio
    prefer_over:
      - Article Card: when content is a visual post thumbnail with minimal text overlay, not a structured editorial card
    notes: |
      Grid tile with 4:5 aspect ratio. Background: var(--secondary) as fallback, cover image via inline style.
      Gradient scrim (bottom-to-top) for text legibility over images.
      Engagement pill: top-right, var(--fs-xs), semibold white, semi-transparent dark bg, rounded-full.
      Caption: bottom-left, var(--fs-xs), white, z-index above scrim.
      Border-radius: var(--radius-xl). Overflow hidden.
      Classes: .mtile, .mtile-thumb, .mtile-eng, .mtile-caption.
      Grid wrapper: .mtile-grid (3 cols, gap 8px).

  - component: Dual-Bar Row
    use_when:
      - Comparing the same metric between two brands/entities side by side (e.g. Nike 68% vs Adidas 52%)
      - Competitive snapshot rows inside a card or list
    dont_use_when:
      - Single brand metric with no comparison — use Benchmark Bar instead
      - More than two entities — use a chart
    prefer_over:
      - Benchmark Bar: when comparing two named entities rather than a brand vs a reference marker
    notes: |
      Structure: metric label → two bar rows (A and B), each with: color dot · brand name · bar track · value.
      Color dot: 6px circle. Brand A = var(--primary), Brand B = color-mix(in srgb, var(--foreground) 35%, transparent).
      Track: height 6px, radius 999px, background color-mix(in srgb, var(--foreground) 8%, transparent).
      Bar values: --fs-xs, tabular nums, min-width 36px, right-aligned.
      Metric label: --fs-xs, var(--muted-foreground), margin-bottom 4px.
      Row hover: background var(--secondary). Padding 8px 12px, radius var(--radius-lg).
      Class: .dbar-row, .dbar-metric, .dbar-line, .dbar-dot, .dbar-name, .dbar-track, .dbar-fill, .dbar-val.

  - component: Quote Card
    use_when:
      - Displaying a Voice-of-Customer cluster (verbatim quote + frequency)
      - Showing what audiences love or pain about a brand
    dont_use_when:
      - Social mention with platform/author context — use Comment Card
      - Generic testimonial without frequency data
    prefer_over:
      - Comment Card: when the content is an aggregated theme, not a single post
    notes: |
      Structure: sentiment label (love/pain) → title → verbatim quote → frequency bar.
      Two sentiment variants: love = var(--primary), pain = var(--destructive).
      Background: var(--card). Border-radius: var(--radius-xl). Same card shell as Comment Card.
      Sentiment label: --fs-xs, uppercase, color matches variant.
      Title: --fs-sm, var(--foreground), font-weight 500.
      Quote: --fs-sm, var(--muted-foreground), italic, 2-line clamp.
      Frequency bar: thin (4px), full width, fill color matches sentiment variant.
      Frequency value: tabular nums, --fs-xs.

  - component: Comment Card
    use_when:
      - Displaying a social mention (Reddit, X, TikTok, Instagram, etc.)
      - Feed of brand mentions with platform, author, sentiment, and text
    dont_use_when:
      - Internal system alerts — use Alert List Row
      - Generic list content without platform context — use List Item
    prefer_over:
      - Alert List Row: when the row represents a social mention with platform/author/sentiment
    notes: |
      Structure: platform favicon · author · time → sentiment chip (right-aligned) → text body → footer (comment count + arrow).
      Background: var(--secondary). Border-radius: var(--radius-lg).
      Sentiment chip classes: .sentiment-chip.pos / .neu / .neg / .mix — same palette as Theme Pill.
      Platform favicon: 14×14px img. Author + time in var(--muted-foreground) at --fs-xs.
      Text body: var(--foreground) at --fs-sm, 2-line clamp.
      Footer: comment count + chevron arrow, both muted.
      Never use hardcoded platform colors — use favicon only.

  - component: Alert List Row
    use_when:
      - One row in an alerts / signals list (icon, message, timestamp)
      - Feed of system or brand alerts
    dont_use_when:
      - Inline ephemeral notification — use Toast
      - Generic list content — use ListItem
    prefer_over:
      - ListItem: when the row represents an alert/signal with severity
    notes: |
      Brand API prototype component — not yet reviewed against Figma.
      min-h-10.

  - component: Waldo Logo
    use_when:
      - Displaying the Waldo wordmark in topbars, splash screens, or branded surfaces
    dont_use_when:
      - Generic icon usage — use a standard icon instead
    prefer_over: []
    notes: |
      SVG wordmark component. Use fill="var(--foreground)" for theme-aware rendering.
      Width 70px, height 18px. Do not substitute with text or a placeholder box.

  - component: Live Badge
    use_when:
      - Indicating a real-time / live state on a surface
      - Marking streaming or actively-updating data
    dont_use_when:
      - Static status label — use Badge
      - A depth/intensity value — use Depth Pill
    prefer_over:
      - Badge: when the state is specifically "live" / real-time
    notes: |
      Brand API prototype component — not yet reviewed against Figma.
      motion-safe: for reduced-motion.

  - component: Brand Column
    use_when:
      - Competitive overview grid showing brand share with supporting insight text
      - Height-encoded comparison of 3-5 brands where taller = higher share/metric
    dont_use_when:
      - More than 6 brands — too narrow; use a bar chart
      - No insight text needed — use Column Cards instead
    prefer_over:
      - Column Cards: when each column represents a brand (with logo + name) rather than a time period
    notes: |
      Two-zone card: .brcol-body (gradient top, insight text + see more) + .brcol-foot (dark bg, delta % + brand logo/name).
      Body gradient: linear-gradient top→bottom, color-mix chart-2 28%→48% with white.
      Footer: var(--secondary) background. Delta: 36px bold white. Logo: 28px circle via clearbit.
      Height set inline per data point. border-radius: 22px. overflow: hidden on card.
      NEVER use border-left accent. Use only DS chart tokens for gradient base.

  - component: Recommendation Card
    use_when:
      - Surfacing an AI-generated strategic recommendation (comms, product, campaign, etc.)
      - Presenting actionable insights with supporting evidence quotes in a feed or panel
    dont_use_when:
      - Static data metric with no action — use KPI Stat Card or Benchmark Bar
      - Simple alert or signal without contextual evidence — use Alert List Row
    prefer_over:
      - Comment Card: when the content is an AI recommendation with category + evidence, not a raw mention
      - Quote Card: when the content is an actionable insight rather than a VoC theme
    notes: |
      Structure: category tag pill → headline → body → evidence block → footer (action icons).
      Card shell: .rec-card — background var(--card), radius var(--radius-xl), padding 16px 18px, flex column.
      Hover: background color-mix(in srgb, var(--foreground) 5%, var(--card)).
      Category tags (.rec-tag): .comms → var(--destructive) tint, .product → var(--primary) tint,
        .campaign / .creative / .retail → use the most relevant token. Font-size 10px, uppercase, letter-spacing 0.06em.
      Headline (.rec-headline): --fs-sm, font-weight 600, var(--foreground).
      Body (.rec-body): --fs-xs, var(--muted-foreground).
      Evidence block (.rec-evidence): secondary tinted background (color-mix foreground 5%), radius var(--radius-md),
        padding 10px 12px. Contains .rec-ev-label (--fs-xs, muted, uppercase, 0.05em tracking) and quote text.
        NEVER use border-left (banned by DS rules).
      Footer (.rec-foot): border-top color-mix foreground 8%, padding-top 8px, space-between layout.
      Action icons (.rec-action): 28×28px, radius var(--radius-md), var(--muted-foreground) icons.

  - component: Score Ring
    use_when:
      - Showing a single 0–100 score (reputation, resonance, presence, health) where the value sits within a good/watch/at-risk range
      - Presenting one headline metric prominently (hero variant) or a small grid of scores (input variant)
      - The zone (how good/bad the number is) matters as much as the number itself
    dont_use_when:
      - The metric has no meaningful 0–100 ceiling or range — use KPI Stat Card
      - Comparing a value against a reference point (median, benchmark) — use Benchmark Bar
      - Showing a proportional breakdown of parts — use Donut Chart or Segmented Bar
    prefer_over:
      - KPI Stat Card: when the score's zone (good/watch/at-risk) should be encoded visually by arc color
      - Radial Chart (chart-page-radial): when you need the full card composition (label + delta row + hero variant), not just the bare gauge
    notes: |
      Card shell: .sring — background var(--card), radius var(--radius-xl), flex column centered.
      Zone variants (arc color): .good → var(--primary), .watch → var(--warning), .risk → var(--destructive). Married to the score's range, never mixed arbitrarily.
      Size variants: default (input, 120px svg) and .hero (184px svg, elevated shadow, label below in foreground).
      Keep it light, not heavy: thin strokes (arc + track stroke-width 4 input / 5 hero, round caps), small regular-weight numbers, regular-weight labels. Never bold — bold + thick rings read as crude.
      Gauge: svg 0 0 120 120, r=52 (circumference ≈ 327). Arc = .sring-arc circle with stroke-dasharray "<value/100·327> 327" and transform rotate(-90 60 60) to start at 12 o'clock. Track = .sring-track.
      SVG color MUST come from CSS classes (.sring-arc, .sring-num) — never a fill=/stroke= attribute (attributes don't resolve var()). .sring-svg needs display:block + flex:none so the DS svg{display:block} reset doesn't collapse it in flex.
      Center: .sring-num (28px input / 44px hero, weight 400) + optional .sring-suffix (e.g. "% SOV").
      Optional .sring-label + .sring-delta row (period-over-period): .up → var(--primary), .dn → var(--destructive).

  - component: Segmented Bar
    use_when:
      - Showing proportional distribution of topics, themes, or categories across a brand's content
      - Comparing message mix between two brands side by side (one bar per brand)
      - Sentiment breakdown where each segment's share matters visually
    dont_use_when:
      - Comparing absolute values between entities — use Benchmark Bar or Dual-Bar Row
      - More than 6 segments — bar becomes unreadable; use a Donut Chart instead
      - Single metric with no breakdown — use a KPI Stat Card
    prefer_over:
      - Pie Chart: more readable in narrow dashboards, easier to compare multiple bars vertically
      - Proportion Bar: when you need a title, legend labels, and hover states (not just a tone strip)
    notes: |
      chart-page: chart-page-segbar (lives inside the Charts section, not as a standalone comp-*).
      Shell: .segbar-wrap (flex column, gap 10px) > .segbar-track (height 48px, radius var(--radius-xl), overflow hidden)
        + .segbar-legend (flex wrap, gap 6px 20px).
      Each segment: .segbar-seg with width = percentage, background = var(--chart-N). Hover: opacity 0.82.
      Legend item: colored % in font-weight 600 + muted category label. Color must match segment (same --chart-N).
      Use --chart-1 through --chart-12 only — never hardcoded hex colors.
      Gap between segments: none (overflow hidden on track handles clean joins).

  - component: Column Cards
    use_when:
      - Week-over-week or period comparison of engagement metrics (posts, interactions, delta %)
      - When the magnitude of each period should be visually encoded by card height
    dont_use_when:
      - More than 8 periods — cards become too narrow; use a Bar Chart instead
      - Comparing multiple brands in the same chart — use grouped Bar Chart
      - Single metric with no period comparison — use KPI Stat Card
    prefer_over:
      - Bar Chart: when each bar needs rich content inside (secondary metric + delta), not just a value
    notes: |
      chart-page: chart-page-column-card (lives inside Charts section).
      Shell: .colcard-row (flex, align-items flex-end, gap 10px) > .colcard-col (flex column, align center).
      Card: .colcard-card.pos (var(--chart-2) bg) or .colcard-card.neg (warning tint).
      Height is set inline per data point — no fixed height class.
      Content (bottom-aligned via justify-content flex-end): .colcard-secondary, .colcard-primary, .colcard-delta (22px bold white).
      border-radius: 22px (intentionally larger than var(--radius-xl) to match Figma pillow shape).
      Never use hardcoded hex for card background — always var(--chart-N) or var(--warning).

  - component: Article Card
    use_when:
      - Displaying a press or news item mentioning a brand (media monitoring feeds)
      - Showing earned media coverage with source, headline, and snippet
    dont_use_when:
      - Social post (Reddit, X, TikTok) — use Comment Card instead
      - Internal alert or signal — use Alert List Row
    prefer_over:
      - Comment Card: when the content is a structured press article with a named publication, not a social post
      - Quote Card: when the content has a source, headline, and link out to external coverage
    notes: |
      Horizontal layout: publication favicon (32×32, var(--radius-md)) left + content column right.
      Background: var(--card). Border-radius: var(--radius-xl). Padding: 14px 16px. Gap: 14px.
      Hover: color-mix(in srgb, var(--foreground) 5%, var(--card)). Transition: background 0.12s.
      Meta row: source (--fs-xs, 600, foreground) · separator dot · time (--fs-xs, muted) · category tag (right).
      Title: --fs-sm, font-weight 600, 2-line clamp.
      Snippet: --fs-xs, muted-foreground, 2-line clamp.
      Category tag: color-mix tint using --primary (neutral/default) or --warning (competitor/negative).
      Element is <a> — renders as clickable link, cursor pointer.
      Classes: .art-card, .art-favicon, .art-body, .art-meta, .art-source, .art-time, .art-tag, .art-title, .art-snippet.

component_choice_logic:

  dialog_vs_drawer:
    dialog: Focused action, relatively compact, needs user's full attention
    drawer: Large contextual panel, settings with navigation, doesn't block the full screen

  switch_vs_checkbox_vs_radio:
    switch: Immediate effect toggle, no Save needed
    checkbox: Multi-select, or boolean that requires Save
    radio: Mutually exclusive single choice

  toast_vs_alert_vs_dialog:
    toast: Ephemeral, auto-dismisses, corner of screen
    alert: Persistent, lives in the content, related to current view
    dialog: Requires user action/acknowledgment, blocks interaction

  badge_vs_tag:
    badge: Static, non-removable status label
    tag: User-created, removable, part of input

  tabs_vs_segmented_control:
    tabs: Navigation between distinct page sections
    segmented_control: Toggle between view modes within the same data

  listitem_vs_navitem_vs_table:
    listitem: Entity rows (people, brands) with avatar + rich content
    navitem: Navigation/settings items, compact, with trailing icon
    table: Multi-column structured data, sortable

  navitem_vs_filtertrigger:
    navitem: Navigates or selects a view — full-width, pill shape, active bg
    filtertrigger: Opens a dropdown to set a filter value — bare inline, no bg

  tooltip_vs_popover_vs_hovercard:
    tooltip: One-line text hint, no interaction
    popover: Anchored interactive content (forms, pickers, small tasks)
    hovercard: Rich read-only preview on hover (brand, person)

  dialog_vs_sheet_vs_drawer:
    dialog: Compact focused task, centered, full attention
    sheet: Long/scrollable side panel on desktop, page context stays visible
    drawer: Touch/mobile bottom sheet with swipe-to-dismiss

  skeleton_vs_loader_vs_statusspinner:
    skeleton: Known layout loading — preserve the shape, avoid layout shift
    loader: Indeterminate waits and AI-streaming states (dots, shimmer, cursor)
    statusspinner: Per-item async status that resolves to success/error/warning

  select_vs_combobox_vs_command:
    select: Short known list bound to a form field
    combobox: Long list with type-to-filter, bound to a form field
    command: Global palette / searchable actions across the app (Cmd+K)

  toggle_vs_switch_vs_filterchip:
    toggle: Toolbar pressed-state tool (icon affordance, editor contexts)
    switch: Settings on/off that applies immediately
    filterchip: Filter bars above feeds — the reviewed Waldo pill

# ─── Semantic token rules ────────────────────────────────────────────────────
# These govern WHEN to use each color token. Violating these makes the UI
# semantically incorrect even if it looks visually fine.

token_rules:

  destructive:
    use_only_for:
      - Irreversible / destructive user actions (delete, remove permanently, purge)
      - Confirmation dialogs for actions with no undo
      - Button variants that trigger data loss
    never_use_for:
      - Negative trends or metric deltas (competitor growing, share dropping)
      - Error states that don't involve data loss
      - Live/active indicators (pulse dots, badges)
      - Anything that the user can recover from
    correct_alternatives:
      negative_trend: "--warning"
      recoverable_error: "--warning"
      live_indicator: "--primary or --warning depending on context"

  warning:
    use_for:
      - Negative trends (metric going in wrong direction)
      - Caution states (something needs attention but no data loss)
      - Competitor activity indicators
      - Upward delta badges on metrics that are bad for the user
    never_use_for:
      - Irreversible destructive actions — use --destructive

  primary:
    use_for:
      - Positive trends (metric improving, share growing)
      - CTAs, brand actions
      - Downward delta on competitor metrics (good for the user)
    never_use_for:
      - Error or warning states
